<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="shared/theme.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Asit-Baz Titrasyonu | Açelya</title>
    <style>
      .titration-stage {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-start;
        justify-content: center;
        margin: 12px 0;
      }
      .titration-stage canvas {
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: 0 0 0 1px var(--border);
      }
      .panel {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 220px;
      }
      .panel label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .panel select {
        padding: 6px 8px;
        font: inherit;
        font-size: 0.85rem;
        background: var(--bg-input);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .panel button {
        padding: 8px 14px;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #041016;
        background: linear-gradient(135deg, var(--accent), #2dd4bf);
      }
      .panel button.secondary {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        font-weight: 400;
      }
      .readouts {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        font-size: 0.85rem;
      }
      .readout-box {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px;
        text-align: center;
      }
      .readout-box .val {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent);
      }
      .readout-box .lbl {
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .eq-point {
        animation: eqPulse 1.2s ease-in-out infinite;
      }
      @keyframes eqPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      #indicatorColor {
        display: inline-block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        vertical-align: middle;
        border: 1px solid var(--border);
        transition: background 0.3s;
      }
      @media (max-width: 600px) {
        .titration-stage { flex-direction: column; align-items: center; }
      }
    </style>
    <script src="shared/app.js"></script>
  </head>
  <body class="app-page" data-page="asit-baz-titrasyonu">
    <div class="app-content">
      <h1>🧪 Asit-Baz Titrasyonu</h1>
      <p class="hint">Büretten erlene damla damla titrant ekleyin. pH değişimini ve indikatör rengini gözlemleyin.</p>

      <div class="readouts">
        <div class="readout-box"><div class="val" id="phDisplay">7.00</div><div class="lbl">pH</div></div>
        <div class="readout-box"><div class="val" id="volDisplay">0.0</div><div class="lbl">Eklenen (mL)</div></div>
        <div class="readout-box"><div class="val"><span id="indicatorColor"></span> <span id="indicatorName">Fenolftalein</span></div><div class="lbl">İndikatör</div></div>
      </div>

      <div class="titration-stage">
        <canvas id="beakerCanvas" width="320" height="380"></canvas>
        <canvas id="curveCanvas" width="420" height="380"></canvas>
        <div class="panel">
          <label>Asit-Baz çifti
            <select id="pairSelect">
              <option value="hcl-naoh">HCl + NaOH (kuvvetli-kuvvetli)</option>
              <option value="ch3cooh-naoh">CH₃COOH + NaOH (zayıf-kuvvetli)</option>
              <option value="hcl-nh3">HCl + NH₃ (kuvvetli-zayıf)</option>
              <option value="h2so4-naoh">H₂SO₄ + NaOH (diprotik)</option>
            </select>
          </label>
          <label>İndikatör
            <select id="indicatorSelect">
              <option value="phenolphthalein">Fenolftalein (8.2–10.0)</option>
              <option value="methyl-orange">Metil Oranj (3.1–4.4)</option>
              <option value="bromothymol">Bromotimol Mavisi (6.0–7.6)</option>
            </select>
          </label>
          <button id="dropBtn">💧 Damla ekle (0.5 mL)</button>
          <button id="drop10Btn">💧💧 10 damla ekle</button>
          <button id="autoBtn">▶️ Otomatik titrasyon</button>
          <button id="resetBtn" class="secondary">🔄 Sıfırla</button>
        </div>
      </div>

      <p style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-top:10px" id="eqMsg"></p>
    </div>

    <script>
      (function () {
        const beakerCanvas = document.getElementById("beakerCanvas");
        const curveCanvas = document.getElementById("curveCanvas");
        const bctx = beakerCanvas.getContext("2d");
        const cctx = curveCanvas.getContext("2d");

        // Titrasyon parametreleri
        const PAIRS = {
          "hcl-naoh": { name: "HCl + NaOH", acidConc: 0.1, baseConc: 0.1, acidVol: 25, pKa: null, type: "strong-strong", eqVol: 25 },
          "ch3cooh-naoh": { name: "CH₃COOH + NaOH", acidConc: 0.1, baseConc: 0.1, acidVol: 25, pKa: 4.76, type: "weak-strong", eqVol: 25 },
          "hcl-nh3": { name: "HCl + NH₃", acidConc: 0.1, baseConc: 0.1, acidVol: 25, pKa: 9.25, type: "strong-weak", eqVol: 25 },
          "h2so4-naoh": { name: "H₂SO₄ + NaOH", acidConc: 0.05, baseConc: 0.1, acidVol: 25, pKa: null, type: "diprotic", eqVol: 25 },
        };

        const INDICATORS = {
          "phenolphthalein": { name: "Fenolftalein", low: 8.2, high: 10.0, colorLow: "#e8e8f4", colorHigh: "#e04090" },
          "methyl-orange": { name: "Metil Oranj", low: 3.1, high: 4.4, colorLow: "#e04040", colorHigh: "#e8c840" },
          "bromothymol": { name: "Bromotimol Mavisi", low: 6.0, high: 7.6, colorLow: "#e8c840", colorHigh: "#4088e0" },
        };

        let pair = PAIRS["hcl-naoh"];
        let indicator = INDICATORS["phenolphthalein"];
        let volumeAdded = 0;
        let pH = 7;
        let dataPoints = []; // { vol, pH }
        let autoRunning = false;
        let autoTimer = null;
        let eqReached = false;

        // pH hesaplama
        function calcPH(vol) {
          const acidMoles = pair.acidConc * pair.acidVol;
          const baseMoles = pair.baseConc * vol;
          const totalVol = pair.acidVol + vol;
          const diff = acidMoles - baseMoles;

          if (pair.type === "strong-strong") {
            if (Math.abs(diff) < 1e-10) return 7.0;
            if (diff > 0) return -Math.log10(diff / totalVol);
            return 14 + Math.log10(-diff / totalVol);
          }

          if (pair.type === "weak-strong") {
            if (Math.abs(diff) < 1e-10) {
              const conjBase = baseMoles / totalVol;
              const pOH = -Math.log10(Math.sqrt(conjBase * Math.pow(10, -(14 - pair.pKa))));
              return 14 - pOH;
            }
            if (diff > 0) {
              // Henderson-Hasselbalch: tampon bölge
              if (baseMoles > 0) {
                return pair.pKa + Math.log10(baseMoles / diff);
              }
              // Saf zayıf asit
              const ca = acidMoles / totalVol;
              return -Math.log10(Math.sqrt(ca * Math.pow(10, -pair.pKa)));
            }
            // Fazla baz
            const excessOH = -diff / totalVol;
            return 14 + Math.log10(excessOH);
          }

          if (pair.type === "strong-weak") {
            if (Math.abs(diff) < 1e-10) {
              const conjAcid = acidMoles / totalVol;
              const pKb = 14 - pair.pKa;
              const pOH = -Math.log10(Math.sqrt(conjAcid * Math.pow(10, -pKb)));
              return 14 - pOH;
            }
            if (diff > 0) {
              const excessH = diff / totalVol;
              return -Math.log10(excessH);
            }
            // Tampon bölge (fazla zayıf baz)
            if (acidMoles > 0) {
              const pKaConj = pair.pKa;
              return pKaConj + Math.log10((baseMoles - acidMoles) / acidMoles);
            }
            const cb = -diff / totalVol;
            const pOH = -Math.log10(Math.sqrt(cb * Math.pow(10, -(14 - pair.pKa))));
            return 14 - pOH;
          }

          if (pair.type === "diprotic") {
            if (Math.abs(diff) < 1e-10) return 7.0;
            if (diff > 0) return -Math.log10(diff / totalVol);
            if (Math.abs(acidMoles / 2 - baseMoles) < 1e-3) return 4.5;
            return 14 + Math.log10(-diff / totalVol);
          }

          return 7;
        }

        function update() {
          pH = calcPH(volumeAdded);
          dataPoints.push({ vol: volumeAdded, pH });

          document.getElementById("phDisplay").textContent = pH.toFixed(2);
          document.getElementById("volDisplay").textContent = volumeAdded.toFixed(1);

          // Eşdeğerlik noktası
          const nearEQ = Math.abs(volumeAdded - pair.eqVol) < 0.3;
          eqReached = nearEQ;
          const eqMsg = document.getElementById("eqMsg");
          if (nearEQ) {
            eqMsg.innerHTML = '<span class="eq-point">⚡ Eşdeğerlik noktası!</span>';
          } else if (volumeAdded > pair.eqVol + 1) {
            eqMsg.textContent = "Eşdeğerlik noktası geçildi — fazla titrant eklendi.";
          } else {
            eqMsg.textContent = "";
          }

          updateIndicator();
          drawBeaker();
          drawCurve();
        }

        function updateIndicator() {
          const ic = document.getElementById("indicatorColor");
          const inom = document.getElementById("indicatorName");
          inom.textContent = indicator.name;
          if (pH <= indicator.low) ic.style.background = indicator.colorLow;
          else if (pH >= indicator.high) ic.style.background = indicator.colorHigh;
          else {
            const t = (pH - indicator.low) / (indicator.high - indicator.low);
            ic.style.background = mixColors(indicator.colorLow, indicator.colorHigh, t);
          }
        }

        function mixColors(c1, c2, t) {
          const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
          const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
          const r = Math.round(r1 + (r2 - r1) * t);
          const g = Math.round(g1 + (g2 - g1) * t);
          const b = Math.round(b1 + (b2 - b1) * t);
          return `rgb(${r},${g},${b})`;
        }

        function drawBeaker() {
          const w = beakerCanvas.width, h = beakerCanvas.height;
          bctx.clearRect(0, 0, w, h);
          const cx = w / 2;

          // Erlenmeyer
          const erlenTop = 280, erlenBot = 355, erlenWide = 60, erlenNar = 24;
          bctx.fillStyle = "rgba(14,20,36,0.7)";
          bctx.strokeStyle = "rgba(255,255,255,0.2)";
          bctx.lineWidth = 2;
          bctx.beginPath();
          bctx.moveTo(cx - erlenNar, 240);
          bctx.lineTo(cx - erlenWide, erlenTop);
          bctx.lineTo(cx - erlenWide, erlenBot);
          bctx.lineTo(cx + erlenWide, erlenBot);
          bctx.lineTo(cx + erlenWide, erlenTop);
          bctx.lineTo(cx + erlenNar, 240);
          bctx.closePath();
          bctx.stroke();

          // Sıvı seviyesi (erlen içinde)
          const maxLiqH = erlenBot - erlenTop - 4;
          const liqH = maxLiqH * (pair.acidVol + volumeAdded) / (pair.acidVol + pair.eqVol + 10);
          const liqTop = erlenBot - 8 - Math.min(liqH, maxLiqH);
          bctx.fillStyle = getLiquidColor();
          bctx.fillRect(cx - erlenWide + 2, liqTop, erlenWide * 2 - 4, erlenBot - 8 - liqTop);

          // Büret
          const buretX = cx - 90, buretTop = 50, buretBot = 145;
          bctx.strokeStyle = "rgba(255,255,255,0.3)";
          bctx.lineWidth = 1.5;
          // Büret gövdesi
          bctx.fillStyle = "rgba(255,255,255,0.04)";
          bctx.fillRect(buretX - 7, buretTop, 14, buretBot - buretTop);
          bctx.strokeRect(buretX - 7, buretTop, 14, buretBot - buretTop);
          // Büret ucu
          bctx.beginPath();
          bctx.moveTo(buretX - 3, buretBot);
          bctx.lineTo(buretX - 1, buretBot + 20);
          bctx.lineTo(buretX + 1, buretBot + 20);
          bctx.lineTo(buretX + 3, buretBot);
          bctx.stroke();
          // Büret içindeki sıvı
          const buretFillH = (buretBot - buretTop) * (1 - volumeAdded / (pair.eqVol + 5));
          bctx.fillStyle = "rgba(94,234,212,0.25)";
          bctx.fillRect(buretX - 6, buretTop + (buretBot - buretTop) - buretFillH, 12, buretFillH);
          // Musluk
          bctx.fillStyle = "rgba(255,255,255,0.5)";
          bctx.fillRect(buretX - 10, buretBot - 2, 20, 4);
          // Damla
          if (volumeAdded > 0 && volumeAdded < pair.eqVol + 5) {
            bctx.fillStyle = "rgba(94,234,212,0.6)";
            bctx.beginPath();
            bctx.arc(cx, buretBot + 22, 3, 0, Math.PI * 2);
            bctx.fill();
          }

          // pH probu
          bctx.fillStyle = "rgba(255,255,255,0.5)";
          bctx.fillRect(cx + 50, 180, 4, 70);
          bctx.fillRect(cx + 48, 180, 8, 4);
        }

        function getLiquidColor() {
          // pH'a göre sıvı rengi (asidik → nötr → bazik)
          if (pH <= indicator.low) return indicator.colorLow.replace(")", ",0.35)").replace("rgb", "rgba");
          if (pH >= indicator.high) return indicator.colorHigh.replace(")", ",0.35)").replace("rgb", "rgba");
          const t = (pH - indicator.low) / (indicator.high - indicator.low);
          const c = mixColors(indicator.colorLow, indicator.colorHigh, t);
          return c.replace("rgb", "rgba").replace(")", ",0.35)");
        }

        function drawCurve() {
          const W = curveCanvas.width, H = curveCanvas.height;
          cctx.clearRect(0, 0, W, H);

          const margin = { top: 20, right: 30, bottom: 30, left: 45 };
          const pw = W - margin.left - margin.right;
          const ph = H - margin.top - margin.bottom;

          // Arka plan
          cctx.fillStyle = "rgba(14,20,36,0.5)";
          cctx.fillRect(0, 0, W, H);

          // Eksenler
          cctx.strokeStyle = "rgba(255,255,255,0.15)";
          cctx.lineWidth = 1;
          cctx.beginPath();
          cctx.moveTo(margin.left, margin.top);
          cctx.lineTo(margin.left, H - margin.bottom);
          cctx.lineTo(W - margin.right, H - margin.bottom);
          cctx.stroke();

          // Grid
          cctx.strokeStyle = "rgba(255,255,255,0.04)";
          cctx.lineWidth = 0.5;
          for (let i = 0; i <= 14; i += 2) {
            const y = margin.top + ph - (ph * i / 14);
            cctx.beginPath();
            cctx.moveTo(margin.left, y);
            cctx.lineTo(W - margin.right, y);
            cctx.stroke();
            cctx.fillStyle = "rgba(255,255,255,0.3)";
            cctx.font = "10px Outfit, sans-serif";
            cctx.fillText(i, margin.left - 22, y + 4);
          }
          const maxVol = pair.eqVol * 2;
          for (let v = 0; v <= maxVol; v += 10) {
            const x = margin.left + (pw * v / maxVol);
            cctx.beginPath();
            cctx.moveTo(x, margin.top);
            cctx.lineTo(x, H - margin.bottom);
            cctx.stroke();
            cctx.fillText(v, x - 6, H - margin.bottom + 16);
          }

          // Eksen etiketleri
          cctx.fillStyle = "rgba(255,255,255,0.5)";
          cctx.font = "11px Outfit, sans-serif";
          cctx.fillText("pH", margin.left - 36, margin.top + ph / 2);
          cctx.fillText("Eklenen (mL)", margin.left + pw / 2 - 20, H - 4);

          // Eşdeğerlik noktası çizgisi
          const eqX = margin.left + (pw * pair.eqVol / maxVol);
          cctx.strokeStyle = "rgba(251,191,36,0.35)";
          cctx.setLineDash([4, 4]);
          cctx.beginPath();
          cctx.moveTo(eqX, margin.top);
          cctx.lineTo(eqX, H - margin.bottom);
          cctx.stroke();
          cctx.setLineDash([]);
          cctx.fillStyle = "rgba(251,191,36,0.8)";
          cctx.font = "10px Outfit, sans-serif";
          cctx.fillText("Eşd. noktası", eqX + 4, margin.top + 14);

          // Titrasyon eğrisi
          cctx.strokeStyle = "#5eead4";
          cctx.lineWidth = 2;
          cctx.beginPath();
          let first = true;
          for (let i = 0; i < dataPoints.length; i++) {
            const dp = dataPoints[i];
            const x = margin.left + (pw * dp.vol / maxVol);
            const y = margin.top + ph - (ph * dp.pH / 14);
            if (first) { cctx.moveTo(x, y); first = false; }
            else cctx.lineTo(x, y);
          }
          cctx.stroke();

          // Tahmini eğri (hafif çizgi)
          cctx.strokeStyle = "rgba(167,139,250,0.2)";
          cctx.lineWidth = 1;
          cctx.beginPath();
          first = true;
          for (let v = 0; v <= maxVol; v += 0.25) {
            const p = calcPH(v);
            const x = margin.left + (pw * v / maxVol);
            const y = margin.top + ph - (ph * p / 14);
            if (first) { cctx.moveTo(x, y); first = false; }
            else cctx.lineTo(x, y);
          }
          cctx.stroke();
        }

        function addDrop(mL) {
          volumeAdded = Math.round((volumeAdded + mL) * 10) / 10;
          if (volumeAdded > pair.eqVol + 10) volumeAdded = pair.eqVol + 10;
          update();
        }

        function reset() {
          stopAuto();
          volumeAdded = 0;
          dataPoints = [];
          eqReached = false;
          update();
        }

        function stopAuto() {
          autoRunning = false;
          if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
          document.getElementById("autoBtn").textContent = "▶️ Otomatik titrasyon";
        }

        function startAuto() {
          if (autoRunning) { stopAuto(); return; }
          if (volumeAdded >= pair.eqVol + 10) reset();
          autoRunning = true;
          document.getElementById("autoBtn").textContent = "⏸️ Durdur";
          autoTimer = setInterval(() => {
            if (volumeAdded >= pair.eqVol + 10) { stopAuto(); return; }
            const step = volumeAdded < pair.eqVol - 1 ? 0.5 : 0.1;
            addDrop(step);
          }, 200);
        }

        document.getElementById("dropBtn").addEventListener("click", () => addDrop(0.5));
        document.getElementById("drop10Btn").addEventListener("click", () => addDrop(5));
        document.getElementById("autoBtn").addEventListener("click", startAuto);
        document.getElementById("resetBtn").addEventListener("click", reset);

        document.getElementById("pairSelect").addEventListener("change", function () {
          pair = PAIRS[this.value];
          reset();
        });
        document.getElementById("indicatorSelect").addEventListener("change", function () {
          indicator = INDICATORS[this.value];
          update();
        });

        update();
      })();
    </script>
  </body>
</html>
