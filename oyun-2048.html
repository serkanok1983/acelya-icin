<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="shared/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>2048</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1510;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      min-height: 100dvh;
    }
    .hud {
      flex-shrink: 0;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
      text-align: center;
    }
    .hud h1 { margin: 0 0 4px; font-size: clamp(1rem, 4vw, 1.5rem); font-weight: 600; }
    #status { font-size: clamp(0.85rem, 3.5vw, 1.15rem); opacity: 0.95; }
    .hint { margin: 6px 0 0; font-size: clamp(0.7rem, 2.8vw, 0.8rem); opacity: 0.65; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    button {
      font-size: 15px;
      padding: 8px 14px;
      background: #8f7a66;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #9f8b76; }
    .game-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px max(10px, env(safe-area-inset-bottom));
    }
    #gameCanvas {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
      touch-action: none;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="oyun-2048">

<header class="hud">
  <h1>2048</h1>
  <div id="status">Skor: <span id="score">0</span> · En iyi: <span id="best">0</span></div>
  <div class="controls">
    <button type="button" id="btnNew">Yeni Oyun</button>
  </div>
  <p class="hint">Ok tuşları veya kaydır · Aynı sayıları birleştir, 2048’e ulaş!</p>
</header>

<div class="game-stage">
  <canvas id="gameCanvas" width="520" height="520" role="img" aria-label="2048 oyun tahtası"></canvas>
</div>

<script>
  const GAME_W = 520;
  const GAME_H = 520;
  const N = 4;
  const PAD = 14;
  const GAP = 12;

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = GAME_W;
  canvas.height = GAME_H;

  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  let best = 0;
  let gameOverRecorded = false;

  let fx = { burst() {}, pop() {}, shake() {}, flash() {}, update() {}, draw() {} };
  window.addEventListener("acelya-game-ready", () => {
    if (window.AcelyaHooks) fx = AcelyaHooks.bindJuice(canvas);
    const user = window.AcelyaAuth?.getCurrentUser();
    if (user && window.AcelyaLeaderboard) {
      AcelyaLeaderboard.fetch("oyun-2048").then((s) => {
        best = s[user] || 0;
        bestEl.textContent = best;
      });
    }
  });

  function resizeGame() {
    const hud = document.querySelector(".hud");
    const hudBottom = hud.getBoundingClientRect().bottom;
    const padX = 20;
    const padY = 16;
    const availW = window.innerWidth - padX;
    const availH = window.innerHeight - hudBottom - padY;
    const scale = Math.min(availW / GAME_W, availH / GAME_H) * 0.98;
    const w = Math.max(260, GAME_W * scale);
    const h = w;
    canvas.style.width = `${w}px`;
    canvas.style.height = `${h}px`;
  }
  window.addEventListener("resize", resizeGame);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeGame);
  resizeGame();

  const COLORS = {
    0: ["#cdc1b4", "#bbada0"],
    2: ["#eee4da", "#776e65"],
    4: ["#ede0c8", "#776e65"],
    8: ["#f2b179", "#f9f6f2"],
    16: ["#f59563", "#f9f6f2"],
    32: ["#f67c5f", "#f9f6f2"],
    64: ["#f65e3b", "#f9f6f2"],
    128: ["#edcf72", "#f9f6f2"],
    256: ["#edcc61", "#f9f6f2"],
    512: ["#edc850", "#f9f6f2"],
    1024: ["#edc53f", "#f9f6f2"],
    2048: ["#edc22e", "#f9f6f2"],
  };

  let grid, score, won, over;

  function playMerge() { window.AcelyaSounds?.hit(); }
  function playGameOver() { window.AcelyaSounds?.explode(); }

  function emptyGrid() {
    return Array.from({ length: N }, () => Array(N).fill(0));
  }

  function cellSize() {
    return (GAME_W - PAD * 2 - GAP * (N - 1)) / N;
  }

  function spawn() {
    const empty = [];
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (!grid[r][c]) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function newGame() {
    grid = emptyGrid();
    score = 0;
    won = false;
    over = false;
    gameOverRecorded = false;
    scoreEl.textContent = "0";
    spawn();
    spawn();
    draw();
  }

  function slide(row) {
    const arr = row.filter((x) => x);
    const out = [];
    let gained = 0;
    for (let i = 0; i < arr.length; i++) {
      if (arr[i] && arr[i] === arr[i + 1]) {
        const v = arr[i] * 2;
        out.push(v);
        gained += v;
        if (v === 2048) won = true;
        i++;
      } else out.push(arr[i] || 0);
    }
    while (out.length < N) out.push(0);
    return { row: out, gained, changed: out.some((v, i) => v !== row[i]) };
  }

  function rotateRight(g) {
    return g[0].map((_, i) => g.map((row) => row[N - 1 - i]));
  }

  function move(dir) {
    if (over) return;
    let rotations = { left: 0, up: 3, right: 2, down: 1 }[dir];
    let g = grid.map((r) => r.slice());
    for (let i = 0; i < rotations; i++) g = rotateRight(g);
    let moved = false;
    let gained = 0;
    const next = [];
    for (let r = 0; r < N; r++) {
      const res = slide(g[r]);
      next.push(res.row);
      if (res.changed) moved = true;
      gained += res.gained;
    }
    g = next;
    for (let i = 0; i < (4 - rotations) % 4; i++) g = rotateRight(g);
    if (!moved) {
      if (!canMove()) {
        if (!over) {
          playGameOver();
          record2048End();
        }
        over = true;
      }
      draw();
      return;
    }
    grid = g;
    score += gained;
    if (gained > 0) {
      playMerge();
      fx.shake(3);
      fx.flash(0.08);
    }
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
    }
    spawn();
    if (!canMove()) {
      if (!over) {
        playGameOver();
        record2048End();
      }
      over = true;
    }
    draw();
  }

  function record2048End() {
    if (gameOverRecorded) return;
    gameOverRecorded = true;
    fx.shake(10);
    window.AcelyaHooks?.recordScore(score);
  }

  function canMove() {
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++) {
        const v = grid[r][c];
        if (!v) return true;
        if (c < N - 1 && grid[r][c + 1] === v) return true;
        if (r < N - 1 && grid[r + 1][c] === v) return true;
      }
    return false;
  }

  function draw() {
    const cs = cellSize();
    ctx.fillStyle = "#bbada0";
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const v = grid[r][c];
        const x = PAD + c * (cs + GAP);
        const y = PAD + r * (cs + GAP);
        const pal = COLORS[v] || ["#3c3a32", "#f9f6f2"];
        ctx.fillStyle = pal[0];
        roundRect(x, y, cs, cs, 6);
        ctx.fill();
        if (v) {
          ctx.fillStyle = pal[1];
          ctx.font = `bold ${v >= 1000 ? cs * 0.32 : cs * 0.42}px system-ui`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(v), x + cs / 2, y + cs / 2);
        }
      }
    }
    if (over) {
      ctx.fillStyle = "rgba(238, 228, 218, 0.73)";
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      ctx.fillStyle = "#776e65";
      ctx.font = "bold 36px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(won ? "2048’e ulaştın! 🎉" : "Oyun Bitti", GAME_W / 2, GAME_H / 2 - 20);
      ctx.font = "18px system-ui";
      ctx.fillText("Yeni Oyun’a bas", GAME_W / 2, GAME_H / 2 + 24);
    }
    fx.update();
    fx.draw(ctx, GAME_W, GAME_H);
    if (over) return;
    if (won) {
      ctx.fillStyle = "rgba(237, 194, 46, 0.35)";
      ctx.fillRect(PAD, PAD, GAME_W - PAD * 2, 28);
      ctx.fillStyle = "#776e65";
      ctx.font = "bold 16px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("2048! Devam edebilirsin.", GAME_W / 2, PAD + 18);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  document.addEventListener("keydown", (e) => {
    const map = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  let touchX = 0, touchY = 0;
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
  }, { passive: false });
  canvas.addEventListener("touchend", (e) => {
    e.preventDefault();
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "right" : "left");
    else move(dy > 0 ? "down" : "up");
  }, { passive: false });

  document.getElementById("btnNew").addEventListener("click", newGame);
  newGame();
</script></body>
</html>
