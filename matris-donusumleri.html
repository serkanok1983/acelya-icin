<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Matris Dönüşümleri (2B)</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; min-height: 100dvh; }
    .app-content {
      max-width: 1020px;
      margin: 0 auto;
      padding: 0 12px 24px;
    }
    .hud {
      text-align: center;
      padding: 10px 14px 4px;
    }
    .hud h1 {
      margin: 0;
      font-size: clamp(1.05rem, 3.8vw, 1.35rem);
      font-weight: 600;
      color: var(--text);
    }
    .stage-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .stage-row canvas {
      background: #0a0f1a;
      border-radius: var(--radius);
      box-shadow: 0 0 0 1px var(--border);
      max-width: 100%;
    }
    .controls-section {
      max-width: 600px;
      margin: 0 auto 10px;
    }
    .slider-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .slider-group h3 {
      margin: 0 0 8px;
      font-size: 0.82rem;
      color: var(--accent-2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .slider-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .slider-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex: 1 1 120px;
      min-width: 100px;
    }
    .slider-item input[type="range"] {
      flex: 1;
      accent-color: var(--accent-2);
      min-width: 50px;
    }
    .slider-item span {
      color: var(--accent);
      font-weight: 600;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .matrix-display {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .matrix-display h3 {
      margin: 0 0 6px;
      font-size: 0.82rem;
      color: var(--accent-2);
    }
    .matrix-display pre {
      margin: 0;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
      color: var(--accent);
      line-height: 1.7;
      background: rgba(0,0,0,0.2);
      padding: 8px 12px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 720px;
      margin: 0 auto;
    }
    .info-card {
      flex: 1 1 150px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      text-align: center;
    }
    .info-card h3 {
      margin: 0 0 4px;
      font-size: 0.78rem;
      color: var(--accent-2);
    }
    .info-card p {
      margin: 0;
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="matris-donusumleri">
<div class="app-content">
<div class="hud">
  <h1>Matris Dönüşümleri (2B)</h1>
</div>

<div class="stage-row">
  <canvas id="origCanvas" width="320" height="320" role="img" aria-label="Orijinal şekil"></canvas>
  <canvas id="transCanvas" width="320" height="320" role="img" aria-label="Dönüştürülmüş şekil"></canvas>
</div>

<div class="controls-section">
  <div class="slider-group">
    <h3>Ölçekleme</h3>
    <div class="slider-row">
      <div class="slider-item">
        <label>Sx</label>
        <input type="range" id="scaleX" min="-3" max="3" value="1" step="0.05">
        <span id="scaleXVal">1.00</span>
      </div>
      <div class="slider-item">
        <label>Sy</label>
        <input type="range" id="scaleY" min="-3" max="3" value="1" step="0.05">
        <span id="scaleYVal">1.00</span>
      </div>
    </div>
  </div>

  <div class="slider-group">
    <h3>Döndürme</h3>
    <div class="slider-row">
      <div class="slider-item">
        <label>Açı (°)</label>
        <input type="range" id="rotate" min="-180" max="180" value="0" step="1">
        <span id="rotateVal">0°</span>
      </div>
    </div>
  </div>

  <div class="slider-group">
    <h3>Kaydırma (Shear)</h3>
    <div class="slider-row">
      <div class="slider-item">
        <label>Shx</label>
        <input type="range" id="shearX" min="-2" max="2" value="0" step="0.05">
        <span id="shearXVal">0.00</span>
      </div>
      <div class="slider-item">
        <label>Shy</label>
        <input type="range" id="shearY" min="-2" max="2" value="0" step="0.05">
        <span id="shearYVal">0.00</span>
      </div>
    </div>
  </div>

  <div class="slider-group">
    <h3>Yansıtma</h3>
    <div class="slider-row" style="gap:12px;">
      <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;color:var(--text-muted);cursor:pointer;">
        <input type="checkbox" id="reflectX"> X eksenine göre
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:0.8rem;color:var(--text-muted);cursor:pointer;">
        <input type="checkbox" id="reflectY"> Y eksenine göre
      </label>
    </div>
  </div>

  <div class="matrix-display">
    <h3>Dönüşüm Matrisi</h3>
    <pre id="matrixText"></pre>
  </div>

  <div class="info-row">
    <div class="info-card">
      <h3>Determinant</h3>
      <p id="detVal">—</p>
    </div>
    <div class="info-card">
      <h3>Özdeğerler</h3>
      <p id="eigenVal">—</p>
    </div>
    <div class="info-card">
      <h3>Alan Çarpanı</h3>
      <p id="areaVal">—</p>
    </div>
  </div>
</div>
</div>

<script>
(function () {
  const origCanvas = document.getElementById("origCanvas");
  const origCtx = origCanvas.getContext("2d");
  const transCanvas = document.getElementById("transCanvas");
  const transCtx = transCanvas.getContext("2d");

  const SZ = 320;
  const half = SZ / 2;

  // Shape vertices (house-like polygon)
  const baseShape = [
    { x: -40, y:  40 },  // bottom-left
    { x:  40, y:  40 },  // bottom-right
    { x:  40, y:   0 },  // right of door
    { x:  20, y:   0 },  // right-wall bottom
    { x:  20, y: -20 },  // right-wall top
    { x:  40, y: -20 },  // right-roof
    { x:   0, y: -60 },  // roof peak
    { x: -40, y: -20 },  // left-roof
    { x: -20, y: -20 },  // left-wall top
    { x: -20, y:   0 },  // left-wall bottom
    { x: -40, y:   0 },  // left of door
  ];

  function getTransformMatrix() {
    const sx = +document.getElementById("scaleX").value;
    const sy = +document.getElementById("scaleY").value;
    const angleDeg = +document.getElementById("rotate").value;
    const angle = angleDeg * Math.PI / 180;
    const shx = +document.getElementById("shearX").value;
    const shy = +document.getElementById("shearY").value;
    const refX = document.getElementById("reflectX").checked;
    const refY = document.getElementById("reflectY").checked;

    // Scale matrix
    let m = [
      [sx, 0],
      [0, sy],
    ];

    // Shear
    if (shx !== 0 || shy !== 0) {
      const shearMat = [
        [1, shx],
        [shy, 1],
      ];
      m = matMul(shearMat, m);
    }

    // Rotation
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    const rotMat = [
      [cos, -sin],
      [sin, cos],
    ];
    m = matMul(rotMat, m);

    // Reflection
    if (refX) {
      // Reflect across X axis: negate y
      const refMatX = [
        [1, 0],
        [0, -1],
      ];
      m = matMul(refMatX, m);
    }
    if (refY) {
      // Reflect across Y axis: negate x
      const refMatY = [
        [-1, 0],
        [0, 1],
      ];
      m = matMul(refMatY, m);
    }

    return m;
  }

  function matMul(A, B) {
    return [
      [A[0][0] * B[0][0] + A[0][1] * B[1][0], A[0][0] * B[0][1] + A[0][1] * B[1][1]],
      [A[1][0] * B[0][0] + A[1][1] * B[1][0], A[1][0] * B[0][1] + A[1][1] * B[1][1]],
    ];
  }

  function transformPoint(pt, M) {
    return {
      x: M[0][0] * pt.x + M[0][1] * pt.y,
      y: M[1][0] * pt.x + M[1][1] * pt.y,
    };
  }

  function drawShape(ctx, shape, M, color, label) {
    ctx.strokeStyle = color;
    ctx.fillStyle = color.replace("0.8", "0.12").replace("0.9", "0.12");
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < shape.length; i++) {
      const p = transformPoint(shape[i], M);
      const sx = half + p.x;
      const sy = half - p.y;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Vertices
    ctx.fillStyle = color;
    for (let i = 0; i < shape.length; i++) {
      const p = transformPoint(shape[i], M);
      const sx = half + p.x;
      const sy = half - p.y;
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawGrid(ctx) {
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 0.5;
    const step = 32;
    for (let x = step; x < SZ; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, SZ);
      ctx.stroke();
    }
    for (let y = step; y < SZ; y += step) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(SZ, y);
      ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(half, 0);
    ctx.lineTo(half, SZ);
    ctx.moveTo(0, half);
    ctx.lineTo(SZ, half);
    ctx.stroke();
  }

  function updateMatrixDisplay(M) {
    const a = M[0][0], b = M[0][1];
    const c = M[1][0], d = M[1][1];
    const det = a * d - b * c;

    // Eigenvalues: solve λ² - (a+d)λ + (ad-bc) = 0
    const trace = a + d;
    const disc = trace * trace - 4 * det;
    let eigenStr;
    if (disc >= 0) {
      const sqrtD = Math.sqrt(disc);
      const l1 = (trace + sqrtD) / 2;
      const l2 = (trace - sqrtD) / 2;
      eigenStr = "λ₁=" + l1.toFixed(3) + "  λ₂=" + l2.toFixed(3) + " (reel)";
    } else {
      const sqrtD = Math.sqrt(-disc);
      const real = trace / 2;
      const imag = sqrtD / 2;
      eigenStr = "λ₁=" + real.toFixed(3) + "+" + imag.toFixed(3) + "i  λ₂=" + real.toFixed(3) + "−" + imag.toFixed(3) + "i";
    }

    document.getElementById("matrixText").textContent =
      "┌           ┐\n" +
      "│ " + a.toFixed(3).padStart(7) + "  " + b.toFixed(3).padStart(7) + " │\n" +
      "│ " + c.toFixed(3).padStart(7) + "  " + d.toFixed(3).padStart(7) + " │\n" +
      "└           ┘";

    document.getElementById("detVal").textContent = det.toFixed(4);
    document.getElementById("eigenVal").textContent = eigenStr;
    document.getElementById("areaVal").textContent = Math.abs(det).toFixed(4) + "×";
  }

  function draw() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    // Original
    origCanvas.width = SZ * dpr;
    origCanvas.height = SZ * dpr;
    origCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    origCtx.fillStyle = "#0a0f1a";
    origCtx.fillRect(0, 0, SZ, SZ);
    drawGrid(origCtx);
    const identity = [[1, 0], [0, 1]];
    drawShape(origCtx, baseShape, identity, "rgba(167,139,250,0.8)", "Orijinal");
    origCtx.fillStyle = "rgba(255,255,255,0.6)";
    origCtx.font = "12px system-ui";
    origCtx.fillText("Orijinal Şekil", 10, 20);

    // Transformed
    transCanvas.width = SZ * dpr;
    transCanvas.height = SZ * dpr;
    transCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    transCtx.fillStyle = "#0a0f1a";
    transCtx.fillRect(0, 0, SZ, SZ);
    drawGrid(transCtx);

    const M = getTransformMatrix();
    drawShape(transCtx, baseShape, M, "rgba(94,234,212,0.8)", "Dönüştürülmüş");

    // Also draw original as ghost
    drawShape(transCtx, baseShape, identity, "rgba(167,139,250,0.2)", "");

    transCtx.fillStyle = "rgba(255,255,255,0.6)";
    transCtx.font = "12px system-ui";
    transCtx.fillText("Dönüştürülmüş Şekil", 10, 20);

    updateMatrixDisplay(M);
  }

  function resize() {
    const hud = document.querySelector(".hud");
    const top = hud.getBoundingClientRect().bottom;
    const pad = 24;
    const availW = window.innerWidth - pad;
    const scale = Math.min(availW / (SZ * 2 + 12), 1);
    const size = Math.floor(SZ * scale);
    origCanvas.style.width = size + "px";
    origCanvas.style.height = size + "px";
    transCanvas.style.width = size + "px";
    transCanvas.style.height = size + "px";
    draw();
  }

  // Bind all inputs
  const inputs = ["scaleX", "scaleY", "rotate", "shearX", "shearY"];
  inputs.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener("input", () => {
      const val = +el.value;
      const valId = id + "Val";
      const display = document.getElementById(valId);
      if (id === "rotate") display.textContent = val + "°";
      else display.textContent = val.toFixed(2);
      draw();
    });
  });

  document.getElementById("reflectX").addEventListener("change", draw);
  document.getElementById("reflectY").addEventListener("change", draw);

  window.addEventListener("resize", resize);

  draw();
  resize();
})();
</script>
</body>
</html>
