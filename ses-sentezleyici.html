<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ses Sentezleyici</title>
  <style>
    * { box-sizing: border-box; }
    .app-content { max-width: 780px; }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
    }

    .viz-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    @media (max-width: 580px) {
      .viz-row { grid-template-columns: 1fr; }
    }

    .viz-box {
      background: #0c1018;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .viz-box .viz-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 6px 10px 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    canvas {
      display: block;
      width: 100%;
      height: 120px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-item label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .control-item label span {
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent-2);
    }

    select {
      width: 100%;
      padding: 8px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.82rem;
    }

    select:focus {
      outline: 2px solid var(--accent-2);
      outline-offset: 1px;
    }

    .piano-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin: 10px 0;
    }

    .note-btn {
      width: 56px;
      height: 72px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(180deg, #1a1f2e 0%, #0f131d 100%);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: var(--font);
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background 0.1s, border-color 0.1s;
    }

    .note-btn:active, .note-btn.pressed {
      background: linear-gradient(180deg, rgba(94,234,212,0.25) 0%, rgba(94,234,212,0.12) 100%);
      border-color: var(--accent);
      color: var(--accent);
    }

    .note-btn .note-name {
      font-size: 0.9rem;
      font-weight: 700;
    }

    .note-btn .note-freq {
      font-size: 0.6rem;
      color: var(--text-muted);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), #2dd4bf);
    }

    button.primary:hover { filter: brightness(1.08); }

    button.stop-btn {
      background: linear-gradient(135deg, #f87171, #dc2626);
    }

    button.stop-btn:hover { filter: brightness(1.08); }

    .main-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .main-controls .freq-display {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      min-width: 80px;
    }

    .adsr-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    @media (max-width: 500px) {
      .adsr-grid { grid-template-columns: repeat(2, 1fr); }
      .note-btn { width: 44px; height: 60px; }
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="ses-sentezleyici">
<div class="app-content">

  <!-- Dalga Formu ve Spektrum Görselleştirme -->
  <div class="viz-row">
    <div class="viz-box">
      <div class="viz-label">Dalga Formu (Zaman)</div>
      <canvas id="waveCanvas"></canvas>
    </div>
    <div class="viz-box">
      <div class="viz-label">Frekans Spektrumu (FFT)</div>
      <canvas id="fftCanvas"></canvas>
    </div>
  </div>

  <!-- Ana Kontroller -->
  <div class="panel">
    <h2>🎛️ Ses Kontrolleri</h2>
    <div class="main-controls">
      <span class="freq-display" id="freqDisplay">440 Hz</span>
      <div style="flex:1; min-width:140px">
        <label style="display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-muted)">
          Frekans <span style="color:var(--accent); font-weight:600" id="freqVal">440</span> Hz
        </label>
        <input type="range" id="freqSlider" min="20" max="2000" value="440" step="1">
      </div>
    </div>
    <div class="control-grid">
      <div class="control-item">
        <label>Dalga Formu</label>
        <select id="waveType">
          <option value="sine">Sinüs</option>
          <option value="square">Kare</option>
          <option value="sawtooth">Testere</option>
          <option value="triangle">Üçgen</option>
        </select>
      </div>
      <div class="control-item">
        <label>Ses Seviyesi <span id="volVal">0.3</span></label>
        <input type="range" id="volSlider" min="0" max="1" value="0.3" step="0.01">
      </div>
    </div>
  </div>

  <!-- ADSR Zarfı -->
  <div class="panel">
    <h2>📈 ADSR Zarfı</h2>
    <div class="adsr-grid">
      <div class="control-item">
        <label>Attack <span id="attVal">0.1</span> s</label>
        <input type="range" id="attSlider" min="0.01" max="2" value="0.1" step="0.01">
      </div>
      <div class="control-item">
        <label>Decay <span id="decVal">0.2</span> s</label>
        <input type="range" id="decSlider" min="0.01" max="2" value="0.2" step="0.01">
      </div>
      <div class="control-item">
        <label>Sustain <span id="susVal">0.5</span></label>
        <input type="range" id="susSlider" min="0" max="1" value="0.5" step="0.01">
      </div>
      <div class="control-item">
        <label>Release <span id="relVal">0.5</span> s</label>
        <input type="range" id="relSlider" min="0.01" max="3" value="0.5" step="0.01">
      </div>
    </div>
  </div>

  <!-- Nota Butonları -->
  <div class="panel">
    <h2>🎹 Notalar</h2>
    <div class="piano-row" id="pianoRow">
      <!-- JS ile doldurulacak -->
    </div>
    <div class="btn-row">
      <button class="primary" id="startBtn">▶ Başlat</button>
      <button class="stop-btn" id="stopBtn">⏹ Durdur</button>
    </div>
  </div>

</div>

<script>
(function() {
  // Audio Context
  let audioCtx = null;
  let oscillator = null;
  let gainNode = null;
  let analyser = null;
  let isPlaying = false;
  let currentFreq = 440;
  let currentType = "sine";
  let currentVolume = 0.3;
  let attack = 0.1, decay = 0.2, sustain = 0.5, release = 0.5;

  // Nota frekansları (A4=440 Hz eşit tamperaman)
  const notes = [
    { name: "Do", freq: 261.63 },
    { name: "Re", freq: 293.66 },
    { name: "Mi", freq: 329.63 },
    { name: "Fa", freq: 349.23 },
    { name: "Sol", freq: 392.00 },
    { name: "La", freq: 440.00 },
    { name: "Si", freq: 493.88 },
  ];

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function stopOscillator() {
    if (oscillator) {
      try { oscillator.stop(); } catch(e) {}
      oscillator.disconnect();
      oscillator = null;
    }
    if (gainNode) {
      gainNode.disconnect();
      gainNode = null;
    }
    isPlaying = false;
    updatePlayButtons();
  }

  function startOscillator(freq, type, vol, adsr) {
    stopOscillator();
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    oscillator = ctx.createOscillator();
    gainNode = ctx.createGain();

    oscillator.type = type || currentType;
    oscillator.frequency.setValueAtTime(freq || currentFreq, now);

    const a = adsr?.attack ?? attack;
    const d = adsr?.decay ?? decay;
    const s = adsr?.sustain ?? sustain;
    const r = adsr?.release ?? release;
    const v = vol ?? currentVolume;

    // ADSR zarfı
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(v, now + a);
    gainNode.gain.linearRampToValueAtTime(v * s, now + a + d);

    oscillator.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(ctx.destination);

    oscillator.start(now);
    isPlaying = true;
    updatePlayButtons();
  }

  function releaseOscillator() {
    if (!oscillator || !gainNode) return;
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
    gainNode.gain.linearRampToValueAtTime(0, now + release);

    oscillator.stop(now + release + 0.05);
    oscillator.onended = () => {
      oscillator = null;
      gainNode = null;
      isPlaying = false;
      updatePlayButtons();
    };
  }

  function updatePlayButtons() {
    document.getElementById("startBtn").textContent = isPlaying ? "⏸ Değiştir" : "▶ Başlat";
  }

  // Analyser kurulumu
  function setupAnalyser() {
    const ctx = getAudioCtx();
    analyser = ctx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.connect(ctx.destination);
  }

  // Canvas çizimi
  const waveCanvas = document.getElementById("waveCanvas");
  const fftCanvas = document.getElementById("fftCanvas");
  const waveCtx = waveCanvas.getContext("2d");
  const fftCtx = fftCanvas.getContext("2d");

  function resizeCanvases() {
    const dpr = window.devicePixelRatio || 1;
    for (const c of [waveCanvas, fftCanvas]) {
      const rect = c.getBoundingClientRect();
      c.width = rect.width * dpr;
      c.height = rect.height * dpr;
      c.getContext("2d").scale(dpr, dpr);
      c._displayW = rect.width;
      c._displayH = rect.height;
    }
  }

  function drawWave() {
    if (!analyser) return;
    const W = waveCanvas._displayW || waveCanvas.width;
    const H = waveCanvas._displayH || waveCanvas.height;
    const ctx = waveCtx;
    const bufferLength = analyser.fftSize;
    const dataArray = new Float32Array(bufferLength);

    analyser.getFloatTimeDomainData(dataArray);

    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue("--accent").trim() || "#5eead4";
    ctx.lineWidth = 1.5;
    ctx.shadowColor = "rgba(94,234,212,0.4)";
    ctx.shadowBlur = 4;

    const sliceWidth = W / bufferLength;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
      const y = (dataArray[i] * 0.8 + 0.5) * H;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      x += sliceWidth;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawFFT() {
    if (!analyser) return;
    const W = fftCanvas._displayW || fftCanvas.width;
    const H = fftCanvas._displayH || fftCanvas.height;
    const ctx = fftCtx;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, W, H);

    const barWidth = (W / bufferLength) * 2.5;
    const accentColor = getComputedStyle(document.body).getPropertyValue("--accent-2").trim() || "#a78bfa";
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
      const barHeight = (dataArray[i] / 255) * H;
      const hue = (i / bufferLength) * 270 + 200;
      ctx.fillStyle = `hsla(${hue}, 70%, 65%, 0.7)`;
      ctx.fillRect(x, H - barHeight, barWidth, barHeight);
      x += barWidth + 1;
      if (x > W) break;
    }
  }

  function animate() {
    drawWave();
    drawFFT();
    requestAnimationFrame(animate);
  }

  // Nota butonlarını oluştur
  function buildPiano() {
    const row = document.getElementById("pianoRow");
    row.innerHTML = "";
    notes.forEach(n => {
      const btn = document.createElement("button");
      btn.className = "note-btn";
      btn.innerHTML = `<span class="note-name">${n.name}</span><span class="note-freq">${Math.round(n.freq)} Hz</span>`;
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        btn.classList.add("pressed");
        currentFreq = n.freq;
        document.getElementById("freqSlider").value = n.freq;
        document.getElementById("freqVal").textContent = Math.round(n.freq);
        document.getElementById("freqDisplay").textContent = Math.round(n.freq) + " Hz";
        startOscillator(n.freq);
      });
      btn.addEventListener("pointerup", () => {
        btn.classList.remove("pressed");
        releaseOscillator();
      });
      btn.addEventListener("pointerleave", () => {
        btn.classList.remove("pressed");
        if (isPlaying) releaseOscillator();
      });
      row.appendChild(btn);
    });
  }

  // DOM referansları
  const freqSlider = document.getElementById("freqSlider");
  const freqVal = document.getElementById("freqVal");
  const freqDisplay = document.getElementById("freqDisplay");
  const waveType = document.getElementById("waveType");
  const volSlider = document.getElementById("volSlider");
  const volVal = document.getElementById("volVal");
  const attSlider = document.getElementById("attSlider");
  const attVal = document.getElementById("attVal");
  const decSlider = document.getElementById("decSlider");
  const decVal = document.getElementById("decVal");
  const susSlider = document.getElementById("susSlider");
  const susVal = document.getElementById("susVal");
  const relSlider = document.getElementById("relSlider");
  const relVal = document.getElementById("relVal");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");

  freqSlider.addEventListener("input", () => {
    currentFreq = +freqSlider.value;
    freqVal.textContent = freqSlider.value;
    freqDisplay.textContent = freqSlider.value + " Hz";
    if (oscillator) {
      oscillator.frequency.setValueAtTime(currentFreq, getAudioCtx().currentTime);
    }
  });

  waveType.addEventListener("change", () => {
    currentType = waveType.value;
    if (oscillator) {
      oscillator.type = currentType;
    }
  });

  volSlider.addEventListener("input", () => {
    currentVolume = +volSlider.value;
    volVal.textContent = parseFloat(currentVolume).toFixed(2);
    if (gainNode) {
      gainNode.gain.setValueAtTime(currentVolume * sustain, getAudioCtx().currentTime);
    }
  });

  attSlider.addEventListener("input", () => { attack = +attSlider.value; attVal.textContent = attack; });
  decSlider.addEventListener("input", () => { decay = +decSlider.value; decVal.textContent = decay; });
  susSlider.addEventListener("input", () => { sustain = +susSlider.value; susVal.textContent = sustain; });
  relSlider.addEventListener("input", () => { release = +relSlider.value; relVal.textContent = release; });

  startBtn.addEventListener("click", () => {
    setupAnalyser();
    startOscillator();
  });

  stopBtn.addEventListener("click", () => {
    releaseOscillator();
  });

  // İlk kurulum
  buildPiano();
  setupAnalyser();
  resizeCanvases();
  window.addEventListener("resize", resizeCanvases);
  animate();
})();
</script>
</body>
</html>
