<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Snake 🐍</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="shared/theme.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #06080f;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      min-height: 100dvh;
    }
    .hud {
      flex-shrink: 0;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
      text-align: center;
      position: relative;
      z-index: 3;
    }
    .hud h1 {
      margin: 0 0 4px;
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 600;
    }
    #score {
      font-size: clamp(0.85rem, 3.5vw, 1.15rem);
      opacity: 0.95;
    }
    .hint {
      margin: 6px 0 0;
      font-size: clamp(0.7rem, 2.8vw, 0.8rem);
      opacity: 0.65;
    }
    .game-stage {
      flex: 1;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px max(10px, env(safe-area-inset-bottom));
      position: relative;
      z-index: 3;
    }
    #snakeCanvas {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.25), 0 8px 32px rgba(0, 0, 0, 0.45);
      touch-action: none;
      background: #0a2e0a;
    }
  </style>
  <script src="shared/icons.js"></script>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="snake">

<header class="hud">
  <h1>Snake 🐍</h1>
  <div id="score">Skor: <span id="scoreValue">0</span></div>
  <p class="hint">Ok tuşları · Mobil: kaydırarak yön değiştir</p>
</header>

<div class="game-stage">
  <canvas id="snakeCanvas" width="800" height="800" role="img" aria-label="Yilan oyun alani"></canvas>
</div>

<script>
  const GAME_W = 800;
  const GAME_H = 800;
  const CELL = 20;
  const GRID = GAME_W / CELL;

  const canvas = document.getElementById("snakeCanvas");
  const ctx = canvas.getContext("2d");
  if (!ctx) throw new Error("Canvas desteklenmiyor");

  let fx = window.AcelyaHooks?.noop || {
    get: () => null,
    burst() {},
    pop() {},
    shake() {},
    flash() {},
    update() {},
    draw() {},
  };
  window.addEventListener("acelya-game-ready", () => {
    if (window.AcelyaHooks) fx = AcelyaHooks.bindJuice(canvas);
    resizeGame();
  });

  function resizeGame() {
    const hud = document.querySelector(".hud");
    if (!hud) return;
    const hudBottom = hud.getBoundingClientRect().bottom;
    const padX = 20;
    const padY = 16;
    const availW = window.innerWidth - padX;
    const availH = window.innerHeight - hudBottom - padY;
    const scale = Math.min(availW / GAME_W, availH / GAME_H) * 0.98;
    const w = Math.max(260, GAME_W * scale);
    const h = w;
    canvas.style.width = `${w}px`;
    canvas.style.height = `${h}px`;
  }

  window.addEventListener("resize", resizeGame);
  window.addEventListener("load", resizeGame);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", resizeGame);
  }

  let snake = [{ x: Math.floor(GRID / 2) * CELL, y: Math.floor(GRID / 2) * CELL }];
  let food = randomFood();
  let direction = "RIGHT";
  let nextDirection = "RIGHT";
  let speed = 120;
  let score = 0;
  let gameOver = false;
  let lastTick = 0;

  function playEat() {
    window.AcelyaSounds?.hit();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" && direction !== "DOWN") nextDirection = "UP";
    if (e.key === "ArrowDown" && direction !== "UP") nextDirection = "DOWN";
    if (e.key === "ArrowLeft" && direction !== "RIGHT") nextDirection = "LEFT";
    if (e.key === "ArrowRight" && direction !== "LEFT") nextDirection = "RIGHT";
  });

  let touchStartX = 0;
  let touchStartY = 0;

  canvas.addEventListener(
    "touchstart",
    (e) => {
      e.preventDefault();
      if (e.touches.length) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }
    },
    { passive: false }
  );

  canvas.addEventListener(
    "touchmove",
    (e) => {
      e.preventDefault();
      if (!e.touches.length) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction !== "LEFT") nextDirection = "RIGHT";
        else if (dx < 0 && direction !== "RIGHT") nextDirection = "LEFT";
      } else {
        if (dy > 0 && direction !== "UP") nextDirection = "DOWN";
        else if (dy < 0 && direction !== "DOWN") nextDirection = "UP";
      }
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    },
    { passive: false }
  );

  function randomFood() {
    let x;
    let y;
    let tries = 0;
    do {
      x = Math.floor(Math.random() * GRID) * CELL;
      y = Math.floor(Math.random() * GRID) * CELL;
      tries++;
    } while (snake.some((s) => s.x === x && s.y === y) && tries < 500);
    return {
      x,
      y,
      color: `hsl(${Math.floor(Math.random() * 360)}, 90%, 60%)`,
    };
  }

  function drawBackground() {
    ctx.fillStyle = "#0a2e0a";
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.04)";
    ctx.lineWidth = 1;
    for (let i = 0; i <= GRID; i++) {
      const p = i * CELL;
      ctx.beginPath();
      ctx.moveTo(p, 0);
      ctx.lineTo(p, GAME_H);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, p);
      ctx.lineTo(GAME_W, p);
      ctx.stroke();
    }
  }

  function update() {
    if (gameOver) return;
    direction = nextDirection;

    const head = { x: snake[0].x, y: snake[0].y };
    if (direction === "UP") head.y -= CELL;
    if (direction === "DOWN") head.y += CELL;
    if (direction === "LEFT") head.x -= CELL;
    if (direction === "RIGHT") head.x += CELL;

    if (head.x < 0) head.x = GAME_W - CELL;
    if (head.x >= GAME_W) head.x = 0;
    if (head.y < 0) head.y = GAME_H - CELL;
    if (head.y >= GAME_H) head.y = 0;

    const ate = head.x === food.x && head.y === food.y;
    const body = ate ? snake : snake.slice(0, -1);
    if (body.some((seg) => seg.x === head.x && seg.y === head.y)) {
      gameOver = true;
      fx.shake(14);
      fx.flash(0.3);
      window.AcelyaHooks?.recordScore(score);
      return;
    }

    snake.unshift(head);
    if (ate) {
      food = randomFood();
      score += 10;
      document.getElementById("scoreValue").textContent = score;
      playEat();
      fx.burst(head.x + CELL / 2, head.y + CELL / 2, food.color, 16);
      fx.pop(head.x + CELL / 2, head.y, "+10", "#fbbf24");
      if (score % 100 === 0 && speed > 55) speed -= 8;
    } else {
      snake.pop();
    }
  }

  function draw() {
    drawBackground();

    ctx.save();
    const juice = fx.get?.();
    if (juice) juice.applyTransform(ctx);

    ctx.fillStyle = food.color;
    ctx.fillRect(food.x + 1, food.y + 1, CELL - 2, CELL - 2);

    snake.forEach((part, i) => {
      ctx.fillStyle = i === 0 ? "#5eead4" : "#22c55e";
      ctx.fillRect(part.x + 1, part.y + 1, CELL - 2, CELL - 2);
      if (i === 0) {
        ctx.fillStyle = "#041016";
        const eye = CELL * 0.22;
        let ex1 = part.x + CELL * 0.35;
        let ey1 = part.y + CELL * 0.3;
        let ex2 = part.x + CELL * 0.65;
        let ey2 = part.y + CELL * 0.3;
        if (direction === "LEFT") { ex1 -= 4; ex2 -= 4; }
        if (direction === "RIGHT") { ex1 += 4; ex2 += 4; }
        if (direction === "UP") { ey1 -= 4; ey2 -= 4; }
        if (direction === "DOWN") { ey1 += 4; ey2 += 4; }
        ctx.beginPath();
        ctx.arc(ex1, ey1, eye, 0, Math.PI * 2);
        ctx.arc(ex2, ey2, eye, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    ctx.restore();

    if (gameOver) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 32px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("Oyun Bitti", GAME_W / 2, GAME_H / 2 - 16);
      ctx.font = "18px system-ui, sans-serif";
      ctx.fillText(`Skor: ${score} — Yenilemek için F5`, GAME_W / 2, GAME_H / 2 + 20);
    }

    fx.update();
    fx.draw(ctx, GAME_W, GAME_H);
  }

  function gameLoop(now) {
    if (!lastTick) lastTick = now;
    if (now - lastTick >= speed) {
      update();
      lastTick = now;
    }
    draw();
    requestAnimationFrame(gameLoop);
  }

  resizeGame();
  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
