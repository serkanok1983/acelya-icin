<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Açelya'nın Yeri</title>
    <link rel="manifest" href="manifest.json" />
    <meta
      name="theme-color"
      content="#06080f"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f1f4f9"
      media="(prefers-color-scheme: light)"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <script src="shared/icons.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #06080f;
        --bg-card: rgba(14, 20, 36, 0.72);
        --bg-input: rgba(0, 0, 0, 0.35);
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.18);
        --text: #e8ecf4;
        --text-muted: #8b95a8;
        --accent: #5eead4;
        --accent-2: #a78bfa;
        --accent-warm: #fbbf24;
        --danger: #f87171;
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        --font: "Outfit", system-ui, sans-serif;
        --font-display: "Fraunces", Georgia, serif;
      }

      [data-theme="light"] {
        --bg-deep: #f1f4f9;
        --bg-card: rgba(255, 255, 255, 0.88);
        --bg-input: rgba(0, 0, 0, 0.04);
        --border: rgba(0, 0, 0, 0.08);
        --border-hover: rgba(0, 0, 0, 0.16);
        --text: #1a1d2e;
        --text-muted: #5a5f7a;
        --accent: #0d9488;
        --accent-2: #7c3aed;
        --accent-warm: #d97706;
        --danger: #dc2626;
        --shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg-deep);
      }

      #starCanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 80% 50% at 20% -10%,
            rgba(94, 234, 212, 0.12),
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 40% at 90% 20%,
            rgba(167, 139, 250, 0.1),
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 30% at 50% 100%,
            rgba(251, 191, 36, 0.06),
            transparent 45%
          );
      }

      [data-theme="light"] .aurora {
        opacity: 0.35;
        background:
          radial-gradient(
            ellipse 80% 50% at 20% -10%,
            rgba(13, 148, 136, 0.06),
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 40% at 90% 20%,
            rgba(124, 58, 237, 0.04),
            transparent 50%
          );
      }

      [data-theme="light"] #starCanvas {
        opacity: 0.15;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(16px, env(safe-area-inset-top)) 16px
          max(16px, env(safe-area-inset-bottom));
      }

      .hidden {
        display: none !important;
      }

      /* —— Login —— */
      .login-card {
        width: min(420px, 100%);
        padding: 2.25rem 2rem 2rem;
        background: var(--bg-card);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 4px);
        box-shadow: var(--shadow);
        animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1rem;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(94, 234, 212, 0.25),
          rgba(167, 139, 250, 0.25)
        );
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
      }

      .brand h1 {
        font-family: var(--font-display);
        font-size: 1.65rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
        background: linear-gradient(120deg, #fff 30%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .brand p {
        margin: 0;
        font-size: 0.9rem;
        color: var(--text-muted);
        font-weight: 300;
      }

      .field {
        margin-bottom: 1rem;
        text-align: left;
      }

      .field label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
      }

      .field input[type="text"],
      .field input[type="password"] {
        width: 100%;
        padding: 0.85rem 1rem;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        background: var(--bg-input, rgba(0, 0, 0, 0.35));
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .field input:focus {
        border-color: rgba(94, 234, 212, 0.5);
        box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.12);
      }

      [data-theme="light"] .field input:focus {
        border-color: rgba(13, 148, 136, 0.5);
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1rem 0 1.25rem;
        font-size: 0.88rem;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
      }

      .remember input {
        width: 1rem;
        height: 1rem;
        accent-color: var(--accent);
      }

      .btn-primary {
        width: 100%;
        padding: 0.9rem 1.25rem;
        font: inherit;
        font-size: 1rem;
        font-weight: 600;
        color: #041016;
        background: linear-gradient(135deg, var(--accent), #2dd4bf);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.2s,
          filter 0.2s;
        box-shadow: 0 8px 28px rgba(94, 234, 212, 0.25);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 36px rgba(94, 234, 212, 0.35);
        filter: brightness(1.05);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .error-msg {
        min-height: 1.25rem;
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--danger);
        text-align: center;
      }

      .login-card.shake {
        animation: shake 0.45s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-5px);
        }
        80% {
          transform: translateX(5px);
        }
      }

      /* —— Menu —— */
      .menu-shell {
        width: min(1100px, 100%);
        max-height: calc(100dvh - 32px);
        display: flex;
        flex-direction: column;
        animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .menu-header {
        flex-shrink: 0;
        padding: 1.25rem 1.5rem;
        background: var(--bg-card);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1rem;
      }

      .menu-header-top {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .menu-header h1 {
        font-family: var(--font-display);
        font-size: clamp(1.35rem, 4vw, 1.75rem);
        font-weight: 600;
        margin: 0 0 0.25rem;
        letter-spacing: -0.02em;
      }

      .menu-header .tagline {
        margin: 0;
        font-size: 0.88rem;
        color: var(--text-muted);
        font-weight: 300;
      }

      .btn-ghost {
        padding: 0.55rem 1rem;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 999px;
        cursor: pointer;
        transition:
          color 0.2s,
          border-color 0.2s,
          background 0.2s;
        white-space: nowrap;
      }

      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--border-hover);
        background: rgba(255, 255, 255, 0.08);
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }

      a.btn-ghost {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      .btn-theme {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 1rem;
        cursor: pointer;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          color 0.2s,
          border-color 0.2s;
      }

      .btn-theme:hover {
        color: var(--accent-warm);
        border-color: rgba(251, 191, 36, 0.4);
      }

      .btn-bilgi {
        border-color: rgba(167, 139, 250, 0.35);
        color: var(--accent-2);
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap svg {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        opacity: 0.45;
        pointer-events: none;
      }

      #searchInput {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        font: inherit;
        font-size: 0.95rem;
        color: var(--text);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--border);
        border-radius: 999px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      #searchInput:focus {
        border-color: rgba(167, 139, 250, 0.45);
        box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.12);
      }

      .category-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 1rem;
      }

      .tab {
        padding: 0.4rem 0.85rem;
        font: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid transparent;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .tab:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
      }

      .tab.active {
        color: #041016;
        background: linear-gradient(135deg, var(--accent-2), #8b5cf6);
        border-color: transparent;
      }

      .menu-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0 2px 4px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }

      .menu-section {
        margin-bottom: 1.5rem;
      }

      .section-head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
        padding: 0 0.25rem;
      }

      .section-head .icon {
        font-size: 1.1rem;
      }

      .section-head h2 {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin: 0;
      }

      .section-head .count {
        margin-left: auto;
        font-size: 0.7rem;
        color: var(--text-muted);
        opacity: 0.7;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.55rem;
      }

      .menu-card {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.75rem 0.9rem;
        text-decoration: none;
        color: var(--text);
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        transition:
          transform 0.15s,
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
      }

      .menu-card:hover {
        transform: translateY(-2px);
        border-color: var(--border-hover);
        background: rgba(20, 28, 48, 0.85);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }

      .menu-card .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--card-accent, var(--accent));
        opacity: 0.85;
      }

      .menu-card span {
        font-size: 0.88rem;
        font-weight: 450;
        line-height: 1.3;
      }

      .empty-search {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .stats {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }

      .stat {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .stat strong {
        color: var(--accent);
        font-weight: 600;
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 1.75rem 1.25rem;
        }
        .card-grid {
          grid-template-columns: 1fr;
        }
        .menu-header {
          padding: 1rem;
        }
      }

      /* Aydınlık tema ek geçersiz kılmaları */
      [data-theme="light"] .btn-ghost {
        background: rgba(0, 0, 0, 0.04);
      }
      [data-theme="light"] .btn-ghost:hover {
        background: rgba(0, 0, 0, 0.08);
      }
      [data-theme="light"] #searchInput {
        background: rgba(0, 0, 0, 0.04);
      }
      [data-theme="light"] .tab {
        background: rgba(0, 0, 0, 0.04);
      }
      [data-theme="light"] .tab:hover {
        background: rgba(0, 0, 0, 0.08);
      }
      [data-theme="light"] .login-card,
      [data-theme="light"] .menu-header,
      [data-theme="light"] .menu-card {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      }
      [data-theme="light"] .btn-primary {
        background: linear-gradient(135deg, var(--accent), #0f766e);
      }
    </style>
  </head>
  <body>
    <canvas id="starCanvas" aria-hidden="true"></canvas>
    <div class="aurora" aria-hidden="true"></div>

    <div class="shell">
      <div class="login-card" id="loginForm">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">✦</div>
          <h1>Açelya'nın Yeri</h1>
          <p>Matematik · Fizik · Kimya · Biyoloji · Oyunlar</p>
        </div>
        <div class="field">
          <label for="username">Kullanıcı adı</label>
          <input
            type="text"
            id="username"
            placeholder="Kullanıcı adınız"
            autocomplete="username"
          />
        </div>
        <div class="field">
          <label for="password">Şifre</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <label class="remember">
          <input type="checkbox" id="rememberMe" />
          Oturumu açık tut
        </label>
        <button type="button" class="btn-primary" onclick="login()">
          Giriş yap
        </button>
        <p class="error-msg" id="errorMessage" role="alert"></p>
      </div>

      <div class="menu-shell hidden" id="gamePage">
        <header class="menu-header">
          <div class="menu-header-top">
            <div>
              <h1>Açelya'nın Yeri</h1>
              <p class="tagline">Lise seviyesi simülasyon ve oyunlar</p>
              <div class="stats" id="statsBar"></div>
            </div>
            <div class="header-actions">
              <button
                type="button"
                class="btn-theme"
                id="themeBtn"
                title="Tema değiştir"
              >
                ☀️
              </button>
              <a href="bilgi.html" class="btn-ghost btn-bilgi hidden" id="btnBilgi"
                >📋 Bilgi</a
              >
              <button type="button" class="btn-ghost" onclick="logout()">
                Çıkış yap
              </button>
            </div>
          </div>
          <div class="search-wrap">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="M20 20l-3-3" />
            </svg>
            <input
              type="search"
              id="searchInput"
              placeholder="Sayfa ara… (ör. fraktal, optik, 2048, 'fbo' → Fibonacci)"
              autocomplete="off"
            />
          </div>
          <div class="category-tabs" id="categoryTabs" role="tablist"></div>
        </header>
        <main class="menu-body" id="menuBody"></main>
      </div>
    </div>

    <script src="shared/auth.js"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/activity.js"></script>
    <script>
      const MENU = [
        {
          id: "oyun",
          icon: "🎮",
          title: "Oyunlar",
          accent: "#f472b6",
          items: [
            { href: "pong.html", label: "Masa Tenisi (Pong)" },
            { href: "asteroids.html", label: "Asteroids" },
            { href: "snake.html", label: "Yılan Oyunu" },
            { href: "breakout.html", label: "Tuğla Kırmaca" },
            { href: "oyun-2048.html", label: "2048" },
            { href: "yasam-oyunu.html", label: "Yaşam Oyunu" },
            { href: "tetris.html", label: "Tetris" },
            { href: "gezegen-savunmasi.html", label: "Gezegen Savunması" },
            { href: "formul-hafiza.html", label: "Formül Hafıza" },
            { href: "mayin-tarlasi.html", label: "Mayın Tarlası" },
            { href: "hanoi-kuleleri.html", label: "Hanoi Kuleleri" },
            { href: "uzay-kosucusu.html", label: "Uzay Koşucusu" },
            { href: "isik-sondurme.html", label: "Işık Söndürme" },
          ],
        },
        {
          id: "mat",

          items: [
            { href: "birim-cember.html", label: "Birim Çember" },
            { href: "vektorler.html", label: "Vektörler" },
            { href: "fonksiyon-grafigi.html", label: "Fonksiyon Grafiği" },
            { href: "riemann-toplamlari.html", label: "Riemann Toplamları" },
            { href: "turev.html", label: "Türev" },
            { href: "integral.html", label: "İntegral" },
            { href: "taylor-serisi.html", label: "Taylor Serisi" },
            { href: "pisagor.html", label: "Pisagor Teoremi" },
            { href: "asal-rsa.html", label: "Asal & RSA" },
            { href: "rastgele-yuruyus.html", label: "Rastgele Yürüyüş" },
            { href: "lissajous.html", label: "Lissajous" },
            { href: "normal-dagilim.html", label: "Normal Dağılım" },
            { href: "altin-oran.html", label: "Altın Oran" },

            { href: "tek-sayi-toplam3.html", label: "Tek Sayı Toplamı (Tablo)" },
            { href: "tek-sayi-toplam4.html", label: "Tek Sayı Toplamı (Adım)" },
            { href: "tek-sayi-toplam5.html", label: "Tek Sayı Toplamı (Seri)" },
            { href: "mandelbrot-fraktali.html", label: "Mandelbrot" },
            { href: "julia-fraktali.html", label: "Julia Fraktali" },
            { href: "koch-kar-tanesi.html", label: "Koch Kar Tanesi" },
            { href: "hilbert-egrisi.html", label: "Hilbert Eğrisi" },

      let activeCategory = "all";
      let searchQuery = "";

      const totalPages = MENU.reduce((n, c) => n + c.items.length, 0);
      document.getElementById("statsBar").innerHTML =
        `<span class="stat"><strong>${totalPages}</strong> sayfa</span>` +
        `<span class="stat"><strong>${MENU.length}</strong> kategori</span>`;

      function renderTabs() {
        const wrap = document.getElementById("categoryTabs");
        wrap.innerHTML = "";
        const all = document.createElement("button");
        all.type = "button";
        all.className = "tab" + (activeCategory === "all" ? " active" : "");
        all.textContent = "Tümü";
        all.dataset.cat = "all";
        all.onclick = () => setCategory("all");
        wrap.appendChild(all);
        MENU.forEach((cat) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "tab" + (activeCategory === cat.id ? " active" : "");
          b.textContent = cat.icon + " " + cat.title;
          b.dataset.cat = cat.id;
          b.onclick = () => setCategory(cat.id);
          wrap.appendChild(b);
        });
      }

      function setCategory(id) {
        activeCategory = id;
        renderTabs();
        renderMenu();
      }

      function normalize(s) {
        return s.toLowerCase().normalize("NFD").replace(/\p{M}/gu, "");
      }

      /* Fuzzy arama: sorgudaki karakterler sırayla hedefte bulunuyorsa eşleşir.
         Daha kısa bitişik eşleşmeler daha yüksek skor alır. */
      function fuzzyScore(query, target) {
        if (!query) return 100;
        const q = normalize(query);
        const t = normalize(target);
        // Tam substring eşleşmesi
        const idx = t.indexOf(q);
        if (idx !== -1) return 100 - idx;
        // Fuzzy karakter eşleşmesi
        let qi = 0;
        let lastMatch = -1;
        let gaps = 0;
        for (let i = 0; i < t.length && qi < q.length; i++) {
          if (t[i] === q[qi]) {
            if (lastMatch !== -1 && i - lastMatch > 1) gaps += i - lastMatch - 1;
            lastMatch = i;
            qi++;
          }
        }
        if (qi < q.length) return -1; // Tüm karakterler bulunamadı
        // Skor: karakterlerin ne kadar bitişik olduğu + başlangıç pozisyonu
        return Math.max(0, 80 - gaps * 8 - lastMatch * 0.1);
      }

      function matches(item, cat) {
        const q = searchQuery.trim();
        if (!q) return { match: true, score: 100 };
        const labelScore = fuzzyScore(q, item.label);
        const catScore = fuzzyScore(q, cat.title);
        const best = Math.max(labelScore, catScore);
        return { match: best >= 0, score: best };
      }

      function renderMenu() {
        const body = document.getElementById("menuBody");
        body.innerHTML = "";
        let any = false;

        MENU.forEach((cat) => {
          if (activeCategory !== "all" && activeCategory !== cat.id) return;
          const items = cat.items
            .map((it) => ({ item: it, result: matches(it, cat) }))
            .filter((x) => x.result.match)
            .sort((a, b) => b.result.score - a.result.score)
            .map((x) => x.item);
          if (!items.length) return;
          any = true;

          const section = document.createElement("section");
          section.className = "menu-section";
          section.innerHTML = `
        <div class="section-head">
          <span class="icon">${cat.icon}</span>
          <h2>${cat.title}</h2>
          <span class="count">${items.length}</span>
        </div>`;
          const grid = document.createElement("div");
          grid.className = "card-grid";
          items.forEach((it) => {
            const a = document.createElement("a");
            a.className = "menu-card";
            a.href = it.href;
            a.style.setProperty("--card-accent", cat.accent);
            a.innerHTML = `<span class="dot"></span><span>${it.label}</span>`;
            grid.appendChild(a);
          });
          section.appendChild(grid);
          body.appendChild(section);
        });

        if (!any) {
          body.innerHTML =
            '<p class="empty-search">Sonuç bulunamadı. Farklı bir arama deneyin.</p>';
        }
      }

      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchQuery = e.target.value;
        renderMenu();
      });

      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
      document.getElementById("username").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });

      function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const rememberMe = document.getElementById("rememberMe").checked;
        const card = document.getElementById("loginForm");
        const err = document.getElementById("errorMessage");

        if (window.AcelyaAuth && AcelyaAuth.verify(username, password)) {
          err.textContent = "";
          AcelyaAuth.setSession(username, rememberMe);
          if (AcelyaAuth.normalize(username) === "acelya" && window.AcelyaActivity) {
            AcelyaActivity.logLogin();
          }
          showGamePage();
        } else {
          err.textContent = "Hatalı kullanıcı adı veya şifre.";
          card.classList.remove("shake");
          void card.offsetWidth;
          card.classList.add("shake");
        }
      }

      function logout() {
        if (window.AcelyaAuth) AcelyaAuth.clearSession();
        location.reload();
      }

      function showGamePage() {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("gamePage").classList.remove("hidden");
        const u = window.AcelyaAuth?.getCurrentUser();
        const tagline = document.querySelector(".tagline");
        if (u && tagline) {
          const name = u === "acelya" ? "Açelya" : "Serkan";
          tagline.textContent = `Hoş geldin, ${name}! · Lise seviyesi simülasyon ve oyunlar`;
        }
        const btnBilgi = document.getElementById("btnBilgi");
        if (btnBilgi) btnBilgi.classList.toggle("hidden", u !== "serkan");
        if (u === "acelya" && window.AcelyaActivity) {
          AcelyaActivity.logPageVisit("index", "Ana Sayfa");
        }
        renderTabs();
        renderMenu();
        bindMenuTracking();
      }

      function bindMenuTracking() {
        const body = document.getElementById("menuBody");
        if (!body || body.dataset.trackBound) return;
        body.dataset.trackBound = "1";
        body.addEventListener("click", (e) => {
          const a = e.target.closest("a[href]");
          if (!a) return;
          e.preventDefault();
          a.style.transition = "transform 0.15s ease, opacity 0.2s ease";
          a.style.transform = "scale(0.96)";
          a.style.opacity = "0.6";
          const href = a.getAttribute("href") || "";
          const page = href.replace(/\.html$/, "").replace(/^\//, "");
          if (AcelyaAuth.getCurrentUser() === "acelya" && window.AcelyaActivity) {
            AcelyaActivity.logPageVisit(page, a.textContent.trim());
          }
          setTimeout(() => {
            location.href = href;
          }, 120);
        });
      }

      const starCanvas = document.getElementById("starCanvas");
      const starCtx = starCanvas.getContext("2d");
      let stars = [];

      function syncStars() {
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;
      }

      function initStars() {
        stars = [];
        const n = Math.min(
          120,
          Math.floor((starCanvas.width * starCanvas.height) / 14000),
        );
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * starCanvas.width,
            y: Math.random() * starCanvas.height,
            r: Math.random() * 1.4 + 0.2,
            sp: Math.random() * 0.35 + 0.08,
            a: Math.random() * 0.5 + 0.3,
          });
        }
      }

      function animateStars() {
        starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        stars.forEach((s) => {
          starCtx.beginPath();
          starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          starCtx.fillStyle = `rgba(255,255,255,${s.a})`;
          starCtx.fill();
          s.y += s.sp;
          if (s.y > starCanvas.height) {
            s.y = 0;
            s.x = Math.random() * starCanvas.width;
          }
        });
        requestAnimationFrame(animateStars);
      }

      syncStars();
      initStars();
      animateStars();
      window.addEventListener("resize", () => {
        syncStars();
        initStars();
      });

      /* —— Tema —— */
      const THEME_KEY = "acelya-theme";
      function getSavedTheme() {
        return localStorage.getItem(THEME_KEY) || "dark";
      }
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem(THEME_KEY, theme);
        const btn = document.getElementById("themeBtn");
        if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
      }
      function toggleTheme() {
        const current =
          document.documentElement.getAttribute("data-theme") || "dark";
        applyTheme(current === "dark" ? "light" : "dark");
      }
      const savedTheme = getSavedTheme();
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
      const themeBtn = document.getElementById("themeBtn");
      if (themeBtn) {
        themeBtn.textContent = getSavedTheme() === "dark" ? "☀️" : "🌙";
        themeBtn.addEventListener("click", toggleTheme);
      }

      /* —— PWA —— */
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function (err) {
          console.warn("SW kaydı başarısız:", err);
        });
      }

      renderTabs();
      if (window.AcelyaAuth && AcelyaAuth.isLoggedIn()) {
        if (!AcelyaAuth.getCurrentUser()) AcelyaAuth.clearSession();
        else showGamePage();
      }
