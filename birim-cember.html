<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="shared/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Birim Çember (sin–cos)</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%; min-height: 100dvh;
      background: #0a0a12; color: #e8e8f0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    body { display: flex; flex-direction: column; }
    .hud {
      flex-shrink: 0;
      padding: max(8px, env(safe-area-inset-top)) 14px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .hud h1 { margin: 0 0 6px; font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 600; }
    .readout { font-size: clamp(0.72rem, 2.8vw, 0.88rem); opacity: 0.92; line-height: 1.55; }
    .readout span { color: #7eb6ff; font-variant-numeric: tabular-nums; }
    .stage {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 10px 12px;
    }
    #simCanvas {
      display: block; max-width: 100%;
      background: #12121c; border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }
    .controls {
      flex-shrink: 0;
      padding: 10px 16px max(14px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.08);
      max-width: 480px; margin: 0 auto; width: 100%;
    }
    .control-row { margin-bottom: 12px; }
    .control-row label {
      display: flex; justify-content: space-between;
      font-size: 0.84rem; margin-bottom: 5px;
    }
    input[type="range"] { width: 100%; accent-color: #5b9cff; }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="birim-cember">
<header class="hud">
  <h1>Birim Çember</h1>
  <div class="readout" id="readout"></div>
</header>
<div class="stage">
  <canvas id="simCanvas" width="480" height="480" role="img" aria-label="Birim çember ve sin-cos projeksiyonları"></canvas>
</div>
<div class="controls">
  <div class="control-row">
    <label>Açı θ <span id="angleVal">45°</span></label>
    <input type="range" id="angle" min="0" max="360" value="45" step="1">
  </div>
</div>
<script>
(function () {
  const canvas = document.getElementById("simCanvas");
  const ctx = canvas.getContext("2d");
  const W = 480, H = 480;
  const angleSl = document.getElementById("angle");
  const readout = document.getElementById("readout");
  const R = 170;
  const cx = W / 2, cy = H / 2;

  function resize() {
    const hud = document.querySelector(".hud");
    const controls = document.querySelector(".controls");
    const top = hud.getBoundingClientRect().bottom;
    const bottom = controls.getBoundingClientRect().top;
    const pad = 24;
    const avail = Math.min(window.innerWidth - pad, Math.max(200, bottom - top - pad));
    const scale = Math.min(avail / W, 1.15);
    const s = Math.floor(W * scale);
    canvas.style.width = s + "px";
    canvas.style.height = s + "px";
  }

  function draw() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const deg = +angleSl.value;
    const rad = deg * Math.PI / 180;
    const cosv = Math.cos(rad), sinv = Math.sin(rad);
    const px = cx + R * cosv, py = cy - R * sinv;

    document.getElementById("angleVal").textContent = deg + "°";
    readout.innerHTML =
      `cos θ = <span>${cosv.toFixed(3)}</span> · sin θ = <span>${sinv.toFixed(3)}</span><br>` +
      `x = cos θ · y = sin θ (birim çember r = 1)`;

    ctx.fillStyle = "#12121c";
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++) {
      if (i === 0) continue;
      ctx.beginPath();
      ctx.moveTo(cx + i * 40, 20);
      ctx.lineTo(cx + i * 40, H - 20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(20, cy + i * 40);
      ctx.lineTo(W - 20, cy + i * 40);
      ctx.stroke();
    }

    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(30, cy);
    ctx.lineTo(W - 30, cy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, H - 30);
    ctx.lineTo(cx, 30);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.stroke();

    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "#ff9f6b";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, cy);
    ctx.lineTo(px, py);
    ctx.stroke();

    ctx.strokeStyle = "#7ec8ff";
    ctx.beginPath();
    ctx.moveTo(cx, py);
    ctx.lineTo(px, py);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = "#c8ff7e";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(px, py, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.font = "14px system-ui, sans-serif";
    ctx.fillText("cos θ", px + 8, cy - 8);
    ctx.fillText("sin θ", cx - 52, py - 6);
    ctx.fillText("1", cx + R + 8, cy + 4);

    const arcR = 32;
    ctx.strokeStyle = "rgba(200,255,120,0.5)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, arcR, 0, -rad, true);
    ctx.stroke();
    ctx.fillText("θ", cx + arcR + 6, cy - 6);
  }

  angleSl.addEventListener("input", draw);
  window.addEventListener("resize", () => { resize(); draw(); });
  resize();
  draw();
})();
</script></body>
</html>
