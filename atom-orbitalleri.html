<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Atom Orbitalleri — s, p, d</title>
  <style>
    .app-content { max-width: 960px; }

    .orbital-canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }
    #orbitalCanvas {
      display: block;
      width: 100%;
      background: radial-gradient(ellipse at center, #0f1923 0%, #080c14 100%);
      border-radius: 10px;
      box-shadow: 0 0 0 1px var(--border);
      cursor: grab;
      touch-action: none;
    }
    #orbitalCanvas:active { cursor: grabbing; }

    .shell-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 14px 0 8px;
      flex-wrap: wrap;
    }
    .shell-tab {
      padding: 0.6rem 1.4rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .shell-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .shell-tab.active { background: rgba(94,234,212,0.15); border-color: rgba(94,234,212,0.45); color: var(--accent); }

    .sub-tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .sub-tab {
      padding: 0.4rem 0.9rem;
      font: inherit;
      font-size: 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .sub-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .sub-tab.active { background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.4); color: var(--accent-2); }

    .quantum-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 12px auto;
      text-align: center;
    }
    .quantum-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 6px;
    }
    .quantum-item .q-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .quantum-item .q-val {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .orbital-desc {
      text-align: center;
      max-width: 520px;
      margin: 8px auto 16px;
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.55;
    }
    .orbital-desc strong { color: var(--accent); }

    .view-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 0.45rem 1rem;
      font: inherit;
      font-size: 0.82rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .btn-sm:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-sm.active { background: rgba(94,234,212,0.12); border-color: rgba(94,234,212,0.35); color: var(--accent); }

    .energy-wrap {
      max-width: 700px;
      margin: 0 auto 16px;
    }
    .energy-wrap h3 {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0 0 6px;
      font-weight: 500;
    }
    #energyCanvas {
      display: block;
      width: 100%;
      background: var(--bg-card);
      border-radius: 10px;
      box-shadow: 0 0 0 1px var(--border);
    }

    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 8px 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .legend span { display: inline-flex; align-items: center; gap: 4px; }
    .legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .legend .dot.pos { background: var(--accent); }
    .legend .dot.neg { background: var(--accent-2); }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="atom-orbitalleri">

<div class="app-content">
  <h1>Atom Orbitalleri</h1>
  <p class="hint">
    Elektronlar çekirdek etrafında <strong>olasılık bulutları</strong> halinde bulunur.
    s, p, d orbitallerinin 3B şekillerini inceleyin. Sürükleyerek döndürün.
  </p>

  <div class="orbital-canvas-wrap">
    <canvas id="orbitalCanvas" width="700" height="520" role="img" aria-label="3B orbital görselleştirmesi"></canvas>
  </div>

  <div class="shell-tabs" id="shellTabs">
    <button class="shell-tab active" data-shell="s">s Orbitalleri</button>
    <button class="shell-tab" data-shell="p">p Orbitalleri</button>
    <button class="shell-tab" data-shell="d">d Orbitalleri</button>
  </div>

  <div class="sub-tabs" id="subTabs"></div>

  <div class="legend">
    <span><span class="dot pos"></span> Pozitif faz (+)</span>
    <span><span class="dot neg"></span> Negatif faz (−)</span>
  </div>

  <div class="quantum-bar" id="quantumBar">
    <div class="quantum-item"><div class="q-label">n (baş)</div><div class="q-val" id="qnN">1</div></div>
    <div class="quantum-item"><div class="q-label">ℓ (açısal)</div><div class="q-val" id="qnL">0</div></div>
    <div class="quantum-item"><div class="q-label">mℓ (manyetik)</div><div class="q-val" id="qnM">0</div></div>
    <div class="quantum-item"><div class="q-label">düğüm</div><div class="q-val" id="qnNode">0</div></div>
  </div>

  <p class="orbital-desc" id="orbitalDesc"></p>

  <div class="view-controls">
    <button class="btn-sm active" id="btnAutoRotate">🔄 Otomatik döndür</button>
    <button class="btn-sm" id="btnReset">↺ Sıfırla</button>
    <button class="btn-sm" id="btnTopView">📐 Üstten görünüm</button>
    <button class="btn-sm" id="btnSideView">📏 Yandan görünüm</button>
  </div>

  <div class="energy-wrap">
    <h3>📊 Enerji Seviyesi Diyagramı</h3>
    <canvas id="energyCanvas" width="700" height="260" role="img" aria-label="Enerji seviyesi diyagramı"></canvas>
  </div>
</div>

<script>
(function () {
  // ── DOM referansları ──────────────────────────────────
  const canvas = document.getElementById('orbitalCanvas');
  const ctx = canvas.getContext('2d');
  const energyCanvas = document.getElementById('energyCanvas');
  const ectx = energyCanvas.getContext('2d');

  const qnN = document.getElementById('qnN');
  const qnL = document.getElementById('qnL');
  const qnM = document.getElementById('qnM');
  const qnNode = document.getElementById('qnNode');
  const orbitalDesc = document.getElementById('orbitalDesc');
  const subTabs = document.getElementById('subTabs');

  // ── Orbital tanımları ─────────────────────────────────
  const ORBITALS = {
    s: [
      { id: 's',    label: 's',       n: 1, l: 0, m: 0,  nodes: 0,
        desc: '<strong>s orbitali</strong> — küresel simetrik. Açısal momentum ℓ=0. Çekirdekten uzaklaştıkça elektron bulunma olasılığı radyal fonksiyonla değişir, ancak <strong>her yönde eşittir</strong>. 1s, 2s, 3s… hepsi küreseldir.',
        fn: function(th, ph) { return 1; } },
    ],
    p: [
      { id: 'pz',   label: 'p<sub>z</sub>',      n: 2, l: 1, m: 0,  nodes: 1,
        desc: '<strong>p<sub>z</sub> orbitali</strong> — z ekseni boyunca uzanan iki lob. m=0. Dambıl şeklinde; üst lob pozitif (+), alt lob negatif (−) fazlıdır. Düğüm düzlemi xy düzlemidir.',
        fn: function(th, ph) { return Math.cos(th); } },
      { id: 'px',   label: 'p<sub>x</sub>',      n: 2, l: 1, m: -1, nodes: 1,
        desc: '<strong>p<sub>x</sub> orbitali</strong> — x ekseni boyunca iki lob. m=±1. Pozitif lob +x, negatif lob −x yönündedir. Düğüm düzlemi yz düzlemidir.',
        fn: function(th, ph) { return Math.sin(th) * Math.cos(ph); } },
      { id: 'py',   label: 'p<sub>y</sub>',      n: 2, l: 1, m: 1,  nodes: 1,
        desc: '<strong>p<sub>y</sub> orbitali</strong> — y ekseni boyunca iki lob. m=±1. Pozitif lob +y, negatif lob −y yönündedir. Düğüm düzlemi xz düzlemidir.',
        fn: function(th, ph) { return Math.sin(th) * Math.sin(ph); } },
    ],
    d: [
      { id: 'dz2',  label: 'd<sub>z²</sub>',     n: 3, l: 2, m: 0,  nodes: 2,
        desc: '<strong>d<sub>z²</sub> orbitali</strong> — z ekseninde iki büyük lob + xy düzleminde halka (torus). m=0. Düğüm konileri θ≈54.7°\'dedir. Halka zıt fazlıdır.',
        fn: function(th, ph) { return (3*Math.cos(th)*Math.cos(th) - 1) / 2; } },
      { id: 'dx2y2',label: 'd<sub>x²−y²</sub>',  n: 3, l: 2, m: -2, nodes: 2,
        desc: '<strong>d<sub>x²−y²</sub> orbitali</strong> — x ve y eksenleri üzerinde dört lob. m=±2. Loblar dönüşümlü olarak +/− fazlıdır. x=y ve x=−y doğruları düğüm düzlemleridir.',
        fn: function(th, ph) { return Math.sin(th)*Math.sin(th) * Math.cos(2*ph); } },
      { id: 'dxy',  label: 'd<sub>xy</sub>',     n: 3, l: 2, m: 2,  nodes: 2,
        desc: '<strong>d<sub>xy</sub> orbitali</strong> — x ve y eksenleri arasında dört lob. m=±2. Loblar 45° açıyla yerleşir. x ve y eksenleri düğüm düzlemleridir.',
        fn: function(th, ph) { return Math.sin(th)*Math.sin(th) * Math.sin(2*ph); } },
      { id: 'dxz',  label: 'd<sub>xz</sub>',     n: 3, l: 2, m: -1, nodes: 2,
        desc: '<strong>d<sub>xz</sub> orbitali</strong> — x ve z eksenleri arasında dört lob. m=±1. xz düzleminde 45°\'lik açılarla yerleşir. y ekseni ve θ=90°, φ=±90° düğüm bölgeleridir.',
        fn: function(th, ph) { return Math.sin(2*th) * Math.cos(ph); } },
      { id: 'dyz',  label: 'd<sub>yz</sub>',     n: 3, l: 2, m: 1,  nodes: 2,
        desc: '<strong>d<sub>yz</sub> orbitali</strong> — y ve z eksenleri arasında dört lob. m=±1. yz düzleminde 45°\'lik açılarla yerleşir. x ekseni ve θ=90°, φ=0°,180° düğüm bölgeleridir.',
        fn: function(th, ph) { return Math.sin(2*th) * Math.sin(ph); } },
    ],
  };

  // ── Durum ─────────────────────────────────────────────
  let currentShell = 's';
  let currentIndex = 0;
  let rotX = 0.45, rotY = 0.6;
  let autoRotate = true;
  let dragging = false;
  let lastX = 0, lastY = 0;
  let viewMode = 'free'; // 'free' | 'top' | 'side'

  // ── Nokta üretimi ─────────────────────────────────────
  let points = []; // { x, y, z, sign, intensity }

  function generatePoints(fn) {
    points = [];
    const nTheta = 70;
    const nPhi = 130;
    for (let i = 0; i <= nTheta; i++) {
      const th = (i / nTheta) * Math.PI; // 0 .. π
      for (let j = 0; j < nPhi; j++) {
        const ph = (j / nPhi) * 2 * Math.PI; // 0 .. 2π
        const Y = fn(th, ph);
        const absY = Math.abs(Y);
        if (absY < 0.015) continue;
        const r = absY;
        const st = Math.sin(th);
        const x = r * st * Math.cos(ph);
        const y = r * st * Math.sin(ph);
        const z = r * Math.cos(th);
        points.push({ x, y, z, sign: Y >= 0 ? 1 : -1, intensity: Math.min(1, absY * 1.2) });
      }
    }
  }

  // ── 3B → 2B izdüşüm ──────────────────────────────────
  function project(x, y, z, cx, cy, scale) {
    // Y ekseni etrafında döndür (rotY)
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const x1 = x * cosY - z * sinY;
    const z1 = x * sinY + z * cosY;

    // X ekseni etrafında döndür (rotX)
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    const y1 = y * cosX - z1 * sinX;
    const z2 = y * sinX + z1 * cosX;

    // Perspektif izdüşüm
    const persp = 1 / (3.2 + z2 * 0.8);
    return {
      sx: cx + x1 * scale * persp,
      sy: cy - y1 * scale * persp,
      sz: z2,
    };
  }

  // ── Çizim ─────────────────────────────────────────────
  let W = 700, H = 520;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Arka plan ızgarası
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    const gs = 40;
    for (let gx = gs; gx < W; gx += gs) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for (let gy = gs; gy < H; gy += gs) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

    // Eksen çizgileri
    const scale = Math.min(W, H) * 0.38;
    const cx = W / 2, cy = H / 2;

    function drawAxis(x1,y1,z1, x2,y2,z2, color, alpha) {
      const p1 = project(x1, y1, z1, cx, cy, scale);
      const p2 = project(x2, y2, z2, cx, cy, scale);
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 8]);
      ctx.beginPath();
      ctx.moveTo(p1.sx, p1.sy);
      ctx.lineTo(p2.sx, p2.sy);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    const axLen = 1.6;
    drawAxis(-axLen,0,0, axLen,0,0, '#f87171', 0.35); // X - red
    drawAxis(0,-axLen,0, 0,axLen,0, '#4ade80', 0.35); // Y - green
    drawAxis(0,0,-axLen, 0,0,axLen, '#60a5fa', 0.35); // Z - blue

    // Eksen etiketleri
    function labelAxis(dx, dy, dz, text, color) {
      const p = project(dx, dy, dz, cx, cy, scale);
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.7;
      ctx.font = 'bold 13px Outfit, system-ui, sans-serif';
      ctx.fillText(text, p.sx + 6, p.sy - 2);
      ctx.globalAlpha = 1;
    }
    labelAxis(axLen+0.1, 0, 0, 'x', '#f87171');
    labelAxis(0, axLen+0.1, 0, 'y', '#4ade80');
    labelAxis(0, 0, axLen+0.1, 'z', '#60a5fa');

    // Çekirdek (küçük parlak nokta)
    const cp = project(0, 0, 0, cx, cy, scale);
    const nucGrad = ctx.createRadialGradient(cp.sx, cp.sy, 0, cp.sx, cp.sy, 9);
    nucGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
    nucGrad.addColorStop(0.35, 'rgba(251,191,36,0.7)');
    nucGrad.addColorStop(1, 'rgba(251,191,36,0)');
    ctx.fillStyle = nucGrad;
    ctx.beginPath();
    ctx.arc(cp.sx, cp.sy, 9, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cp.sx, cp.sy, 2.5, 0, Math.PI*2);
    ctx.fill();

    // Noktaları izdüşümle ve derinliğe göre sırala
    const projected = [];
    for (const pt of points) {
      const p = project(pt.x, pt.y, pt.z, cx, cy, scale);
      projected.push({ ...p, sign: pt.sign, intensity: pt.intensity });
    }
    projected.sort((a, b) => b.sz - a.sz); // uzaktan yakına

    // Noktaları çiz
    for (const p of projected) {
      const alpha = 0.15 + p.intensity * 0.7;
      const size = 1.8 + p.intensity * 2.2;
      const r = Math.floor(p.sign > 0 ? 94 : 167);
      const g = Math.floor(p.sign > 0 ? 234 : 139);
      const b = Math.floor(p.sign > 0 ? 212 : 250);

      // Hafif parıltı efekti
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, size * 1.8, 0, Math.PI*2);
      ctx.fill();

      // Ana nokta
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, size, 0, Math.PI*2);
      ctx.fill();
    }

    // Yönlendirme ipucu
    if (autoRotate) {
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.font = '11px Outfit, system-ui, sans-serif';
      ctx.fillText('🖱 Sürükleyerek döndürün', 12, H - 12);
    }
  }

  // ── Enerji seviyesi diyagramı ─────────────────────────
  function drawEnergyDiagram() {
    const ew = 700, eh = 260;
    energyCanvas.width = ew * 2;
    energyCanvas.height = eh * 2;
    ectx.setTransform(2, 0, 0, 2, 0, 0);
    energyCanvas.style.width = '100%';
    energyCanvas.style.height = 'auto';

    ectx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-card').trim() || '#0e1424';
    ectx.fillRect(0, 0, ew, eh);

    const levels = [
      { n: 1, orbitals: [{ label: '1s', x: 0.5, color: '#5eead4', l: 0 }] },
      { n: 2, orbitals: [
        { label: '2s', x: 0.25, color: '#5eead4', l: 0 },
        { label: '2p', x: 0.75, color: '#a78bfa', l: 1, subs: ['2pₓ','2p_y','2p_z'] }
      ]},
      { n: 3, orbitals: [
        { label: '3s', x: 0.13, color: '#5eead4', l: 0 },
        { label: '3p', x: 0.40, color: '#a78bfa', l: 1, subs: ['3pₓ','3p_y','3p_z'] },
        { label: '3d', x: 0.73, color: '#fbbf24', l: 2, subs: ['3d_z²','3d_x²−y²','3d_xy','3d_xz','3d_yz'] }
      ]},
      { n: 4, orbitals: [
        { label: '4s', x: 0.1,  color: '#5eead4', l: 0 },
        { label: '4p', x: 0.33, color: '#a78bfa', l: 1 },
        { label: '4d', x: 0.60, color: '#fbbf24', l: 2 },
        { label: '4f', x: 0.85, color: '#f87171', l: 3 }
      ]},
    ];

    const topPad = 30, botPad = 24;
    const usableH = eh - topPad - botPad;
    const nCount = levels.length;

    // Enerji ekseni
    ectx.strokeStyle = 'rgba(255,255,255,0.2)';
    ectx.lineWidth = 2;
    ectx.beginPath();
    ectx.moveTo(50, topPad);
    ectx.lineTo(50, eh - botPad);
    ectx.stroke();

    ectx.fillStyle = '#8b95a8';
    ectx.font = '11px Outfit, system-ui, sans-serif';
    ectx.fillText('Enerji', 10, topPad - 8);
    ectx.fillText('↑', 42, topPad + 12);

    levels.forEach((level, li) => {
      const baseY = topPad + (li / (nCount - 1)) * usableH + 5;
      const nextY = li < nCount-1 ? topPad + ((li+1)/(nCount-1)) * usableH : eh - botPad;

      // Enerji seviyesi çizgisi
      ectx.strokeStyle = 'rgba(255,255,255,0.08)';
      ectx.lineWidth = 1;
      ectx.setLineDash([4, 6]);
      ectx.beginPath();
      ectx.moveTo(55, baseY);
      ectx.lineTo(ew - 20, baseY);
      ectx.stroke();
      ectx.setLineDash([]);

      // n etiketi
      ectx.fillStyle = '#8b95a8';
      ectx.font = 'bold 12px Outfit, system-ui, sans-serif';
      ectx.fillText('n=' + level.n, 60, baseY - 6);

      // Orbitaller
      level.orbitals.forEach(orb => {
        const ox = 120 + orb.x * (ew - 180);
        const oy = baseY;

        // Kutu
        const bw = orb.subs ? 64 : 40;
        const bh = orb.subs ? 18 : 26;
        ectx.fillStyle = orb.color.replace(')', ',0.18)').replace('rgb', 'rgba');
        if (orb.color.startsWith('#')) {
          ectx.fillStyle = orb.color + '2e';
        }
        ectx.strokeStyle = orb.color;
        ectx.lineWidth = 1.5;
        roundRect(ectx, ox - bw/2, oy - bh/2, bw, bh, 6);
        ectx.fill();
        ectx.stroke();

        // Etiket
        ectx.fillStyle = orb.color;
        ectx.font = 'bold 11px Outfit, system-ui, sans-serif';
        ectx.textAlign = 'center';
        ectx.fillText(orb.label, ox, oy + 4);
        ectx.textAlign = 'start';

        // Alt orbitaller (ince çizgiler)
        if (orb.subs) {
          ectx.fillStyle = orb.color;
          ectx.globalAlpha = 0.5;
          ectx.font = '9px Outfit, system-ui, sans-serif';
          ectx.textAlign = 'center';
          ectx.fillText(`(${orb.subs.length} orbital)`, ox, oy + bh/2 + 14);
          ectx.textAlign = 'start';
          ectx.globalAlpha = 1;
        }

        // Bağlantı çizgisi
        ectx.strokeStyle = orb.color;
        ectx.globalAlpha = 0.25;
        ectx.lineWidth = 1;
        ectx.beginPath();
        ectx.moveTo(95, baseY);
        ectx.lineTo(ox - bw/2 - 4, oy);
        ectx.stroke();
        ectx.globalAlpha = 1;
      });
    });

    // Lejant
    const legendY = eh - 16;
    ectx.font = '10px Outfit, system-ui, sans-serif';
    const legItems = [
      { color: '#5eead4', text: 's (ℓ=0)' },
      { color: '#a78bfa', text: 'p (ℓ=1)' },
      { color: '#fbbf24', text: 'd (ℓ=2)' },
      { color: '#f87171', text: 'f (ℓ=3)' },
    ];
    let lx = 130;
    legItems.forEach(item => {
      ectx.fillStyle = item.color;
      ectx.fillRect(lx, legendY - 5, 10, 10);
      ectx.fillStyle = '#8b95a8';
      ectx.fillText(item.text, lx + 14, legendY + 3);
      lx += 80;
    });
  }

  function roundRect(g, x, y, w, h, r) {
    g.beginPath();
    g.moveTo(x+r, y);
    g.lineTo(x+w-r, y);
    g.arcTo(x+w, y, x+w, y+r, r);
    g.lineTo(x+w, y+h-r);
    g.arcTo(x+w, y+h, x+w-r, y+h, r);
    g.lineTo(x+r, y+h);
    g.arcTo(x, y+h, x, y+h-r, r);
    g.lineTo(x, y+r);
    g.arcTo(x, y, x+r, y, r);
    g.closePath();
  }

  // ── UI güncelleme ─────────────────────────────────────
  function selectOrbital(shell, index) {
    currentShell = shell;
    currentIndex = index;
    const orb = ORBITALS[shell][index];

    generatePoints(orb.fn);
    qnN.textContent = orb.n;
    qnL.textContent = orb.l;
    qnM.textContent = orb.m;
    qnNode.textContent = orb.nodes;
    orbitalDesc.innerHTML = orb.desc;

    // Shell tab'leri
    document.querySelectorAll('.shell-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.shell === shell);
    });

    // Alt tab'leri
    renderSubTabs();
  }

  function renderSubTabs() {
    subTabs.innerHTML = '';
    const orbs = ORBITALS[currentShell];
    orbs.forEach((orb, i) => {
      const btn = document.createElement('button');
      btn.className = 'sub-tab' + (i === currentIndex ? ' active' : '');
      btn.innerHTML = orb.label;
      btn.addEventListener('click', () => selectOrbital(currentShell, i));
      subTabs.appendChild(btn);
    });
  }

  // ── Olay dinleyiciler ─────────────────────────────────
  document.getElementById('shellTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.shell-tab');
    if (!btn) return;
    selectOrbital(btn.dataset.shell, 0);
  });

  // Fare / dokunmatik döndürme
  function getEventPos(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  canvas.addEventListener('pointerdown', (e) => {
    dragging = true;
    autoRotate = false;
    document.getElementById('btnAutoRotate').classList.remove('active');
    const pos = getEventPos(e);
    lastX = pos.x;
    lastY = pos.y;
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const pos = getEventPos(e);
    const dx = pos.x - lastX;
    const dy = pos.y - lastY;
    rotY += dx * 0.008;
    rotX += dy * 0.008;
    rotX = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, rotX));
    lastX = pos.x;
    lastY = pos.y;
  });

  canvas.addEventListener('pointerup', () => { dragging = false; });
  canvas.addEventListener('pointerleave', () => { dragging = false; });

  // Tekerlek yakınlaştırma (isteğe bağlı)
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    // Basit döndürme
    rotY += e.deltaX * 0.003;
    rotX += e.deltaY * 0.003;
    rotX = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, rotX));
  }, { passive: false });

  // Kontrol butonları
  document.getElementById('btnAutoRotate').addEventListener('click', function() {
    autoRotate = !autoRotate;
    this.classList.toggle('active', autoRotate);
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    rotX = 0.45;
    rotY = 0.6;
    autoRotate = true;
    document.getElementById('btnAutoRotate').classList.add('active');
  });

  document.getElementById('btnTopView').addEventListener('click', () => {
    rotX = -Math.PI/2.1;
    rotY = 0;
    autoRotate = false;
    document.getElementById('btnAutoRotate').classList.remove('active');
  });

  document.getElementById('btnSideView').addEventListener('click', () => {
    rotX = 0;
    rotY = 0;
    autoRotate = false;
    document.getElementById('btnAutoRotate').classList.remove('active');
  });

  // ── Animasyon döngüsü ─────────────────────────────────
  function loop() {
    if (autoRotate && !dragging) {
      rotY += 0.004;
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ── Boyutlandırma ─────────────────────────────────────
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const wrap = canvas.parentElement;
    const cw = Math.min(700, wrap.clientWidth);
    const ch = cw * (520 / 700);
    W = cw;
    H = ch;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', () => { resize(); drawEnergyDiagram(); });

  // ── Başlat ────────────────────────────────────────────
  resize();
  selectOrbital('s', 0);
  drawEnergyDiagram();
  loop();
})();
</script>
</body>
</html>
