<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Uzay Koşucusu 🚀 | Açelya</title>
    <link rel="stylesheet" href="shared/theme.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg-deep);
        color: var(--text);
        font-family: var(--font);
        overflow: hidden;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      .hud {
        flex-shrink: 0;
        padding: max(6px, env(safe-area-inset-top)) 12px 4px;
        text-align: center;
        position: relative;
        z-index: 3;
      }
      .hud h1 {
        margin: 0;
        font-size: clamp(0.95rem, 3.5vw, 1.2rem);
        font-weight: 600;
      }
      .stats {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 2px 0;
        font-size: 0.82rem;
      }
      .stats span {
        color: var(--accent);
        font-weight: 700;
      }
      .stats .lives {
        color: #f87171;
      }
      .stats .combo {
        color: #fbbf24;
      }
      .hint {
        margin: 2px 0 0;
        font-size: 0.72rem;
        opacity: 0.5;
      }
      .game-stage {
        flex: 1;
        min-height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 6px max(6px, env(safe-area-inset-bottom));
        position: relative;
        z-index: 3;
      }
      #gameCanvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        border-radius: 10px;
        box-shadow:
          0 0 0 1px var(--border),
          0 8px 36px rgba(0, 0, 0, 0.5);
        touch-action: manipulation;
        cursor: pointer;
      }
      .powerup-indicator {
        position: absolute;
        top: -28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.72rem;
        padding: 3px 10px;
        border-radius: 20px;
        background: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.3);
        white-space: nowrap;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .powerup-indicator.hidden {
        opacity: 0;
      }
    </style>
    <script src="shared/icons.js"></script>
    <script src="shared/app.js"></script>
  </head>
  <body class="app-page" data-page="uzay-kosucusu">
    <header class="hud">
      <h1>🚀 Uzay Koşucusu</h1>
      <div class="stats">
        <span>⭐ <span id="scoreVal">0</span></span>
        <span>🏆 <span id="bestVal">0</span></span>
        <span>📏 <span id="distVal">0</span>m</span>
        <span class="combo" id="comboDisplay" style="display: none"
          >🔥 x<span id="comboVal">1</span></span
        >
        <span class="lives" id="livesDisplay">❤️❤️❤️</span>
      </div>
      <p class="hint">
        Tıkla / Space / ↑ zıpla · Çift zıplama · Altın yıldızları topla
      </p>
    </header>

    <div class="game-stage" id="gameStage">
      <canvas id="gameCanvas"></canvas>
      <div class="powerup-indicator hidden" id="powerupIndicator"></div>
    </div>

    <script>
      (function () {
        "use strict";

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const stage = document.getElementById("gameStage");

        const W = 900,
          H = 500;
        canvas.width = W;
        canvas.height = H;

        // --- Sesler ---
        let sounds = {};
        function loadSounds() {
          if (window.AcelyaSounds) {
            sounds.coin = () => AcelyaSounds.hit?.();
            sounds.explode = () => AcelyaSounds.explode?.();
            sounds.thrust = () => AcelyaSounds.thrust?.();
          } else {
            sounds.coin = sounds.explode = sounds.thrust = function () {};
          }
        }

        // --- Responsive ---
        function resize() {
          const hud = document.querySelector(".hud");
          const hudH = hud ? hud.getBoundingClientRect().bottom : 0;
          const availW = window.innerWidth - 12;
          const availH = window.innerHeight - hudH - 12;
          const scale = Math.min(availW / W, availH / H);
          canvas.style.width = `${Math.max(280, W * scale)}px`;
          canvas.style.height = `${Math.max(160, H * scale)}px`;
        }
        window.addEventListener("resize", resize);
        window.addEventListener("load", resize);
        window.visualViewport?.addEventListener("resize", resize);

        // --- Oyun durumu ---
        const GROUND_Y = H - 54;
        const GRAVITY = 0.75;
        const JUMP_VEL = -13.5;

        let player = {
          x: 120,
          y: 0,
          vy: 0,
          w: 46,
          h: 38,
          onGround: true,
          jumpsLeft: 2,
          invincible: 0,
          trail: [],
          engineFlame: 0,
        };
        let obstacles = [];
        let coins = [];
        let powerups = [];
        let particles = [];
        let bgStars = [];
        let score = 0,
          bestScore = 0,
          distance = 0;
        let gameSpeed = 5;
        let lives = 3,
          maxLives = 3;
        let gameState = "waiting"; // waiting | playing | over
        let tick = 0;
        let comboCount = 0,
          comboTimer = 0,
          comboMultiplier = 1;
        let spawnTimer = 0,
          spawnInterval = 75;
        let coinSpawnTimer = 0;
        let activePowerup = null,
          powerupTimer = 0;
        let flashAlpha = 0;

        // HUD referansları
        const $score = document.getElementById("scoreVal");
        const $best = document.getElementById("bestVal");
        const $dist = document.getElementById("distVal");
        const $lives = document.getElementById("livesDisplay");
        const $combo = document.getElementById("comboDisplay");
        const $comboVal = document.getElementById("comboVal");
        const $pwIndicator = document.getElementById("powerupIndicator");

        bestScore = parseInt(
          localStorage.getItem("acelya-space-runner-best") || "0",
        );
        $best.textContent = bestScore;
        player.y = GROUND_Y - player.h;

        // --- Arka plan yıldızları ---
        function initBgStars() {
          bgStars = [];
          for (let i = 0; i < 120; i++) {
            bgStars.push({
              x: Math.random() * W,
              y: Math.random() * H,
              r: Math.random() * 1.8 + 0.3,
              sp: Math.random() * 0.3 + 0.05,
              a: Math.random() * 0.5 + 0.2,
              layer: Math.floor(Math.random() * 3), // 0=uzak, 1=orta, 2=yakın
            });
          }
        }
        initBgStars();

        // --- Reset ---
        function resetGame() {
          player.y = GROUND_Y - player.h;
          player.vy = 0;
          player.onGround = true;
          player.jumpsLeft = 2;
          player.invincible = 0;
          player.trail = [];
          obstacles = [];
          coins = [];
          powerups = [];
          particles = [];
          score = 0;
          distance = 0;
          gameSpeed = 5;
          lives = maxLives;
          spawnTimer = 0;
          spawnInterval = 75;
          coinSpawnTimer = 0;
          comboCount = 0;
          comboTimer = 0;
          comboMultiplier = 1;
          activePowerup = null;
          powerupTimer = 0;
          flashAlpha = 0;
          tick = 0;
          updateHUD();
          $combo.style.display = "none";
          $pwIndicator.classList.add("hidden");
          loadSounds();
        }

        function updateHUD() {
          $score.textContent = score;
          $dist.textContent = Math.floor(distance / 10);
          $lives.textContent = "❤️".repeat(Math.max(0, lives));
          if (comboMultiplier > 1) {
            $combo.style.display = "inline";
            $comboVal.textContent = comboMultiplier;
          } else {
            $combo.style.display = "none";
          }
        }

        // --- Zıplama ---
        function jump() {
          if (gameState === "waiting") {
            resetGame();
            gameState = "playing";
            player.jumpsLeft = 2;
          }
          if (gameState !== "playing") return;
          if (player.jumpsLeft <= 0) return;

          player.vy = JUMP_VEL;
          player.jumpsLeft--;
          player.onGround = false;

          // Partikül efekti
          for (let i = 0; i < 6; i++) {
            particles.push({
              x: player.x + player.w / 2 + (Math.random() - 0.5) * 20,
              y: player.y + player.h,
              vx: (Math.random() - 0.5) * 3,
              vy: Math.random() * 3 + 2,
              life: 15 + Math.random() * 10,
              color: "#5eead4",
              r: 2 + Math.random() * 2,
            });
          }
          sounds.thrust();
        }

        // --- Hasar ---
        function takeDamage() {
          if (player.invincible > 0) return true;
          if (activePowerup === "shield") {
            deactivatePowerup();
            player.invincible = 60;
            flashAlpha = 0.4;
            for (let i = 0; i < 15; i++) {
              particles.push({
                x: player.x + player.w / 2,
                y: player.y + player.h / 2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                life: 25,
                color: "#fbbf24",
                r: 3 + Math.random() * 3,
              });
            }
            return true;
          }
          lives--;
          player.invincible = 90;
          flashAlpha = 0.5;
          sounds.explode();

          for (let i = 0; i < 25; i++) {
            particles.push({
              x: player.x + player.w / 2,
              y: player.y + player.h / 2,
              vx: (Math.random() - 0.5) * 8,
              vy: (Math.random() - 0.5) * 8,
              life: 30 + Math.random() * 20,
              color: "#f87171",
              r: 2 + Math.random() * 4,
            });
          }
          if (window.AcelyaJuice) {
            try {
              canvas.style.transform = "translateX(4px)";
              setTimeout(() => (canvas.style.transform = ""), 60);
            } catch (e) {}
          }

          if (lives <= 0) {
            gameState = "over";
            if (score > bestScore) {
              bestScore = score;
              localStorage.setItem("acelya-space-runner-best", bestScore);
              $best.textContent = bestScore;
            }
            window.AcelyaGame?.recordScore?.(score);
            return false;
          }
          updateHUD();
          return true;
        }

        // --- Power-up ---
        function activatePowerup(type) {
          activePowerup = type;
          powerupTimer = 300; // 5 saniye
          const names = {
            shield: "🛡️ Kalkan",
            magnet: "🧲 Mıknatıs",
            boost: "⚡ Hız",
          };
          $pwIndicator.textContent = names[type] || type;
          $pwIndicator.classList.remove("hidden");
        }
        function deactivatePowerup() {
          activePowerup = null;
          powerupTimer = 0;
          $pwIndicator.classList.add("hidden");
        }

        // --- Coin ---
        function collectCoin(c) {
          c.collected = true;
          comboCount++;
          comboTimer = 90;
          comboMultiplier = Math.min(8, 1 + Math.floor(comboCount / 5));
          const pts = 10 * comboMultiplier;
          score += pts;
          sounds.coin();
          for (let i = 0; i < 5; i++) {
            particles.push({
              x: c.x,
              y: c.y,
              vx: (Math.random() - 0.5) * 3,
              vy: -Math.random() * 4 - 2,
              life: 20,
              color: "#fbbf24",
              r: 1.5 + Math.random() * 2,
            });
          }
        }

        // --- Spawn ---
        function spawnObstacle() {
          const difficulty = Math.min(gameSpeed / 5, 2.5);
          const r = Math.random();
          if (r < 0.35) {
            // Asteroit (büyük, zıplamayla aşılır)
            const h = 36 + Math.random() * 44;
            obstacles.push({
              x: W + 30,
              y: GROUND_Y - h,
              w: 34 + Math.random() * 24,
              h,
              type: "asteroid",
              color: `hsl(${15 + Math.random() * 25}, 55%, ${40 + Math.random() * 20}%)`,
            });
          } else if (r < 0.6) {
            // İkili kristal bariyer (boşluktan geç)
            const gap = 95 + Math.random() * 55;
            const topH = 55 + Math.random() * 90;
            obstacles.push({
              x: W + 30,
              y: 0,
              w: 26,
              h: topH,
              type: "crystal-top",
              color: "#a78bfa",
            });
            obstacles.push({
              x: W + 30,
              y: topH + gap,
              w: 26,
              h: H - topH - gap,
              type: "crystal-bot",
              color: "#a78bfa",
            });
          } else if (r < 0.8) {
            // Kuyruklu yıldız (havada, hızlı)
            obstacles.push({
              x: W + 40,
              y: 60 + Math.random() * 160,
              w: 20,
              h: 20,
              type: "comet",
              color: "#60a5fa",
              vy: (Math.random() - 0.5) * 3,
            });
          } else {
            // Lazer kapısı (açılıp kapanan, üçlü)
            const baseY = GROUND_Y - 180 - Math.random() * 60;
            for (let i = 0; i < 3; i++) {
              obstacles.push({
                x: W + 40 + i * 50,
                y: baseY + i * 30,
                w: 8,
                h: 70 + Math.random() * 50,
                type: "laser",
                color: "#f87171",
                phase: Math.random() * Math.PI * 2,
              });
            }
          }
        }

        function spawnCoin() {
          const y = GROUND_Y - 90 - Math.random() * 180;
          coins.push({
            x: W + 40,
            y,
            r: 8,
            collected: false,
            glow: Math.random() * Math.PI * 2,
          });
        }

        function spawnPowerup() {
          const types = ["shield", "magnet", "boost"];
          const type = types[Math.floor(Math.random() * types.length)];
          const colors = { shield: "#fbbf24", magnet: "#a78bfa", boost: "#60a5fa" };
          const icons = { shield: "🛡", magnet: "🧲", boost: "⚡" };
          powerups.push({
            x: W + 40,
            y: GROUND_Y - 80 - Math.random() * 140,
            r: 14,
            type,
            color: colors[type],
            icon: icons[type],
          });
        }

        // --- Update ---
        function update() {
          if (gameState !== "playing") return;
          tick++;

          // Arka plan yıldızları
          bgStars.forEach((s) => {
            s.x -= gameSpeed * (0.3 + s.layer * 0.35);
            if (s.x < -5) {
              s.x = W + 5;
              s.y = Math.random() * H;
            }
            s.a += (Math.random() - 0.5) * 0.04;
            s.a = Math.max(0.1, Math.min(0.9, s.a));
          });

          // Oyuncu fiziği
          player.vy += GRAVITY;
          player.y += player.vy;
          if (player.y >= GROUND_Y - player.h) {
            player.y = GROUND_Y - player.h;
            player.vy = 0;
            player.onGround = true;
            player.jumpsLeft = 2;
          }

          if (player.invincible > 0) player.invincible--;

          // İz
          player.trail.push({
            x: player.x + 8,
            y: player.y + player.h / 2,
            life: 10,
          });
          player.trail = player.trail.filter((t) => {
            t.life--;
            return t.life > 0;
          });

          // Egzoz ateşi
          player.engineFlame = (player.engineFlame + 0.3) % (Math.PI * 2);

          // Engeller
          obstacles.forEach((o) => {
            o.x -= gameSpeed;
            if (o.type === "comet") {
              o.y += o.vy;
              if (o.y < 40 || o.y > GROUND_Y - 80) o.vy *= -1;
            }
            if (o.type === "laser") o.phase += 0.04;
          });
          obstacles = obstacles.filter((o) => o.x > -80);

          // Coinler
          coins.forEach((c) => {
            c.x -= gameSpeed;
            c.glow += 0.08;
          });
          coins = coins.filter((c) => c.x > -30 && !c.collected);

          // Power-up'lar
          powerups.forEach((p) => (p.x -= gameSpeed));
          powerups = powerups.filter((p) => p.x > -30);

          // Partiküller
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
          });
          particles = particles.filter((p) => p.life > 0);

          // Mesafe ve skor
          distance++;
          score++;
          gameSpeed = 5 + distance / 600;
          if (gameSpeed > 15) gameSpeed = 15;

          // Combo timer
          if (comboTimer > 0) {
            comboTimer--;
            if (comboTimer === 0) {
              comboCount = 0;
              comboMultiplier = 1;
            }
          }

          // Power-up timer
          if (activePowerup && powerupTimer > 0) {
            powerupTimer--;
            if (powerupTimer === 0) deactivatePowerup();
          }
          if (activePowerup === "magnet") {
            coins.forEach((c) => {
              if (!c.collected) {
                const dx = player.x + player.w / 2 - c.x;
                const dy = player.y + player.h / 2 - c.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && dist > 5) {
                  c.x += (dx / dist) * 6;
                  c.y += (dy / dist) * 6;
                }
              }
            });
          }
          if (activePowerup === "boost") {
            gameSpeed = Math.min(18, gameSpeed + 0.02);
          }

          // --- Çarpışma: engeller ---
          const px = player.x + 6,
            py = player.y + 4;
          const pw = player.w - 12,
            ph = player.h - 8;
          for (const o of obstacles) {
            if (px < o.x + o.w && px + pw > o.x && py < o.y + o.h && py + ph > o.y) {
              if (!takeDamage()) break;
            }
          }

          // --- Çarpışma: coinler ---
          for (const c of coins) {
            if (c.collected) continue;
            const dx = player.x + player.w / 2 - c.x;
            const dy = player.y + player.h / 2 - c.y;
            if (Math.sqrt(dx * dx + dy * dy) < player.w / 2 + c.r) {
              collectCoin(c);
            }
          }

          // --- Çarpışma: power-up'lar ---
          for (const p of powerups) {
            const dx = player.x + player.w / 2 - p.x;
            const dy = player.y + player.h / 2 - p.y;
            if (Math.sqrt(dx * dx + dy * dy) < player.w / 2 + p.r) {
              activatePowerup(p.type);
              p.collected = true;
              for (let i = 0; i < 10; i++) {
                particles.push({
                  x: p.x,
                  y: p.y,
                  vx: (Math.random() - 0.5) * 5,
                  vy: -Math.random() * 5,
                  life: 25,
                  color: p.color,
                  r: 2 + Math.random() * 3,
                });
              }
            }
          }
          powerups = powerups.filter((p) => !p.collected);

          // --- Spawn ---
          spawnTimer++;
          if (spawnTimer >= spawnInterval) {
            spawnTimer = 0;
            spawnInterval = Math.max(28, 75 - distance / 80);
            if (Math.random() < 0.8) spawnObstacle();
          }
          coinSpawnTimer++;
          if (coinSpawnTimer > 40 + Math.random() * 30) {
            coinSpawnTimer = 0;
            if (Math.random() < 0.6) spawnCoin();
          }
          if (tick % 300 === 0 && Math.random() < 0.5) {
            spawnPowerup();
          }

          updateHUD();
        }

        // --- Draw ---
        function draw() {
          ctx.clearRect(0, 0, W, H);

          // Arka plan
          const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
          bgGrad.addColorStop(0, "#040816");
          bgGrad.addColorStop(0.7, "#0a1028");
          bgGrad.addColorStop(1, "#0e1a30");
          ctx.fillStyle = bgGrad;
          ctx.fillRect(0, 0, W, H);

          // Nebula efekti
          ctx.fillStyle = "rgba(94, 234, 212, 0.02)";
          ctx.beginPath();
          ctx.arc(W * 0.7, H * 0.3, 200, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(167, 139, 250, 0.015)";
          ctx.beginPath();
          ctx.arc(W * 0.2, H * 0.6, 250, 0, Math.PI * 2);
          ctx.fill();

          // Yıldızlar (paralaks)
          bgStars.forEach((s) => {
            const alpha = s.a * (0.5 + s.layer * 0.25);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            if (s.layer === 2 && s.r > 1.2) {
              ctx.fillStyle = `rgba(94,234,212,${alpha * 0.5})`;
              ctx.beginPath();
              ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
              ctx.fill();
            }
          });

          // Zemin
          ctx.fillStyle = "rgba(8, 14, 28, 0.6)";
          ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

          // Zemin çizgileri (hareketli)
          const lineSpacing = 40;
          const offset = (tick * gameSpeed) % lineSpacing;
          ctx.strokeStyle = "rgba(94, 234, 212, 0.12)";
          ctx.lineWidth = 1;
          for (let x = -offset; x < W + lineSpacing; x += lineSpacing) {
            ctx.beginPath();
            ctx.moveTo(x, GROUND_Y);
            ctx.lineTo(x + 10, GROUND_Y + 5);
            ctx.lineTo(x + 20, GROUND_Y + 8);
            ctx.lineTo(x + 30, GROUND_Y + 5);
            ctx.lineTo(x + 40, GROUND_Y);
            ctx.stroke();
          }

          ctx.strokeStyle = "rgba(94, 234, 212, 0.25)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, GROUND_Y);
          ctx.lineTo(W, GROUND_Y);
          ctx.stroke();

          // Coinler
          coins.forEach((c) => {
            if (c.collected) return;
            const glow = Math.sin(c.glow) * 0.3 + 0.7;
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(tick * 0.03);
            ctx.fillStyle = "#fbbf24";
            ctx.shadowColor = "#fbbf24";
            ctx.shadowBlur = 12 * glow;
            ctx.beginPath();
            const pts = 5,
              outerR = c.r,
              innerR = c.r * 0.45;
            for (let i = 0; i < pts * 2; i++) {
              const r = i % 2 === 0 ? outerR : innerR;
              const angle = (i * Math.PI) / pts - Math.PI / 2;
              if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
              else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
          });

          // Power-up'lar
          powerups.forEach((p) => {
            if (p.collected) return;
            const pulse = Math.sin(tick * 0.06) * 2 + 1;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.scale(pulse, pulse);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(0, 0, p.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.font = "14px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(p.icon, 0, 1);
            ctx.restore();
          });

          // Engeller
          obstacles.forEach((o) => {
            ctx.save();
            if (o.type === "asteroid") {
              ctx.fillStyle = o.color;
              ctx.beginPath();
              const cx = o.x + o.w / 2,
                cy = o.y + o.h / 2;
              ctx.ellipse(cx, cy, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = "rgba(255,255,255,0.25)";
              ctx.lineWidth = 1.5;
              ctx.stroke();
              // Krater
              ctx.fillStyle = "rgba(0,0,0,0.2)";
              ctx.beginPath();
              ctx.arc(cx - o.w * 0.12, cy - o.h * 0.1, o.w * 0.14, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(cx + o.w * 0.2, cy + o.h * 0.15, o.w * 0.1, 0, Math.PI * 2);
              ctx.fill();
            } else if (o.type === "crystal-top" || o.type === "crystal-bot") {
              const grad = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y);
              grad.addColorStop(0, "#a78bfa");
              grad.addColorStop(1, "#7c3aed");
              ctx.fillStyle = grad;
              ctx.beginPath();
              ctx.roundRect(o.x, o.y, o.w, o.h, 6);
              ctx.fill();
              ctx.strokeStyle = "rgba(255,255,255,0.3)";
              ctx.lineWidth = 1;
              ctx.stroke();
              ctx.fillStyle = "rgba(255,255,255,0.15)";
              ctx.beginPath();
              ctx.roundRect(o.x + 4, o.y + 8, o.w - 8, o.h - 16, 3);
              ctx.fill();
            } else if (o.type === "comet") {
              ctx.fillStyle = o.color;
              ctx.shadowColor = o.color;
              ctx.shadowBlur = 14;
              ctx.beginPath();
              ctx.arc(o.x, o.y, o.w / 2, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
              // Kuyruk
              ctx.strokeStyle = "rgba(96,165,250,0.4)";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(o.x - 10, o.y - 3);
              ctx.lineTo(
                o.x - 30 + Math.sin(tick * 0.1) * 10,
                o.y + Math.cos(tick * 0.1) * 5,
              );
              ctx.stroke();
            } else if (o.type === "laser") {
              const alpha = Math.abs(Math.sin(o.phase)) * 0.7 + 0.3;
              ctx.fillStyle = `rgba(248,113,113,${alpha})`;
              ctx.shadowColor = `rgba(248,113,113,${alpha * 0.8})`;
              ctx.shadowBlur = 10;
              ctx.fillRect(o.x, o.y, o.w, o.h);
              ctx.shadowBlur = 0;
              ctx.fillStyle = `rgba(255,255,255,${alpha * 0.4})`;
              ctx.fillRect(o.x + 1, o.y, o.w - 2, o.h);
            }
            ctx.restore();
          });

          // Oyuncu gemisi
          drawPlayerShip();

          // Partiküller
          particles.forEach((p) => {
            const alpha = p.life / 35;
            ctx.fillStyle = p.color
              .replace(")", `,${alpha})`)
              .replace("rgb", "rgba")
              .replace("hsl", "hsla");
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          });

          // Flaş efekti
          if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(248,113,113,${flashAlpha})`;
            ctx.fillRect(0, 0, W, H);
            flashAlpha *= 0.9;
            if (flashAlpha < 0.01) flashAlpha = 0;
          }

          // Oyun bitti ekranı
          if (gameState === "over") {
            ctx.fillStyle = "rgba(3, 5, 15, 0.7)";
            ctx.fillRect(0, 0, W, H);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#f87171";
            ctx.font = "bold 38px Outfit, system-ui, sans-serif";
            ctx.fillText("💥 Görev Başarısız", W / 2, H / 2 - 35);
            ctx.fillStyle = "#fff";
            ctx.font = "22px Outfit, system-ui, sans-serif";
            ctx.fillText(
              `Skor: ${score}  ·  Mesafe: ${Math.floor(distance / 10)}m`,
              W / 2,
              H / 2 + 8,
            );
            if (score >= bestScore && score > 0) {
              ctx.fillStyle = "#fbbf24";
              ctx.font = "bold 20px Outfit, system-ui, sans-serif";
              ctx.fillText("🏆 Yeni Rekor!", W / 2, H / 2 + 42);
            }
            ctx.fillStyle = "rgba(255,255,255,0.45)";
            ctx.font = "16px Outfit, system-ui, sans-serif";
            ctx.fillText("Tekrar oynamak için tıkla veya Space", W / 2, H / 2 + 75);
          } else if (gameState === "waiting") {
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 26px Outfit, system-ui, sans-serif";
            ctx.fillText("🚀 Başlamak için tıkla!", W / 2, H / 2 - 15);
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.font = "16px Outfit, system-ui, sans-serif";
            ctx.fillText(
              "Asteroitlerden kaç · Yıldız topla · Power-up yakala",
              W / 2,
              H / 2 + 22,
            );
            ctx.fillText(
              "⏫ Tıkla/Space zıpla · Çift zıplama var!",
              W / 2,
              H / 2 + 46,
            );
          }
        }

        function drawPlayerShip() {
          const px = player.x,
            py = player.y,
            pw = player.w,
            ph = player.h;
          if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0)
            return;

          // İz
          player.trail.forEach((t) => {
            ctx.fillStyle = `rgba(94,234,212,${t.life / 20})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 2 + t.life / 5, 0, Math.PI * 2);
            ctx.fill();
          });

          ctx.save();
          ctx.translate(px + pw / 2, py + ph / 2);
          const tilt = player.onGround ? 0 : player.vy * 0.04;
          ctx.rotate(tilt);

          // Motor ateşi
          const flameH = 10 + Math.sin(player.engineFlame) * 6;
          if (gameState === "playing") {
            const flameGrad = ctx.createLinearGradient(
              0,
              ph / 2,
              0,
              ph / 2 + flameH + 4,
            );
            flameGrad.addColorStop(0, "#5eead4");
            flameGrad.addColorStop(0.4, "#2dd4bf");
            flameGrad.addColorStop(0.7, "#fbbf24");
            flameGrad.addColorStop(1, "transparent");
            ctx.fillStyle = flameGrad;
            ctx.beginPath();
            ctx.moveTo(-8, ph / 2 + 2);
            ctx.lineTo(8, ph / 2 + 2);
            ctx.lineTo(2, ph / 2 + flameH + 4);
            ctx.lineTo(-2, ph / 2 + flameH);
            ctx.closePath();
            ctx.fill();
          }

          // Gövde
          const bodyGrad = ctx.createLinearGradient(0, -ph / 2, 0, ph / 2);
          bodyGrad.addColorStop(0, "#5eead4");
          bodyGrad.addColorStop(0.5, "#2dd4bf");
          bodyGrad.addColorStop(1, "#0d9488");
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.moveTo(0, -ph / 2);
          ctx.lineTo(pw / 2 - 2, ph / 3);
          ctx.lineTo(pw / 2 + 4, ph / 2);
          ctx.lineTo(-pw / 2 - 4, ph / 2);
          ctx.lineTo(-pw / 2 + 2, ph / 3);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Kanat detayları
          ctx.strokeStyle = "rgba(255,255,255,0.2)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-pw / 2 + 6, ph / 2 - 6);
          ctx.lineTo(-pw / 2 + 14, ph / 2 - 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(pw / 2 - 6, ph / 2 - 6);
          ctx.lineTo(pw / 2 - 14, ph / 2 - 2);
          ctx.stroke();

          // Pencere
          ctx.fillStyle = "#041016";
          ctx.beginPath();
          ctx.arc(0, -ph * 0.08, ph * 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.lineWidth = 1;
          ctx.stroke();

          // Pilot ışığı
          ctx.fillStyle = "rgba(94,234,212,0.5)";
          ctx.beginPath();
          ctx.arc(0, -ph * 0.08, ph * 0.1, 0, Math.PI * 2);
          ctx.fill();

          // Kalkan efekti
          if (activePowerup === "shield") {
            ctx.strokeStyle = "rgba(251,191,36,0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, pw * 0.7, 0, Math.PI * 2);
            ctx.stroke();
          }

          ctx.restore();
        }

        // --- Game loop ---
        function gameLoop() {
          update();
          draw();
          requestAnimationFrame(gameLoop);
        }

        // --- Kontroller ---
        function handleInput(e) {
          if (e.type === "keydown") {
            if (
              e.key === " " ||
              e.key === "ArrowUp" ||
              e.key === "w" ||
              e.key === "W"
            ) {
              e.preventDefault();
              jump();
            }
            if (gameState === "over" && (e.key === " " || e.key === "Enter")) {
              resetGame();
              gameState = "playing";
            }
          } else {
            e.preventDefault();
            if (gameState === "over") {
              resetGame();
              gameState = "playing";
            } else {
              jump();
            }
          }
        }

        document.addEventListener("keydown", handleInput);
        canvas.addEventListener("mousedown", handleInput);
        canvas.addEventListener("touchstart", handleInput, { passive: false });

        // Mobil kaydırma ile zıplama
        let touchStartY = 0;
        canvas.addEventListener(
          "touchstart",
          function (e) {
            touchStartY = e.touches[0].clientY;
          },
          { passive: true },
        );
        canvas.addEventListener("touchend", function (e) {
          const dy = touchStartY - e.changedTouches[0].clientY;
          if (dy > 15 && player.onGround && gameState === "playing") {
            // Yukarı kaydır = zıpla
          }
        });

        // Başlat
        resetGame();
        resize();
        requestAnimationFrame(gameLoop);

        // Skor kaydı için Acelya entegrasyonu
        window.addEventListener("acelya-game-ready", () => {
          loadSounds();
        });
      })();
    </script>
  </body>
</html>
