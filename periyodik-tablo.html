<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periyodik Tablo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0a0e14; color: #e6edf3;
      font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 1rem; }
    h1 { font-size: clamp(1.1rem, 4vw, 1.5rem); margin: 0.5rem 0; }
    p.sub { color: #8b949e; font-size: 0.9rem; text-align: center; max-width: 40rem; margin: 0 0 1rem; }
    .groups { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin-bottom: 1rem; max-width: 900px; }
    .groups button { padding: 0.35rem 0.7rem; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3;
      font-size: 0.75rem; cursor: pointer; transition: background 0.15s; }
    .groups button:hover, .groups button.active { background: #388bfd; border-color: #58a6ff; }
    #table-wrap { overflow-x: auto; max-width: 100%; padding-bottom: 0.5rem; }
    svg { display: block; max-width: 100%; height: auto; }
    #detail { margin-top: 1rem; padding: 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      max-width: 420px; width: 100%; min-height: 80px; text-align: center; }
    #detail h2 { margin: 0 0 0.25rem; font-size: 1.4rem; color: #79c0ff; }
    #detail p { margin: 0.2rem 0; color: #8b949e; font-size: 0.85rem; }
    a.back { color: #58a6ff; font-size: 0.85rem; margin-top: 1rem; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Periyodik Tablo</h1>
  <p class="sub">Grup düğmelerine tıklayarak aynı özellikteki elementleri vurgulayın. Bir elemente tıklayın.</p>
  <div class="groups" id="groupBtns"></div>
  <div id="table-wrap"></div>
  <div id="detail"><p>Bir element veya grup seçin.</p></div>
  <a class="back" href="index.html">← Ana menü</a>
<script>
const GROUPS = {
  all: { label: 'Tümü', color: null },
  metal: { label: 'Metaller', color: '#58a6ff' },
  ametal: { label: 'Ametaller', color: '#7ee787' },
  yari: { label: 'Yarı metaller', color: '#d2a8ff' },
  alkali: { label: '1A Alkali', color: '#f85149' },
  toprak: { label: '2A Toprak alkali', color: '#ffa657' },
  halojen: { label: 'Halojenler (17)', color: '#a5d6ff' },
  soy: { label: 'Soy gazlar (18)', color: '#ff7b72' },
  gecis: { label: 'Geçiş metalleri', color: '#e3b341' },
  lantanit: { label: 'Lantanitler', color: '#f778ba' },
  aktinit: { label: 'Aktinitler', color: '#bc8cff' }
};

const ELEMENTS = [
  {z:1,s:'H',n:'Hidrojen',m:1.008,g:'ametal',p:1,c:1},
  {z:2,s:'He',n:'Helyum',m:4.003,g:'soy',p:1,c:18},
  {z:3,s:'Li',n:'Lityum',m:6.94,g:'alkali',p:2,c:1},
  {z:4,s:'Be',n:'Berilyum',m:9.01,g:'toprak',p:2,c:2},
  {z:5,s:'B',n:'Bor',m:10.81,g:'yari',p:2,c:13},
  {z:6,s:'C',n:'Karbon',m:12.01,g:'ametal',p:2,c:14},
  {z:7,s:'N',n:'Azot',m:14.01,g:'ametal',p:2,c:15},
  {z:8,s:'O',n:'Oksijen',m:16.00,g:'ametal',p:2,c:16},
  {z:9,s:'F',n:'Flor',m:19.00,g:'halojen',p:2,c:17},
  {z:10,s:'Ne',n:'Neon',m:20.18,g:'soy',p:2,c:18},
  {z:11,s:'Na',n:'Sodyum',m:22.99,g:'alkali',p:3,c:1},
  {z:12,s:'Mg',n:'Magnezyum',m:24.31,g:'toprak',p:3,c:2},
  {z:13,s:'Al',n:'Alüminyum',m:26.98,g:'metal',p:3,c:13},
  {z:14,s:'Si',n:'Silisyum',m:28.09,g:'yari',p:3,c:14},
  {z:15,s:'P',n:'Fosfor',m:30.97,g:'ametal',p:3,c:15},
  {z:16,s:'S',n:'Kükürt',m:32.07,g:'ametal',p:3,c:16},
  {z:17,s:'Cl',n:'Klor',m:35.45,g:'halojen',p:3,c:17},
  {z:18,s:'Ar',n:'Argon',m:39.95,g:'soy',p:3,c:18},
  {z:19,s:'K',n:'Potasyum',m:39.10,g:'alkali',p:4,c:1},
  {z:20,s:'Ca',n:'Kalsiyum',m:40.08,g:'toprak',p:4,c:2},
  {z:21,s:'Sc',n:'Skandiyum',m:44.96,g:'gecis',p:4,c:3},
  {z:22,s:'Ti',n:'Titanyum',m:47.87,g:'gecis',p:4,c:4},
  {z:23,s:'V',n:'Vanadyum',m:50.94,g:'gecis',p:4,c:5},
  {z:24,s:'Cr',n:'Krom',m:52.00,g:'gecis',p:4,c:6},
  {z:25,s:'Mn',n:'Manganez',m:54.94,g:'gecis',p:4,c:7},
  {z:26,s:'Fe',n:'Demir',m:55.85,g:'gecis',p:4,c:8},
  {z:27,s:'Co',n:'Kobalt',m:58.93,g:'gecis',p:4,c:9},
  {z:28,s:'Ni',n:'Nikel',m:58.69,g:'gecis',p:4,c:10},
  {z:29,s:'Cu',n:'Bakır',m:63.55,g:'gecis',p:4,c:11},
  {z:30,s:'Zn',n:'Çinko',m:65.38,g:'gecis',p:4,c:12},
  {z:31,s:'Ga',n:'Galyum',m:69.72,g:'metal',p:4,c:13},
  {z:32,s:'Ge',n:'Germanyum',m:72.63,g:'yari',p:4,c:14},
  {z:33,s:'As',n:'Arsenik',m:74.92,g:'yari',p:4,c:15},
  {z:34,s:'Se',n:'Selenyum',m:78.97,g:'ametal',p:4,c:16},
  {z:35,s:'Br',n:'Brom',m:79.90,g:'halojen',p:4,c:17},
  {z:36,s:'Kr',n:'Kripton',m:83.80,g:'soy',p:4,c:18},
  {z:37,s:'Rb',n:'Rubidyum',m:85.47,g:'alkali',p:5,c:1},
  {z:38,s:'Sr',n:'Stronsiyum',m:87.62,g:'toprak',p:5,c:2},
  {z:47,s:'Ag',n:'Gümüş',m:107.87,g:'gecis',p:5,c:11},
  {z:53,s:'I',n:'İyot',m:126.90,g:'halojen',p:5,c:17},
  {z:54,s:'Xe',n:'Ksenon',m:131.29,g:'soy',p:5,c:18},
  {z:55,s:'Cs',n:'Sezyum',m:132.91,g:'alkali',p:6,c:1},
  {z:56,s:'Ba',n:'Baryum',m:137.33,g:'toprak',p:6,c:2},
  {z:79,s:'Au',n:'Altın',m:196.97,g:'gecis',p:6,c:11},
  {z:80,s:'Hg',n:'Cıva',m:200.59,g:'gecis',p:6,c:12},
  {z:82,s:'Pb',n:'Kurşun',m:207.2,g:'metal',p:6,c:14},
  {z:86,s:'Rn',n:'Radon',m:222,g:'soy',p:6,c:18}
];

let activeGroup = 'all', selectedZ = null;

const btnWrap = document.getElementById('groupBtns');
Object.entries(GROUPS).forEach(([k, v]) => {
  const b = document.createElement('button');
  b.textContent = v.label;
  b.dataset.g = k;
  if (k === 'all') b.classList.add('active');
  b.onclick = () => { activeGroup = k; btnWrap.querySelectorAll('button').forEach(x => x.classList.toggle('active', x.dataset.g === k)); drawTable(); };
  btnWrap.appendChild(b);
});

function baseColor(el) {
  const c = { metal:'#1f3d5c', ametal:'#1a3d2e', yari:'#3d2a5c', alkali:'#4a2020', toprak:'#4a3520',
    halojen:'#1a3545', soy:'#3d2020', gecis:'#3d3520', lantanit:'#4a2540', aktinit:'#352545' };
  return c[el.g] || '#21262d';
}

function inGroup(el, g) {
  if (g === 'all') return true;
  if (g === 'metal') return ['metal','alkali','toprak','gecis'].includes(el.g);
  return el.g === g;
}

function drawTable() {
  const cell = 38, gap = 3, cols = 18;
  const rows = 7;
  const w = cols * (cell + gap) + gap;
  const h = rows * (cell + gap) + gap + 50;
  const hl = GROUPS[activeGroup]?.color;

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Periyodik tablo">`;
  ELEMENTS.forEach(el => {
    const x = gap + (el.c - 1) * (cell + gap);
    const y = gap + (el.p - 1) * (cell + gap);
    const on = inGroup(el, activeGroup);
    const sel = selectedZ === el.z;
    const fill = on && hl ? hl : baseColor(el);
    const op = activeGroup === 'all' || on ? 1 : 0.25;
    svg += `<g class="el" data-z="${el.z}" style="cursor:pointer;opacity:${op}">
      <rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="4" fill="${fill}" stroke="${sel?'#fff':'#30363d'}" stroke-width="${sel?2:1}"/>
      <text x="${x+cell/2}" y="${y+12}" text-anchor="middle" fill="#8b949e" font-size="8">${el.z}</text>
      <text x="${x+cell/2}" y="${y+26}" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">${el.s}</text>
      <text x="${x+cell/2}" y="${y+34}" text-anchor="middle" fill="#8b949e" font-size="7">${el.m}</text>
    </g>`;
  });
  svg += '</svg>';
  document.getElementById('table-wrap').innerHTML = svg;
  document.querySelectorAll('.el').forEach(g => {
    g.onclick = () => {
      selectedZ = +g.dataset.z;
      const el = ELEMENTS.find(e => e.z === selectedZ);
      document.getElementById('detail').innerHTML = `<h2>${el.s} — ${el.n}</h2>
        <p>Atom numarası: ${el.z} · Kütle: ${el.m} u</p>
        <p>Periyot ${el.p}, Grup ${el.c} · ${GROUPS[el.g]?.label || el.g}</p>`;
      drawTable();
    };
  });
}
drawTable();
</script>
</body>
</html>
