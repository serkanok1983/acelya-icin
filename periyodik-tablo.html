<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periyodik Tablo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0e14;
      color: #e6edf3;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: clamp(1.1rem, 4vw, 1.5rem); margin: 0.5rem 0; }
    p.sub {
      color: #8b949e;
      font-size: 0.9rem;
      text-align: center;
      max-width: 40rem;
      margin: 0 0 1rem;
    }
    .groups {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 1rem;
      max-width: 900px;
    }
    .groups button {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .groups button:hover,
    .groups button.active {
      background: #388bfd;
      border-color: #58a6ff;
    }
    #table-wrap {
      overflow-x: auto;
      max-width: 100%;
      padding-bottom: 0.5rem;
      min-height: 200px;
    }
    #table-wrap svg {
      display: block;
      width: min(100%, 780px);
      height: auto;
    }
    #detail {
      margin-top: 1rem;
      padding: 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      max-width: 420px;
      width: 100%;
      min-height: 80px;
      text-align: center;
    }
    #detail h2 { margin: 0 0 0.25rem; font-size: 1.4rem; color: #79c0ff; }
    #detail p { margin: 0.2rem 0; color: #8b949e; font-size: 0.85rem; }
    a.back { color: #58a6ff; font-size: 0.85rem; margin-top: 1rem; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Periyodik Tablo</h1>
  <p class="sub">Grup düğmelerine tıklayarak aynı özellikteki elementleri vurgulayın. Bir elemente tıklayın.</p>
  <div class="groups" id="groupBtns"></div>
  <div id="table-wrap"></div>
  <div id="detail"><p>Bir element veya grup seçin.</p></div>
  <a class="back" href="index.html">← Ana menü</a>

<script>
const GROUPS = {
  all: { label: "Tümü", color: null },
  metal: { label: "Metaller", color: "#58a6ff" },
  ametal: { label: "Ametaller", color: "#7ee787" },
  yari: { label: "Yarı metaller", color: "#d2a8ff" },
  alkali: { label: "1A Alkali", color: "#f85149" },
  toprak: { label: "2A Toprak alkali", color: "#ffa657" },
  halojen: { label: "Halojenler (17)", color: "#a5d6ff" },
  soy: { label: "Soy gazlar (18)", color: "#ff7b72" },
  gecis: { label: "Geçiş metalleri", color: "#e3b341" },
  lantanit: { label: "Lantanitler", color: "#f778ba" },
  aktinit: { label: "Aktinitler", color: "#bc8cff" },
};

const NAMES = [
  "", "Hidrojen", "Helyum", "Lityum", "Berilyum", "Bor", "Karbon", "Azot", "Oksijen", "Flor", "Neon",
  "Sodyum", "Magnezyum", "Alüminyum", "Silisyum", "Fosfor", "Kükürt", "Klor", "Argon",
  "Potasyum", "Kalsiyum", "Skandiyum", "Titanyum", "Vanadyum", "Krom", "Manganez", "Demir", "Kobalt", "Nikel", "Bakır", "Çinko",
  "Galyum", "Germanyum", "Arsenik", "Selenyum", "Brom", "Kripton",
  "Rubidyum", "Stronsiyum", "İtriyum", "Zirkonyum", "Niyobyum", "Molibden", "Teknesyum", "Rutenyum", "Rodyum", "Paladyum", "Gümüş", "Kadmiyum",
  "İndiyum", "Kalay", "Antimon", "Tellür", "İyot", "Ksenon",
  "Sezyum", "Baryum", "Lantan", "Seryum", "Praseodim", "Neodim", "Prometyum", "Samaryum", "Evropyum", "Gadolinyum", "Terbiyum", "Disprozyum", "Holmiyum", "Erbiyum", "Tulyum", "İterbiyum", "Lutesyum",
  "Hafniyum", "Tantal", "Tungsten", "Renyum", "Osmiyum", "İridyum", "Platin", "Altın", "Cıva", "Talyum", "Kurşun", "Bizmut", "Polonyum", "Astatin", "Radon",
  "Fransiyum", "Radyum", "Aktinyum", "Thoryum", "Protaktinyum", "Uranyum", "Neptünyum", "Plütonyum", "Amerikyum", "Küriyum", "Berkelyum", "Kaliforniyum", "Einsteinyum", "Fermiyum", "Mendelevyum", "Nobelyum", "Lawrensiyum",
  "Rutherfordyum", "Dubniyum", "Seaborgiyum", "Bohriyum", "Hassiyum", "Meitneriyum", "Darmstadtiyum", "Röntgenyum", "Kopernikyum", "Nihonyum", "Flerovyum", "Moskovyum", "Livermoryum", "Tenes", "Oganesson",
];

const SYMBOLS = [
  "", "H", "He", "Li", "Be", "B", "C", "N", "O", "F", "Ne", "Na", "Mg", "Al", "Si", "P", "S", "Cl", "Ar",
  "K", "Ca", "Sc", "Ti", "V", "Cr", "Mn", "Fe", "Co", "Ni", "Cu", "Zn", "Ga", "Ge", "As", "Se", "Br", "Kr",
  "Rb", "Sr", "Y", "Zr", "Nb", "Mo", "Tc", "Ru", "Rh", "Pd", "Ag", "Cd", "In", "Sn", "Sb", "Te", "I", "Xe",
  "Cs", "Ba", "La", "Ce", "Pr", "Nd", "Pm", "Sm", "Eu", "Gd", "Tb", "Dy", "Ho", "Er", "Tm", "Yb", "Lu",
  "Hf", "Ta", "W", "Re", "Os", "Ir", "Pt", "Au", "Hg", "Tl", "Pb", "Bi", "Po", "At", "Rn",
  "Fr", "Ra", "Ac", "Th", "Pa", "U", "Np", "Pu", "Am", "Cm", "Bk", "Cf", "Es", "Fm", "Md", "No", "Lr",
  "Rf", "Db", "Sg", "Bh", "Hs", "Mt", "Ds", "Rg", "Cn", "Nh", "Fl", "Mc", "Lv", "Ts", "Og",
];

const MASSES = [
  0, 1.008, 4.003, 6.94, 9.01, 10.81, 12.01, 14.01, 16.0, 19.0, 20.18,
  22.99, 24.31, 26.98, 28.09, 30.97, 32.07, 35.45, 39.95,
  39.1, 40.08, 44.96, 47.87, 50.94, 52.0, 54.94, 55.85, 58.93, 58.69, 63.55, 65.38,
  69.72, 72.63, 74.92, 78.97, 79.9, 83.8,
  85.47, 87.62, 88.91, 91.22, 92.91, 95.95, 98, 101.07, 102.91, 106.42, 107.87, 112.41,
  114.82, 118.71, 121.76, 127.6, 126.9, 131.29,
  132.91, 137.33, 138.91, 140.12, 140.91, 144.24, 145, 150.36, 151.96, 157.25, 158.93, 162.5, 164.93, 167.26, 168.93, 173.05, 174.97,
  178.49, 180.95, 183.84, 186.21, 190.23, 192.22, 195.08, 196.97, 200.59, 204.38, 207.2, 208.98, 209, 210, 222,
  223, 226, 227, 232.04, 231.04, 238.03, 237, 244, 243, 247, 247, 251, 252, 257, 258, 259, 262,
  267, 268, 271, 270, 277, 278, 281, 282, 285, 286, 289, 290, 293, 294, 294,
];

function category(z) {
  if ([1, 6, 7, 8, 15, 16, 34].includes(z)) return "ametal";
  if ([2, 10, 18, 36, 54, 86, 118].includes(z)) return "soy";
  if ([3, 11, 19, 37, 55, 87].includes(z)) return "alkali";
  if ([4, 12, 20, 38, 56, 88].includes(z)) return "toprak";
  if ([9, 17, 35, 53, 85, 117].includes(z)) return "halojen";
  if (z >= 57 && z <= 71) return "lantanit";
  if (z >= 89 && z <= 103) return "aktinit";
  if ([5, 14, 32, 33, 51, 52, 84].includes(z)) return "yari";
  if ((z >= 21 && z <= 30) || (z >= 39 && z <= 48) || (z >= 72 && z <= 80) || (z >= 104 && z <= 112)) return "gecis";
  if ([13, 31, 49, 50, 81, 82, 83, 113, 114, 115, 116].includes(z)) return "metal";
  return "metal";
}

function gridPos(z) {
  if (z === 1) return { p: 1, c: 1 };
  if (z === 2) return { p: 1, c: 18 };
  if (z >= 3 && z <= 10) {
    const p = 2;
    if (z <= 4) return { p, c: z - 2 };
    return { p, c: z + 8 };
  }
  if (z >= 11 && z <= 18) {
    const p = 3;
    if (z <= 12) return { p, c: z - 10 };
    return { p, c: z + 6 };
  }
  if (z >= 19 && z <= 36) {
    const p = 4;
    if (z <= 20) return { p, c: z - 18 };
    if (z <= 30) return { p, c: z - 18 + 2 };
    return { p, c: z - 18 + 12 };
  }
  if (z >= 37 && z <= 54) {
    const p = 5;
    if (z <= 38) return { p, c: z - 36 };
    if (z <= 48) return { p, c: z - 36 + 2 };
    return { p, c: z - 36 + 12 };
  }
  if (z >= 55 && z <= 56) return { p: 6, c: z - 54 };
  if (z >= 57 && z <= 71) return { p: 8, c: z - 54 };
  if (z >= 72 && z <= 86) return { p: 6, c: z - 68 };
  if (z >= 87 && z <= 88) return { p: 7, c: z - 86 };
  if (z >= 89 && z <= 103) return { p: 9, c: z - 86 };
  if (z >= 104 && z <= 118) return { p: 7, c: z - 100 };
  return { p: 1, c: 1 };
}

const ELEMENTS = [];
for (let z = 1; z <= 118; z++) {
  const pos = gridPos(z);
  ELEMENTS.push({
    z,
    s: SYMBOLS[z],
    n: NAMES[z],
    m: MASSES[z],
    g: category(z),
    p: pos.p,
    c: pos.c,
  });
}

let activeGroup = "all";
let selectedZ = null;

const btnWrap = document.getElementById("groupBtns");
Object.entries(GROUPS).forEach(([k, v]) => {
  const b = document.createElement("button");
  b.textContent = v.label;
  b.dataset.g = k;
  if (k === "all") b.classList.add("active");
  b.onclick = () => {
    activeGroup = k;
    btnWrap.querySelectorAll("button").forEach((x) =>
      x.classList.toggle("active", x.dataset.g === k)
    );
    drawTable();
  };
  btnWrap.appendChild(b);
});

function baseColor(el) {
  const c = {
    metal: "#1f3d5c",
    ametal: "#1a3d2e",
    yari: "#3d2a5c",
    alkali: "#4a2020",
    toprak: "#4a3520",
    halojen: "#1a3545",
    soy: "#3d2020",
    gecis: "#3d3520",
    lantanit: "#4a2540",
    aktinit: "#352545",
  };
  return c[el.g] || "#21262d";
}

function inGroup(el, g) {
  if (g === "all") return true;
  if (g === "metal") return ["metal", "alkali", "toprak", "gecis"].includes(el.g);
  return el.g === g;
}

function drawTable() {
  const cell = 36;
  const gap = 3;
  const cols = 18;
  const rows = 9;
  const w = cols * (cell + gap) + gap;
  const h = rows * (cell + gap) + gap;
  const hl = GROUPS[activeGroup]?.color;
  const wrap = document.getElementById("table-wrap");
  const NS = "http://www.w3.org/2000/svg";

  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
  svg.setAttribute("width", String(w));
  svg.setAttribute("height", String(h));
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "Periyodik tablo");

  ELEMENTS.forEach((el) => {
    const x = gap + (el.c - 1) * (cell + gap);
    const y = gap + (el.p - 1) * (cell + gap);
    const on = inGroup(el, activeGroup);
    const sel = selectedZ === el.z;
    const fill = on && hl ? hl : baseColor(el);
    const op = activeGroup === "all" || on ? 1 : 0.25;

    const g = document.createElementNS(NS, "g");
    g.setAttribute("class", "el");
    g.setAttribute("data-z", String(el.z));
    g.style.cursor = "pointer";
    g.style.opacity = String(op);

    const rect = document.createElementNS(NS, "rect");
    rect.setAttribute("x", String(x));
    rect.setAttribute("y", String(y));
    rect.setAttribute("width", String(cell));
    rect.setAttribute("height", String(cell));
    rect.setAttribute("rx", "4");
    rect.setAttribute("fill", fill);
    rect.setAttribute("stroke", sel ? "#fff" : "#30363d");
    rect.setAttribute("stroke-width", sel ? "2" : "1");

    const tZ = document.createElementNS(NS, "text");
    tZ.setAttribute("x", String(x + cell / 2));
    tZ.setAttribute("y", String(y + 11));
    tZ.setAttribute("text-anchor", "middle");
    tZ.setAttribute("fill", "#8b949e");
    tZ.setAttribute("font-size", "8");
    tZ.textContent = String(el.z);

    const tS = document.createElementNS(NS, "text");
    tS.setAttribute("x", String(x + cell / 2));
    tS.setAttribute("y", String(y + 24));
    tS.setAttribute("text-anchor", "middle");
    tS.setAttribute("fill", "#e6edf3");
    tS.setAttribute("font-size", "12");
    tS.setAttribute("font-weight", "bold");
    tS.textContent = el.s;

    const tM = document.createElementNS(NS, "text");
    tM.setAttribute("x", String(x + cell / 2));
    tM.setAttribute("y", String(y + 33));
    tM.setAttribute("text-anchor", "middle");
    tM.setAttribute("fill", "#8b949e");
    tM.setAttribute("font-size", "6.5");
    tM.textContent = String(el.m);

    g.append(rect, tZ, tS, tM);
    g.addEventListener("click", () => {
      selectedZ = el.z;
      document.getElementById("detail").innerHTML = `
        <h2>${el.s} — ${el.n}</h2>
        <p>Atom numarası: ${el.z} · Kütle: ${el.m} u</p>
        <p>Periyot ${el.p}, Grup ${el.c} · ${GROUPS[el.g]?.label || el.g}</p>`;
      drawTable();
    });
    svg.appendChild(g);
  });

  wrap.replaceChildren(svg);
}

drawTable();
</script>
</body>
</html>
