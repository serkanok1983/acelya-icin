<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared/theme.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Takımyıldız Haritası</title>
  <style>
    .app-content { max-width: 960px; }

    .sky-wrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border);
    }

    #skyCanvas {
      display: block;
      width: 100%;
      background: #02050d;
      cursor: grab;
    }

    #skyCanvas:active { cursor: grabbing; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
    }

    .season-btn {
      padding: 0.45rem 0.85rem;
      font: inherit;
      font-size: 0.82rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .season-btn.active {
      background: rgba(94, 234, 212, 0.2);
      border-color: rgba(94, 234, 212, 0.45);
      color: var(--accent);
    }

    .season-btn:hover { border-color: var(--border-hover); }

    .info-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 10px 0;
      min-height: 60px;
      transition: opacity 0.3s;
    }

    .info-panel.is-empty { opacity: 0.5; }

    .info-panel h3 {
      margin: 0 0 4px;
      font-size: 1rem;
      color: var(--accent);
    }

    .info-panel .myth {
      font-size: 0.78rem;
      color: var(--accent-2);
      margin-bottom: 6px;
      font-style: italic;
    }

    .info-panel p {
      margin: 0;
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .hint {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 4px 0;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.1rem, 4vw, 1.45rem);
      color: var(--text);
      margin: 8px 0 2px;
    }

    .sub {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0 0 6px;
    }

    @media (max-width: 600px) {
      .season-btn { padding: 0.35rem 0.6rem; font-size: 0.74rem; }
      .hint { font-size: 0.7rem; gap: 4px 10px; }
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="takimyildiz-haritasi">

<div class="app-content">
  <h1>🌌 Takımyıldız Haritası</h1>
  <p class="sub">Türkiye'den görülebilen başlıca takımyıldızlar — mevsime göre görünürlük değişir. Fare ile gökyüzünü gezdirin, takımyıldızlara tıklayın.</p>

  <div class="controls">
    <button class="season-btn active" data-season="spring">🌸 İlkbahar</button>
    <button class="season-btn" data-season="summer">☀️ Yaz</button>
    <button class="season-btn" data-season="autumn">🍂 Sonbahar</button>
    <button class="season-btn" data-season="winter">❄️ Kış</button>
  </div>

  <div class="hint">
    <span>🖱️ Sürükle: Gezdir</span>
    <span>🔍 Tıklama: Takımyıldız bilgisi</span>
    <span>⭐ Parlaklık = Görünürlük</span>
  </div>

  <div class="sky-wrap">
    <canvas id="skyCanvas"></canvas>
  </div>

  <div class="info-panel is-empty" id="infoPanel">
    <p style="text-align:center;">👆 Haritadaki bir takımyıldıza tıklayarak bilgi alın</p>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('skyCanvas');
  const ctx = canvas.getContext('2d');
  const infoPanel = document.getElementById('infoPanel');

  let W, H;
  let currentSeason = 'spring';

  // Pan state
  let panX = 0, panY = 0;
  let dragging = false;
  let dragStartX, dragStartY, dragStartPanX, dragStartPanY;

      info: 'Kepçe biçimindedir. Kuyruğunun ucundaki Polaris (Kutup Yıldızı) Dünyaʼnın dönüş eksenine çok yakındır ve her zaman kuzeyi gösterir.',

      stars: [
        { x: 0.65, y: 0.25, mag: 3.5 },

        { x: 0.70, y: 0.32, mag: 2.0, name: 'Algieba' },
        { x: 0.67, y: 0.35, mag: 1.3, name: 'Regulus' },

      id: 'scorpius', name: 'Akrep', latin: 'Scorpius',

      info: 'Yaz gökyüzünün en parlak takımyıldızlarından. Kalbindeki kırmızı süperdev Antares, Marsʼa benzer rengiyle dikkat çeker. Kuyruğundaki yıldızlar iğneyi oluşturur.',
      stars: [
        { x: 0.42, y: 0.70, mag: 2.3 },
        { x: 0.44, y: 0.65, mag: 2.8 },
        { x: 0.46, y: 0.62, mag: 2.9 },
        { x: 0.48, y: 0.58, mag: 1.0, name: 'Antares' },
        { x: 0.51, y: 0.55, mag: 2.3 },
        { x: 0.49, y: 0.72, mag: 2.7 },
        { x: 0.52, y: 0.74, mag: 1.6, name: 'Shaula' },
        { x: 0.55, y: 0.77, mag: 2.5 },
      ],
      lines: [[0, 1], [1, 2], [2, 3], [3, 4], [3, 5], [5, 6], [6, 7]],
    },
    {
      id: 'cygnus', name: 'Kuğu', latin: 'Cygnus',
      peakSeason: 'summer',
      myth: 'Zeusʼun kuğu kılığına girerek Ledaʼyı baştan çıkardığı formdur. Ayrıca Orpheusʼun ölümünden sonra liriyle birlikte gökyüzüne yerleştirilen kuğu olduğuna da inanılır.',
      info: 'Kuzey Haçı (Northern Cross) asterizmiyle tanınır. Samanyoluʼnun en yoğun bölgesinde bulunur. Kuyruktaki Deneb, Yaz Üçgeniʼnin bir köşesidir.',
      stars: [
        { x: 0.30, y: 0.56, mag: 1.2, name: 'Deneb' },
        { x: 0.36, y: 0.51, mag: 2.8 },
        { x: 0.35, y: 0.47, mag: 2.2, name: 'Sadr' },
        { x: 0.38, y: 0.43, mag: 2.8 },
        { x: 0.42, y: 0.41, mag: 3.0, name: 'Albireo' },
        { x: 0.33, y: 0.53, mag: 3.7 },
        { x: 0.37, y: 0.55, mag: 3.9 },
      ],
      lines: [[0, 2], [1, 2], [2, 3], [3, 4], [5, 1], [6, 3]],
    },
  ];

  // Background stars (scattered randomly)
  let bgStars = [];
  const BG_STAR_COUNT = 180;

  function seedBgStars() {
    bgStars = [];
    for (let i = 0; i < BG_STAR_COUNT; i++) {
      bgStars.push({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.3 + 0.3,
        brightness: 0.3 + Math.random() * 0.7,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.01 + Math.random() * 0.03,
      });
    }
  }
  seedBgStars();

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width;
    H = Math.min(W * 0.75, 520);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  // Visibility factor based on season
  function seasonVisibility(constellation) {
    if (constellation.peakSeason === 'all') return 1.0;
    const peaks = {
      'spring': { spring: 1.0, summer: 0.5, autumn: 0.15, winter: 0.3 },
      'summer': { spring: 0.3, summer: 1.0, autumn: 0.5, winter: 0.1 },
      'autumn': { spring: 0.15, summer: 0.3, autumn: 1.0, winter: 0.5 },
      'winter': { spring: 0.3, summer: 0.1, autumn: 0.5, winter: 1.0 },
    };
    return peaks[constellation.peakSeason]?.[currentSeason] ?? 0.5;
  }

  function draw() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Deep sky background with subtle gradient
    const grad = ctx.createRadialGradient(W * 0.3, H * 0.3, 0, W / 2, H / 2, Math.max(W, H));
    grad.addColorStop(0, '#0a1528');
    grad.addColorStop(1, '#02050d');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Milky Way hint
    const mwGrad = ctx.createLinearGradient(0, H * 0.1, W * 0.7, H * 0.9);
    mwGrad.addColorStop(0, 'rgba(100,130,180,0.015)');
    mwGrad.addColorStop(0.4, 'rgba(120,140,190,0.025)');
    mwGrad.addColorStop(0.7, 'rgba(100,120,170,0.018)');
    mwGrad.addColorStop(1, 'rgba(80,100,150,0.005)');
    ctx.fillStyle = mwGrad;
    ctx.fillRect(0, 0, W, H);

    // Apply pan
    ctx.save();
    ctx.translate(panX, panY);

    // Draw background stars
    const time = Date.now() * 0.001;
    for (const s of bgStars) {
      const sx = s.x * W;
      const sy = s.y * H;
      if (sx < -100 || sx > W + 100 || sy < -100 || sy > H + 100) continue;
      const twinkle = 0.5 + 0.5 * Math.sin(s.twinkle + time * s.twinkleSpeed * 60);
      const alpha = s.brightness * (0.6 + 0.4 * twinkle);
      ctx.fillStyle = `rgba(220,230,255,${alpha.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw constellations
    for (const con of constellations) {
      const vis = seasonVisibility(con);
      if (vis < 0.05) continue;

      const alpha = 0.25 + vis * 0.75;

      // Draw connection lines
      ctx.strokeStyle = `rgba(94,234,212,${(alpha * 0.5).toFixed(2)})`;
      ctx.lineWidth = 0.8 * vis;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      for (const [i, j] of con.lines) {
        const s1 = con.stars[i], s2 = con.stars[j];
        ctx.moveTo(s1.x * W, s1.y * H);
        ctx.lineTo(s2.x * W, s2.y * H);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw stars
      for (const s of con.stars) {
        const sx = s.x * W;
        const sy = s.y * H;
        const baseRadius = Math.max(2.5, 6 - s.mag * 1.1);
        const r = baseRadius * vis;

        // Glow
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 3);
        glow.addColorStop(0, `rgba(94,234,212,${(alpha * 0.8).toFixed(2)})`);
        glow.addColorStop(0.5, `rgba(94,234,212,${(alpha * 0.15).toFixed(2)})`);
        glow.addColorStop(1, 'rgba(94,234,212,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(sx, sy, r * 3, 0, Math.PI * 2);
        ctx.fill();

        // Core
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();

        // Name label (only for named stars, and only if visible enough)
        if (s.name && vis > 0.4) {
          ctx.fillStyle = `rgba(200,210,230,${(alpha * 0.85).toFixed(2)})`;
          ctx.font = '9px Outfit, sans-serif';
          ctx.fillText(s.name, sx + r + 5, sy + r / 2 + 4);
        }
      }

      // Constellation name label (centroid)
      if (vis > 0.3) {
        let cx = 0, cy = 0;
        for (const s of con.stars) { cx += s.x; cy += s.y; }
        cx = (cx / con.stars.length) * W;
        cy = (cy / con.stars.length) * H;

        ctx.fillStyle = `rgba(167,139,250,${(alpha * 0.9).toFixed(2)})`;
        ctx.font = 'italic 12px Outfit, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(con.name, cx, cy - 18);
        ctx.textAlign = 'start';
      }
    }

    // Polaris highlight and label
    const polarisStar = constellations[1].stars[0];
    if (seasonVisibility(constellations[1]) > 0.4) {
      const px = polarisStar.x * W;
      const py = polarisStar.y * H;
      ctx.strokeStyle = 'rgba(251,191,36,0.6)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 6]);
      ctx.beginPath();
      ctx.arc(px, py, 16, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(251,191,36,0.9)';
      ctx.font = 'bold 10px Outfit, sans-serif';
      ctx.fillText('★ Kutup Yıldızı (Polaris)', px + 12, py + 16);
      ctx.fillStyle = 'rgba(251,191,36,0.5)';
      ctx.font = 'italic 9px Outfit, sans-serif';
      ctx.fillText('Her zaman kuzeyi gösterir', px + 12, py + 30);
    }

    // Cardinal directions
    ctx.font = 'italic 11px Outfit, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('K', W * 0.08, 20);
    ctx.fillText('G', W * 0.88, 20);
    ctx.fillText('D', W * 0.88, H - 10);
    ctx.fillText('B', W * 0.08, H - 10);

    // Ufuk çizgisi (alt kısım)
    const horizonY = H * 0.88;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-200, horizonY);
    ctx.lineTo(W + 200, horizonY);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.font = '9px Outfit, sans-serif';
    ctx.fillText('── Ufuk ──', W * 0.44, horizonY - 4);

    ctx.restore();

    // Season indicator
    const seasonNames = { spring: 'İlkbahar', summer: 'Yaz', autumn: 'Sonbahar', winter: 'Kış' };
    const seasonIcons = { spring: '🌸', summer: '☀️', autumn: '🍂', winter: '❄️' };
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px Outfit, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${seasonIcons[currentSeason]} ${seasonNames[currentSeason]} Gökyüzü`, W - 12, H - 8);
    ctx.textAlign = 'start';
  }

  // Hit test for constellations
  function hitTestConstellation(mx, my) {
    // Transform to sky coords
    const sx = mx - panX, sy = my - panY;

    let best = null, bestDist = 30;

    for (const con of constellations) {
      const vis = seasonVisibility(con);
      if (vis < 0.1) continue;

      for (const s of con.stars) {
        const d = Math.hypot(sx - s.x * W, sy - s.y * H);
        const hitRadius = 20;
        if (d < hitRadius && d < bestDist) {
          bestDist = d;
          best = con;
        }
      }
    }
    return best;
  }

  // Event handlers
  canvas.addEventListener('mousedown', function (e) {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartPanX = panX;
    dragStartPanY = panY;
    canvas.style.cursor = 'grabbing';
  });

  canvas.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    panX = dragStartPanX + (e.clientX - dragStartX);
    panY = dragStartPanY + (e.clientY - dragStartY);
    // Clamp pan
    panX = Math.max(-W * 0.6, Math.min(W * 0.6, panX));
    panY = Math.max(-H * 0.5, Math.min(H * 0.5, panY));
    draw();
  });

  canvas.addEventListener('mouseup', function (e) {
    const dx = Math.abs(e.clientX - dragStartX);
    const dy = Math.abs(e.clientY - dragStartY);
    const moved = Math.hypot(dx, dy) > 4;
    dragging = false;
    canvas.style.cursor = 'grab';

    // If didn't move much, treat as click
    if (!moved) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      const hit = hitTestConstellation(mx, my);

      if (hit) {
        infoPanel.classList.remove('is-empty');
        const vis = Math.round(seasonVisibility(hit) * 100);
        let visText = vis >= 80 ? 'Çok iyi görünür' : vis >= 50 ? 'Orta görünürlükte' : vis >= 20 ? 'Düşük görünürlükte' : 'Zor görünür';
        infoPanel.innerHTML = `
          <h3>${hit.name} <span style="font-size:0.8rem;color:var(--text-muted);">(${hit.latin})</span></h3>
          <div class="myth">📖 ${hit.myth}</div>
          <p>🔭 ${hit.info}</p>
          <p style="margin-top:4px;font-size:0.75rem;color:var(--text-muted);">Görünürlük (${currentSeason === 'spring' ? 'İlkbahar' : currentSeason === 'summer' ? 'Yaz' : currentSeason === 'autumn' ? 'Sonbahar' : 'Kış'}): ${visText} (${vis}%)</p>
        `;
      } else {
        infoPanel.classList.add('is-empty');
        infoPanel.innerHTML = '<p style="text-align:center;">👆 Haritadaki bir takımyıldıza tıklayarak bilgi alın</p>';
      }
    }
  });

  canvas.addEventListener('mouseleave', function () {
    dragging = false;
    canvas.style.cursor = 'grab';
  });

  // Touch support for mobile
  canvas.addEventListener('touchstart', function (e) {
    if (e.touches.length === 1) {
      dragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      dragStartPanX = panX;
      dragStartPanY = panY;
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', function (e) {
    if (!dragging || e.touches.length !== 1) return;
    panX = dragStartPanX + (e.touches[0].clientX - dragStartX);
    panY = dragStartPanY + (e.touches[0].clientY - dragStartY);
    panX = Math.max(-W * 0.6, Math.min(W * 0.6, panX));
    panY = Math.max(-H * 0.5, Math.min(H * 0.5, panY));
    draw();
  }, { passive: true });

  canvas.addEventListener('touchend', function (e) {
    if (!dragging) return;
    const dx = Math.abs((e.changedTouches[0]?.clientX || dragStartX) - dragStartX);
    const dy = Math.abs((e.changedTouches[0]?.clientY || dragStartY) - dragStartY);
    const moved = Math.hypot(dx, dy) > 8;
    dragging = false;

    if (!moved && e.changedTouches[0]) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.changedTouches[0].clientX - rect.left) * (W / rect.width);
      const my = (e.changedTouches[0].clientY - rect.top) * (H / rect.height);
      const hit = hitTestConstellation(mx, my);

      if (hit) {
        infoPanel.classList.remove('is-empty');
        const vis = Math.round(seasonVisibility(hit) * 100);
        let visText = vis >= 80 ? 'Çok iyi görünür' : vis >= 50 ? 'Orta görünürlükte' : vis >= 20 ? 'Düşük görünürlükte' : 'Zor görünür';
        infoPanel.innerHTML = `
          <h3>${hit.name} <span style="font-size:0.8rem;color:var(--text-muted);">(${hit.latin})</span></h3>
          <div class="myth">📖 ${hit.myth}</div>
          <p>🔭 ${hit.info}</p>
          <p style="margin-top:4px;font-size:0.75rem;color:var(--text-muted);">Görünürlük (${currentSeason === 'spring' ? 'İlkbahar' : currentSeason === 'summer' ? 'Yaz' : currentSeason === 'autumn' ? 'Sonbahar' : 'Kış'}): ${visText} (${vis}%)</p>
        `;
      } else {
        infoPanel.classList.add('is-empty');
        infoPanel.innerHTML = '<p style="text-align:center;">👆 Haritadaki bir takımyıldıza tıklayarak bilgi alın</p>';
      }
    }
  });

  // Season buttons
  document.querySelectorAll('.season-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentSeason = this.dataset.season;
      panX = 0;
      panY = 0;
      draw();
    });
  });

  // Animation frame for twinkling stars
  function animate() {
    draw();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  resize();
  animate();
})();
</script>

</body>
</html>
