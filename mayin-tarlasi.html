<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="shared/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mayın Tarlası</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1f26;
      color: #e6edf3;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body { display: flex; flex-direction: column; min-height: 100dvh; }
    .hud {
      flex-shrink: 0;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
      text-align: center;
    }
    .hud h1 { margin: 0 0 4px; font-size: clamp(1rem, 4vw, 1.5rem); }
    #status { font-size: clamp(0.85rem, 3.5vw, 1rem); }
    #probHint {
      margin-top: 6px;
      font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      opacity: 0.85;
      line-height: 1.35;
      max-width: 42em;
      margin-left: auto;
      margin-right: auto;
    }
    .hint { margin: 6px 0 0; font-size: clamp(0.7rem, 2.8vw, 0.78rem); opacity: 0.6; }
    .controls { margin-top: 6px; }
    button {
      font-size: 14px;
      padding: 8px 14px;
      background: #c1121f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .game-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px max(10px, env(safe-area-inset-bottom));
    }
    #gameCanvas {
      display: block;
      max-width: 100%;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
      touch-action: none;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="mayin-tarlasi">

<header class="hud">
  <h1>Mayın Tarlası</h1>
  <div id="status">Mayın: <span id="minesLeft">40</span> · Süre: <span id="timer">0</span> sn</div>
  <p id="probHint">Olasılık ipucu: İmleç altındaki kapalı hücre için tahmini güvenli açılma yüzdesi gösterilir.</p>
  <div class="controls">
    <button type="button" id="btnNew">Yeni Oyun</button>
  </div>
  <p class="hint">Sol tık: aç · Sağ tık / uzun bas: bayrak · İlk tık güvenli</p>
</header>

<div class="game-stage">
  <canvas id="gameCanvas" width="640" height="640" role="img" aria-label="Mayın tarlası"></canvas>
</div>

<script>
  const GAME_W = 640;
  const GAME_H = 640;
  const COLS = 16;
  const ROWS = 16;
  const MINES = 40;

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = GAME_W;
  canvas.height = GAME_H;

  const minesLeftEl = document.getElementById("minesLeft");
  const timerEl = document.getElementById("timer");
  const probHintEl = document.getElementById("probHint");

  const cellSize = GAME_W / COLS;
  const NUM_COLORS = ["", "#6cf", "#3f3", "#f33", "#93c", "#a33", "#3cc", "#222", "#888"];

  function resizeGame() {
    const hud = document.querySelector(".hud");
    const hudBottom = hud.getBoundingClientRect().bottom;
    const padX = 20;
    const padY = 16;
    const availW = window.innerWidth - padX;
    const availH = window.innerHeight - hudBottom - padY;
    const scale = Math.min(availW / GAME_W, availH / GAME_H) * 0.98;
    const w = Math.max(260, GAME_W * scale);
    const h = w;
    canvas.style.width = `${w}px`;
    canvas.style.height = `${h}px`;
  }
  window.addEventListener("resize", resizeGame);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeGame);
  resizeGame();

  let grid, revealed, flagged, gameOver, win, firstClick, hoverR, hoverC, seconds, timerId;
  let scoreRecorded = false;

  let fx = { burst() {}, pop() {}, shake() {}, flash() {}, update() {}, draw() {} };
  window.addEventListener("acelya-game-ready", () => {
    if (window.AcelyaHooks) fx = AcelyaHooks.bindJuice(canvas);
  });

  function playReveal() { window.AcelyaSounds?.hit(); }
  function playEnd() { window.AcelyaSounds?.explode(); }

  function recordMineScore() {
    if (scoreRecorded) return;
    scoreRecorded = true;
    const pts = win ? Math.max(0, 100000 - seconds * 100) : seconds * 10;
    window.AcelyaHooks?.recordScore(pts);
  }

  function idx(r, c) { return r * COLS + c; }

  function neighbors(r, c) {
    const list = [];
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const rr = r + dr, cc = c + dc;
        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) list.push([rr, cc]);
      }
    return list;
  }

  function placeMines(safeR, safeC) {
    grid = Array(COLS * ROWS).fill(0);
    let placed = 0;
    while (placed < MINES) {
      const i = Math.floor(Math.random() * COLS * ROWS);
      const r = Math.floor(i / COLS), c = i % COLS;
      if (grid[i] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      grid[i] = -1;
      placed++;
    }
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const i = idx(r, c);
        if (grid[i] === -1) continue;
        let n = 0;
        for (const [rr, cc] of neighbors(r, c)) if (grid[idx(rr, cc)] === -1) n++;
        grid[i] = n;
      }
  }

  function reveal(r, c, quiet) {
    const i = idx(r, c);
    if (revealed[i] || flagged[i] || gameOver) return;
    revealed[i] = true;
    if (grid[i] === -1) {
      gameOver = true;
      playEnd();
      fx.shake(16);
      fx.flash(0.35);
      recordMineScore();
      for (let j = 0; j < grid.length; j++) if (grid[j] === -1) revealed[j] = true;
      clearInterval(timerId);
      return;
    }
    if (!quiet) playReveal();
    if (grid[i] === 0) {
      for (const [rr, cc] of neighbors(r, c)) reveal(rr, cc, true);
    }
    if (revealed.every((v, j) => v || grid[j] === -1)) {
      win = true;
      gameOver = true;
      playEnd();
      fx.flash(0.4);
      recordMineScore();
      clearInterval(timerId);
    }
  }

  function countFlagsAround(r, c) {
    return neighbors(r, c).filter(([rr, cc]) => flagged[idx(rr, cc)]).length;
  }

  /** Basit olasılık: komşu sayılara göre kalan mayın / kalan kapalı hücre */
  function safeProbabilityAt(r, c) {
    if (!grid || r == null || c == null) return null;
    const i = idx(r, c);
    if (revealed[i] || flagged[i]) return null;

    let mineWeight = 0;
    let scenarios = 0;
    const constraints = [];

    for (const [rr, cc] of neighbors(r, c)) {
      const ni = idx(rr, cc);
      if (!revealed[ni] || grid[ni] <= 0) continue;
      const need = grid[ni];
      const closed = neighbors(rr, cc).filter(([ar, ac]) => {
        const ai = idx(ar, ac);
        return !revealed[ai] && !flagged[ai];
      });
      const flags = countFlagsAround(rr, cc);
      const remaining = need - flags;
      if (remaining < 0) return 0;
      if (closed.length === 0) continue;
      constraints.push({ remaining, closed, containsTarget: closed.some(([ar, ac]) => ar === r && ac === c) });
    }

    if (!constraints.length) {
      const totalClosed = revealed.filter((v) => !v && !flagged).length;
      const flags = flagged.filter(Boolean).length;
      const minesRem = MINES - flags;
      return totalClosed ? Math.round((1 - minesRem / totalClosed) * 100) : null;
    }

    let safeEst = 100;
    for (const con of constraints) {
      if (!con.containsTarget) continue;
      const pMine = con.remaining / con.closed.length;
      safeEst = Math.min(safeEst, Math.round((1 - pMine) * 100));
    }
    return safeEst;
  }

  function newGame() {
    grid = null;
    revealed = Array(COLS * ROWS).fill(false);
    flagged = Array(COLS * ROWS).fill(false);
    gameOver = false;
    win = false;
    scoreRecorded = false;
    firstClick = true;
    hoverR = hoverC = null;
    seconds = 0;
    clearInterval(timerId);
    timerEl.textContent = "0";
    minesLeftEl.textContent = MINES;
    probHintEl.textContent = "Olasılık ipucu: İmleç altındaki kapalı hücre için tahmini güvenli açılma yüzdesi gösterilir.";
    draw();
  }

  function cellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX ?? e.touches?.[0]?.clientX) - rect.left;
    const y = (e.clientY ?? e.touches?.[0]?.clientY) - rect.top;
    const c = Math.floor((x / rect.width) * COLS);
    const r = Math.floor((y / rect.height) * ROWS);
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
    return { r, c };
  }

  function updateProbHint() {
    const p = safeProbabilityAt(hoverR, hoverC);
    if (p == null) {
      probHintEl.textContent = hoverR != null
        ? "Bu hücre açık veya bayraklı — olasılık hesaplanmaz."
        : "Olasılık ipucu: Kapalı bir hücrenin üzerine gelin.";
    } else {
      probHintEl.textContent =
        `Seçili hücre (${hoverC + 1},${hoverR + 1}): Tahmini güvenli açılma ≈ %${p} · Komşu sayılara göre basit olasılık tahmini (kesin değildir).`;
    }
  }

  function draw() {
    ctx.fillStyle = "#2d333b";
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = idx(r, c);
        const x = c * cellSize;
        const y = r * cellSize;
        const isHover = r === hoverR && c === hoverC;

        if (!revealed[i]) {
          ctx.fillStyle = isHover ? "#484f58" : "#3d444d";
          ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
          if (flagged[i]) {
            ctx.fillStyle = "#f85149";
            ctx.font = `bold ${cellSize * 0.45}px system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("⚑", x + cellSize / 2, y + cellSize / 2);
          } else if (isHover && !gameOver) {
            const p = safeProbabilityAt(r, c);
            if (p != null) {
              ctx.fillStyle = "rgba(255,255,255,0.75)";
              ctx.font = `${cellSize * 0.28}px system-ui`;
              ctx.fillText(`%${p}`, x + cellSize / 2, y + cellSize / 2);
            }
          }
        } else if (grid) {
          ctx.fillStyle = "#21262d";
          ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
          if (grid[i] === -1) {
            ctx.fillStyle = "#f85149";
            ctx.beginPath();
            ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.22, 0, Math.PI * 2);
            ctx.fill();
          } else if (grid[i] > 0) {
            ctx.fillStyle = NUM_COLORS[grid[i]];
            ctx.font = `bold ${cellSize * 0.5}px system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(String(grid[i]), x + cellSize / 2, y + cellSize / 2);
          }
        }
      }
    }
    fx.update();
    fx.draw(ctx, GAME_W, GAME_H);

    if (gameOver) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      ctx.fillStyle = win ? "#3fb950" : "#f85149";
      ctx.font = "bold 28px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(win ? "Kazandın! 🎉" : "Mayın!", GAME_W / 2, GAME_H / 2);
    }
  }

  canvas.addEventListener("mousemove", (e) => {
    const cell = cellFromEvent(e);
    hoverR = cell?.r ?? null;
    hoverC = cell?.c ?? null;
    updateProbHint();
    draw();
  });
  canvas.addEventListener("mouseleave", () => {
    hoverR = hoverC = null;
    updateProbHint();
    draw();
  });

  canvas.addEventListener("contextmenu", (e) => e.preventDefault());

  canvas.addEventListener("mousedown", (e) => {
    const cell = cellFromEvent(e);
    if (!cell) return;
    const { r, c } = cell;
    const i = idx(r, c);
    if (e.button === 2 || e.ctrlKey) {
      if (!revealed[i] && !gameOver) {
        flagged[i] = !flagged[i];
        const flags = flagged.filter(Boolean).length;
        minesLeftEl.textContent = Math.max(0, MINES - flags);
        draw();
      }
      return;
    }
    if (gameOver) return;
    if (firstClick) {
      placeMines(r, c);
      firstClick = false;
      timerId = setInterval(() => {
        seconds++;
        timerEl.textContent = seconds;
      }, 1000);
    }
    reveal(r, c);
    draw();
  });

  let longPressTimer = null;
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const cell = cellFromEvent(e);
    if (!cell) return;
    longPressTimer = setTimeout(() => {
      const i = idx(cell.r, cell.c);
      if (!revealed[i] && !gameOver) {
        flagged[i] = !flagged[i];
        const flags = flagged.filter(Boolean).length;
        minesLeftEl.textContent = Math.max(0, MINES - flags);
        draw();
      }
    }, 450);
  }, { passive: false });
  canvas.addEventListener("touchend", (e) => {
    e.preventDefault();
    clearTimeout(longPressTimer);
    const cell = cellFromEvent(e);
    if (!cell || gameOver) return;
    const { r, c } = cell;
    if (firstClick) {
      placeMines(r, c);
      firstClick = false;
      timerId = setInterval(() => {
        seconds++;
        timerEl.textContent = seconds;
      }, 1000);
    }
    reveal(r, c);
    draw();
  }, { passive: false });

  document.getElementById("btnNew").addEventListener("click", newGame);
  newGame();
</script></body>
</html>
