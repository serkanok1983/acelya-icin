<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="shared/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sezar Şifresi</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%; min-height: 100dvh;
      background: #0a0a12; color: #e8e8f0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    body { display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; }
    .hud {
      flex-shrink: 0;
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .hud h1 { margin: 0 0 6px; font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 600; }
    .sub { font-size: 0.82rem; opacity: 0.7; margin: 0; }
    main { flex: 1; padding: 16px; }
    .panel {
      background: #12121c; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px; margin-bottom: 14px;
    }
    .panel h2 {
      margin: 0 0 10px; font-size: 0.9rem; font-weight: 600;
      color: #7eb6ff;
    }
    textarea {
      width: 100%; min-height: 88px; resize: vertical;
      padding: 10px; font-size: 1rem; line-height: 1.45;
      background: #0e0e16; color: #e8e8f0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; font-family: inherit;
    }
    textarea:focus { outline: 2px solid #5b9cff; outline-offset: 1px; }
    .control-row { margin-bottom: 12px; }
    .control-row label {
      display: flex; justify-content: space-between;
      font-size: 0.84rem; margin-bottom: 6px;
    }
    input[type="range"] { width: 100%; accent-color: #5b9cff; }
    .alphabet {
      display: flex; flex-wrap: wrap; gap: 4px;
      justify-content: center; margin-top: 10px;
    }
    .alphabet span {
      width: 1.6rem; height: 1.6rem; display: flex;
      align-items: center; justify-content: center;
      font-size: 0.72rem; border-radius: 4px;
      background: rgba(255,255,255,0.06);
    }
    .alphabet span.map-from { background: rgba(91,156,255,0.25); color: #9ec8ff; }
    .alphabet span.map-to { background: rgba(126,200,150,0.25); color: #9ee8b8; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      flex: 1; min-width: 100px; padding: 10px;
      background: #2a4a8a; color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    button:hover { background: #3a5ca0; }
    button.secondary { background: #1e2a3a; }
    button.secondary:hover { background: #2a3a4a; }
    .mode-toggle {
      display: flex; gap: 0; margin-bottom: 14px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .mode-toggle button {
      flex: 1; border-radius: 0; background: #14141f;
      color: #aaa;
    }
    .mode-toggle button.active {
      background: #2a4a8a; color: #fff;
    }
    .hint {
      font-size: 0.72rem; opacity: 0.55; text-align: center;
      padding: 0 16px max(14px, env(safe-area-inset-bottom));
    }
    .formula {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem; opacity: 0.75; text-align: center;
      margin-top: 8px;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="sezar-sifre">
<header class="hud">
  <h1>Sezar Şifresi</h1>
  <p class="sub">Alfabedeki her harf sabit bir kaydırma ile değiştirilir</p>
</header>
<main>
  <div class="mode-toggle">
    <button type="button" id="modeEnc" class="active">Şifrele</button>
    <button type="button" id="modeDec">Çöz</button>
  </div>
  <div class="panel">
    <h2 id="inputLabel">Düz metin</h2>
    <textarea id="inputText" placeholder="Metni buraya yaz…" spellcheck="false">MERHABA ACELYA</textarea>
    <div class="control-row" style="margin-top:12px">
      <label>Kaydırma (shift) <span id="shiftVal">3</span></label>
      <input type="range" id="shift" min="0" max="25" value="3" step="1">
    </div>
    <p class="formula" id="formula">C = (P + 3) mod 26</p>
    <div class="btn-row" style="margin-top:10px">
      <button type="button" id="applyBtn">Uygula</button>
      <button type="button" id="swapBtn" class="secondary">Giriş ↔ Çıkış</button>
      <button type="button" id="randomBtn" class="secondary">Rastgele shift</button>
    </div>
  </div>
  <div class="panel">
    <h2 id="outputLabel">Şifreli metin</h2>
    <textarea id="outputText" readonly spellcheck="false"></textarea>
    <div class="alphabet" id="alphabetMap" aria-hidden="true"></div>
  </div>
</main>
<p class="hint">Türkçe harfler (ç, ğ, …) olduğu gibi kalır; A–Z ve a–z kaydırılır.</p>
<script>
(function () {
  const inputText = document.getElementById("inputText");
  const outputText = document.getElementById("outputText");
  const shiftSl = document.getElementById("shift");
  const shiftVal = document.getElementById("shiftVal");
  const formula = document.getElementById("formula");
  const modeEnc = document.getElementById("modeEnc");
  const modeDec = document.getElementById("modeDec");
  const inputLabel = document.getElementById("inputLabel");
  const outputLabel = document.getElementById("outputLabel");
  const alphabetMap = document.getElementById("alphabetMap");
  const applyBtn = document.getElementById("applyBtn");
  const swapBtn = document.getElementById("swapBtn");
  const randomBtn = document.getElementById("randomBtn");

  let encryptMode = true;
  const ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  function transformChar(ch, shift, enc) {
    const low = ch.toLowerCase();
    const idx = ALPHA.indexOf(low.toUpperCase());
    if (idx < 0) return ch;
    const s = enc ? shift : (26 - shift) % 26;
    const newIdx = (idx + s) % 26;
    const out = ALPHA[newIdx];
    return ch === ch.toUpperCase() ? out : out.toLowerCase();
  }

  function transform(text, shift, enc) {
    return [...text].map(c => transformChar(c, shift, enc)).join("");
  }

  function renderAlphabet(shift) {
    alphabetMap.innerHTML = "";
    for (let i = 0; i < 26; i++) {
      const from = document.createElement("span");
      from.className = "map-from";
      from.textContent = ALPHA[i];
      const to = document.createElement("span");
      to.className = "map-to";
      to.textContent = ALPHA[(i + shift) % 26];
      alphabetMap.append(from, to);
    }
  }

  function updateLabels() {
    if (encryptMode) {
      inputLabel.textContent = "Düz metin";
      outputLabel.textContent = "Şifreli metin";
      formula.textContent = `C = (P + ${shiftSl.value}) mod 26`;
    } else {
      inputLabel.textContent = "Şifreli metin";
      outputLabel.textContent = "Düz metin";
      formula.textContent = `P = (C − ${shiftSl.value}) mod 26`;
    }
    modeEnc.classList.toggle("active", encryptMode);
    modeDec.classList.toggle("active", !encryptMode);
  }

  function apply() {
    const shift = +shiftSl.value;
    shiftVal.textContent = shift;
    outputText.value = transform(inputText.value, shift, encryptMode);
    renderAlphabet(shift);
    updateLabels();
  }

  modeEnc.addEventListener("click", () => { encryptMode = true; apply(); });
  modeDec.addEventListener("click", () => { encryptMode = false; apply(); });
  shiftSl.addEventListener("input", apply);
  inputText.addEventListener("input", apply);
  applyBtn.addEventListener("click", apply);
  swapBtn.addEventListener("click", () => {
    const t = inputText.value;
    inputText.value = outputText.value;
    outputText.value = t;
    apply();
  });
  randomBtn.addEventListener("click", () => {
    shiftSl.value = Math.floor(Math.random() * 25) + 1;
    apply();
  });

  apply();
})();
</script></body>
</html>
