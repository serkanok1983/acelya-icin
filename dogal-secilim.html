<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Doğal Seçilim Simülasyonu</title>
  <link rel="stylesheet" href="shared/theme.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .app-content {
      max-width: 960px !important;
      margin: 0 auto;
      padding: 0 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .page-header {
      text-align: center;
      padding-top: 8px;
    }
    .page-header h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      font-weight: 600;
      color: var(--text);
    }
    .page-header .sub {
      margin: 4px 0 0;
      font-size: clamp(0.78rem, 3vw, 0.88rem);
      color: var(--text-muted);
    }
    .readout-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .readout {
      text-align: center;
      min-width: 80px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
    }
    .readout .val {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--accent);
    }
    .readout .lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 720px) {
      .sim-grid { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .panel h3 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--accent);
    }
    .panel canvas {
      width: 100%;
      display: block;
      border-radius: 6px;
      background: var(--bg-deep);
    }
    .controls-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      justify-content: center;
      align-items: center;
    }
    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 70px;
    }
    .slider-group label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .slider-group .sv {
      font-size: 0.78rem;
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .slider-group input[type="range"] {
      width: 72px;
      accent-color: var(--accent-2);
    }
    .env-preview {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: inline-block;
      vertical-align: middle;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-row button {
      padding: 8px 18px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-row button:hover { filter: brightness(1.1); }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), #2dd4bf);
      color: #041016;
    }
    .btn-stop {
      background: #f87171;
      color: #041016;
    }
    .btn-reset {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }
    .legend-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="dogal-secilim">

<div class="app-content">
  <div class="page-header">
    <h1>🧬 Doğal Seçilim Simülasyonu</h1>
    <p class="sub">Çevre değiştikçe avantajlı fenotiplerin popülasyonda yayılışı</p>
  </div>

  <div class="readout-row">
    <div class="readout">
      <div class="lbl">🧬 Nesil</div>
      <div class="val" id="genVal">0</div>
    </div>
    <div class="readout">
      <div class="lbl">🦋 Popülasyon</div>
      <div class="val" id="popVal">100</div>
    </div>
    <div class="readout">
      <div class="lbl">📊 Açık Alel Frekansı</div>
      <div class="val" style="color:#fbbf24;" id="freqVal">0.50</div>
    </div>
    <div class="readout">
      <div class="lbl">🌑 Koyu Alel Frekansı</div>
      <div class="val" style="color:#5e5e6e;" id="freqDarkVal">0.50</div>
    </div>
  </div>

  <div class="sim-grid">
    <div class="panel">
      <h3>🦋 Popülasyon — Canlı Görünüm</h3>
      <canvas id="popCanvas" width="400" height="300"></canvas>
    </div>
    <div class="panel">
      <h3>📈 Alel Frekansı Değişimi</h3>
      <canvas id="freqCanvas" width="400" height="300"></canvas>
    </div>
  </div>

  <div class="legend-row">
    <span><span class="legend-dot" style="background:#f5e6c8;"></span> Açık renkli</span>
    <span><span class="legend-dot" style="background:#4a4a5a;"></span> Koyu renkli</span>
    <span><span class="legend-dot" style="background:#8b7d5a;"></span> Orta ton</span>
  </div>

  <div class="controls-section">
    <div class="slider-group">
      <label>🎨 Çevre Rengi</label>
      <input type="range" id="envColor" min="0" max="100" value="30">
      <span class="sv" id="envColorVal">%30</span>
    </div>
    <div class="env-preview" id="envPreview"></div>
    <div class="slider-group">
      <label>⚡ Seçilim Baskısı</label>
      <input type="range" id="selPressure" min="0" max="100" value="60">
      <span class="sv" id="selPressureVal">%60</span>
    </div>
    <div class="slider-group">
      <label>🔀 Mutasyon</label>
      <input type="range" id="mutRate" min="0" max="20" value="3">
      <span class="sv" id="mutRateVal">%3</span>
    </div>
    <div class="slider-group">
      <label>👥 Pop. Büyüklüğü</label>
      <input type="range" id="popSize" min="20" max="200" value="100">
      <span class="sv" id="popSizeVal">100</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="btnStart">▶ Başlat</button>
    <button class="btn-stop hidden" id="btnStop">⏸ Durdur</button>
    <button class="btn-reset" id="btnReset">↺ Sıfırla</button>
    <button class="btn-reset" id="btnStep">⏭ Tek Nesil</button>
  </div>
</div>

<script>
(function () {
  /* ── Canvas ── */
  const popCv = document.getElementById("popCanvas");
  const popCtx = popCv.getContext("2d");
  const freqCv = document.getElementById("freqCanvas");
  const freqCtx = freqCv.getContext("2d");

  /* ── Durum ── */
  let envColor = 30;       // 0 = koyu, 100 = açık
  let selPressure = 60;    // 0-100 seçilim gücü
  let mutRate = 0.03;      // mutasyon olasılığı
  let popSize = 100;
  let generation = 0;
  let running = false;
  let animId = null;
  const freqHistory = [];  // { gen, lightFreq }
  const MAX_FREQ_HIST = 500;

  /* Birey: phenotype 0-100 (0=koyu, 100=açık) */
  let individuals = [];

  function phenotypeToColor(p) {
    const pr = p / 100;
    const r = Math.round(75 + pr * 170);   // koyu: 75, açık: 245
    const g = Math.round(75 + pr * 155);
    const b = Math.round(90 + pr * 110);
    return `rgb(${r},${g},${b})`;
  }

  function envToColor() {
    const pr = envColor / 100;
    const r = Math.round(50 + pr * 170);
    const g = Math.round(55 + pr * 145);
    const b = Math.round(40 + pr * 130);
    return `rgb(${r},${g},${b})`;
  }

  /* ── Başlatma ── */
  function seedPopulation() {
    individuals = [];
    for (let i = 0; i < popSize; i++) {
      individuals.push(Math.random() * 100);
    }
  }

  function updatePopSize() {
    while (individuals.length > popSize) {
      const idx = Math.floor(Math.random() * individuals.length);
      individuals.splice(idx, 1);
    }
    while (individuals.length < popSize) {
      // yeni birey: rastgele
      individuals.push(Math.random() * 100);
    }
  }

  /* ── Fitness ── */
  function fitness(ph) {
    const diff = Math.abs(ph - envColor) / 100;  // 0 = mükemmel, 1 = çok farklı
    const rawFit = 1 - diff * (selPressure / 100);
    return Math.max(0.01, rawFit);
  }

  /* ── Bir nesil geçişi ── */
  function advanceGeneration() {
    const fitVals = individuals.map(fitness);
    const totalFit = fitVals.reduce((a, b) => a + b, 0);

    // Rulet tekerleği seçilimi ile yeni nesil
    const newPop = [];
    for (let i = 0; i < popSize; i++) {
      const r = Math.random() * totalFit;
      let cum = 0;
      let parentIdx = 0;
      for (let j = 0; j < individuals.length; j++) {
        cum += fitVals[j];
        if (cum >= r) { parentIdx = j; break; }
      }
      let childPh = individuals[parentIdx];

      // Mutasyon
      if (Math.random() < mutRate) {
        childPh += (Math.random() - 0.5) * 30;
        childPh = Math.max(0, Math.min(100, childPh));
      }

      newPop.push(childPh);
    }
    individuals = newPop;
    generation++;

    // Frekans kaydı
    const lightCount = individuals.filter(p => p > 50).length;
    const lightFreq = lightCount / popSize;
    freqHistory.push({ gen: generation, lightFreq });
    if (freqHistory.length > MAX_FREQ_HIST) freqHistory.shift();
  }

  /* ── HUD ── */
  function updateHud() {
    document.getElementById("genVal").textContent = generation;
    document.getElementById("popVal").textContent = popSize;
    const lightCount = individuals.filter(p => p > 50).length;
    document.getElementById("freqVal").textContent = (lightCount / popSize).toFixed(3);
    document.getElementById("freqDarkVal").textContent = ((popSize - lightCount) / popSize).toFixed(3);
  }

  /* ── Çizim ── */
  function drawPopulation(dpr) {
    const cw = popCv.width / dpr;
    const ch = popCv.height / dpr;
    popCtx.clearRect(0, 0, cw, ch);

    // Zemin = çevre rengi
    popCtx.fillStyle = envToColor();
    popCtx.fillRect(0, 0, cw, ch);

    // Doku: yaprak/dal benzeri çizgiler
    popCtx.strokeStyle = "rgba(255,255,255,0.05)";
    popCtx.lineWidth = 1 * dpr;
    for (let i = 0; i < 40; i++) {
      const lx = (Math.sin(i * 71.3) * 0.5 + 0.5) * cw;
      const ly = ch * 0.2 + (i / 40) * ch * 0.7;
      popCtx.beginPath();
      popCtx.moveTo(lx, ly);
      popCtx.lineTo(lx + (Math.cos(i * 43.7) * 0.5 + 0.5) * 30 * dpr, ly + 20 * dpr);
      popCtx.stroke();
    }

    // Bireyler (kelebek benzeri)
    const spacing = Math.min(28, Math.max(14, Math.floor(Math.sqrt((cw * ch) / popSize))));
    const cols = Math.floor(cw / spacing);
    const rows = Math.ceil(popSize / cols);
    for (let i = 0; i < popSize; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = spacing * 0.5 + col * spacing + (Math.sin(i * 3.7) * 0.5 + 0.5) * (spacing * 0.3);
      const cy = spacing * 0.4 + row * spacing + (Math.cos(i * 2.9) * 0.5 + 0.5) * (spacing * 0.25);

      const ph = individuals[i];
      const color = phenotypeToColor(ph);

      // kanatlar
      popCtx.fillStyle = color;
      popCtx.beginPath();
      const wingR = spacing * 0.32;
      popCtx.ellipse(cx - wingR * 0.65, cy - wingR * 0.1, wingR * 0.8, wingR * 0.55, -0.3, 0, Math.PI * 2);
      popCtx.fill();
      popCtx.beginPath();
      popCtx.ellipse(cx + wingR * 0.65, cy - wingR * 0.1, wingR * 0.8, wingR * 0.55, 0.3, 0, Math.PI * 2);
      popCtx.fill();

      // gövde
      popCtx.fillStyle = "#333";
      popCtx.beginPath();
      popCtx.ellipse(cx, cy + wingR * 0.05, wingR * 0.15, wingR * 0.5, 0, 0, Math.PI * 2);
      popCtx.fill();

      // seçilmişlik halesi (en uyumlu bireylerde parlak)
      const fit = fitness(ph);
      if (fit > 0.85) {
        popCtx.fillStyle = `rgba(94,234,212,${(fit - 0.85) * 3})`;
        popCtx.beginPath();
        popCtx.arc(cx, cy, wingR * 1.1, 0, Math.PI * 2);
        popCtx.fill();
      }
    }
  }

  function drawFreqChart(dpr) {
    const cw = freqCv.width / dpr;
    const ch = freqCv.height / dpr;
    const ctx = freqCtx;
    ctx.clearRect(0, 0, cw, ch);
    ctx.fillStyle = "#0c1418";
    ctx.fillRect(0, 0, cw, ch);

    if (freqHistory.length < 2) return;

    const margin = { l: 36, r: 10, t: 10, b: 22 };
    const pw = cw - margin.l - margin.r;
    const ph = ch - margin.t - margin.b;

    function tx(i) {
      if (freqHistory.length === 1) return margin.l + pw / 2;
      return margin.l + ((i - freqHistory[0].gen) / (freqHistory[freqHistory.length - 1].gen - freqHistory[0].gen)) * pw;
    }
    function ty(f) { return margin.t + ph - f * ph; }

    /* ızgara */
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1 * dpr;
    for (let i = 0; i <= 5; i++) {
      const y = margin.t + (ph * i) / 5;
      ctx.beginPath(); ctx.moveTo(margin.l, y); ctx.lineTo(cw - margin.r, y); ctx.stroke();
    }
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.beginPath();
    ctx.moveTo(margin.l, margin.t); ctx.lineTo(margin.l, margin.t + ph);
    ctx.moveTo(margin.l, margin.t + ph); ctx.lineTo(cw - margin.r, margin.t + ph);
    ctx.stroke();

    ctx.font = `${9 * dpr}px Outfit, sans-serif`;
    ctx.fillStyle = "#8b95a8";
    ctx.textAlign = "right";
    for (let i = 0; i <= 5; i++) {
      const v = i / 5;
      ctx.fillText(v.toFixed(1), margin.l - 4, margin.t + ph - (ph * i) / 5 + 3 * dpr);
    }
    ctx.textAlign = "center";
    ctx.fillText("Nesil", cw / 2, ch - 2 * dpr);

    /* 0.5 referans çizgisi */
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(margin.l, ty(0.5));
    ctx.lineTo(cw - margin.r, ty(0.5));
    ctx.stroke();
    ctx.setLineDash([]);

    /* Açık alel frekansı */
    ctx.strokeStyle = "#fbbf24";
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    for (let i = 0; i < freqHistory.length; i++) {
      const x = tx(freqHistory[i].gen);
      const y = ty(freqHistory[i].lightFreq);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    /* Koyu alel frekansı (çizgili) */
    ctx.strokeStyle = "#5e5e7e";
    ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([3 * dpr, 3 * dpr]);
    ctx.beginPath();
    for (let i = 0; i < freqHistory.length; i++) {
      const x = tx(freqHistory[i].gen);
      const y = ty(1 - freqHistory[i].lightFreq);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    /* Lejant */
    ctx.fillStyle = "#fbbf24";
    ctx.textAlign = "left";
    ctx.fillText("Açık alel", margin.l + 4, margin.t + 12 * dpr);
    ctx.fillStyle = "#5e5e7e";
    ctx.fillText("Koyu alel", margin.l + 68, margin.t + 12 * dpr);

    /* Çevre rengi göstergesi */
    const envRel = envColor / 100;
    ctx.fillStyle = "rgba(167,139,250,0.4)";
    ctx.fillRect(cw - margin.r - 30 * dpr, margin.t, 24 * dpr, ph);
    ctx.fillStyle = "#fff";
    ctx.fillRect(cw - margin.r - 30 * dpr, margin.t + ph * (1 - envRel) - 2 * dpr, 24 * dpr, 3 * dpr);
  }

  function drawAll() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const pw = popCv.clientWidth;
    const ph = popCv.clientHeight;
    popCv.width = pw * dpr;
    popCv.height = ph * dpr;
    popCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawPopulation(dpr);

    const fw = freqCv.clientWidth;
    const fh = freqCv.clientHeight;
    freqCv.width = fw * dpr;
    freqCv.height = fh * dpr;
    freqCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawFreqChart(dpr);
  }

  function envPreviewUpdate() {
    document.getElementById("envPreview").style.background = envToColor();
  }

  /* ── Kontroller ── */
  function startSim() {
    if (running) return;
    running = true;
    document.getElementById("btnStart").classList.add("hidden");
    document.getElementById("btnStop").classList.remove("hidden");
    function loop() {
      if (!running) return;
      advanceGeneration();
      updateHud();
      drawAll();
      animId = setTimeout(loop, 250);
    }
    loop();
  }

  function stopSim() {
    running = false;
    if (animId) clearTimeout(animId);
    document.getElementById("btnStart").classList.remove("hidden");
    document.getElementById("btnStop").classList.add("hidden");
  }

  function resetSim() {
    stopSim();
    generation = 0;
    freqHistory.length = 0;
    seedPopulation();
    freqHistory.push({ gen: 0, lightFreq: individuals.filter(p => p > 50).length / popSize });
    updatePopSize();
    updateHud();
    drawAll();
  }

  function stepOnce() {
    if (running) return;
    advanceGeneration();
    updateHud();
    drawAll();
  }

  document.getElementById("btnStart").addEventListener("click", startSim);
  document.getElementById("btnStop").addEventListener("click", stopSim);
  document.getElementById("btnReset").addEventListener("click", resetSim);
  document.getElementById("btnStep").addEventListener("click", stepOnce);

  /* ── Slider'lar ── */
  document.getElementById("envColor").addEventListener("input", function () {
    envColor = parseInt(this.value);
    document.getElementById("envColorVal").textContent = "%" + envColor;
    envPreviewUpdate();
    drawAll();
  });
  document.getElementById("selPressure").addEventListener("input", function () {
    selPressure = parseInt(this.value);
    document.getElementById("selPressureVal").textContent = "%" + selPressure;
  });
  document.getElementById("mutRate").addEventListener("input", function () {
    mutRate = parseInt(this.value) / 100;
    document.getElementById("mutRateVal").textContent = "%" + parseInt(this.value);
  });
  document.getElementById("popSize").addEventListener("input", function () {
    popSize = parseInt(this.value);
    document.getElementById("popSizeVal").textContent = popSize;
    updatePopSize();
    updateHud();
    drawAll();
  });

  /* ── Responsive ── */
  window.addEventListener("resize", () => { if (!running) drawAll(); });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", () => { if (!running) drawAll(); });
  }

  /* ── Başlangıç ── */
  seedPopulation();
  freqHistory.push({ gen: 0, lightFreq: individuals.filter(p => p > 50).length / popSize });
  envPreviewUpdate();
  updateHud();
  setTimeout(drawAll, 100);
})();
</script>
</body>
</html>
