<!DOCTYPE html>
<html class="app-root" lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="shared/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Breakout 🧱</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      min-height: 100dvh;
    }
    .hud {
      flex-shrink: 0;
      padding: max(8px, env(safe-area-inset-top)) 12px 8px;
      text-align: center;
    }
    .hud h1 {
      margin: 0 0 4px;
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 600;
    }
    #score {
      font-size: clamp(0.85rem, 3.5vw, 1.15rem);
      opacity: 0.95;
    }
    .hint {
      margin: 6px 0 0;
      font-size: clamp(0.7rem, 2.8vw, 0.8rem);
      opacity: 0.65;
    }
    .game-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px max(10px, env(safe-area-inset-bottom));
    }
    #breakoutCanvas {
      display: block;
      max-width: 100%;
      background: darkblue;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
      touch-action: none;
    }
  </style>
  <script src="shared/app.js"></script>
</head>
<body class="app-page" data-page="breakout">

<header class="hud">
  <h1>Breakout 🧱</h1>
  <div id="score">Skor: <span id="scoreValue">0</span></div>
  <p class="hint">← → veya parmağınızı yatay kaydırın</p>
</header>

<div class="game-stage">
  <canvas id="breakoutCanvas" width="800" height="500" role="img" aria-label="Breakout oyun alanı"></canvas>
</div>

<script>
  const GAME_W = 800;
  const GAME_H = 500;

  const canvas = document.getElementById("breakoutCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = GAME_W;
  canvas.height = GAME_H;

  let fx = { burst() {}, pop() {}, shake() {}, flash() {}, update() {}, draw() {} };
  window.addEventListener("acelya-game-ready", () => {
    if (window.AcelyaHooks) fx = AcelyaHooks.bindJuice(canvas);
  });

  function resizeGame() {
    const hud = document.querySelector(".hud");
    const hudBottom = hud.getBoundingClientRect().bottom;
    const padX = 20;
    const padY = 16;
    const availW = window.innerWidth - padX;
    const availH = window.innerHeight - hudBottom - padY;
    const scale = Math.min(availW / GAME_W, availH / GAME_H) * 0.98;
    const w = Math.max(280, GAME_W * scale);
    const h = w * (GAME_H / GAME_W);
    canvas.style.width = `${w}px`;
    canvas.style.height = `${h}px`;
  }

  window.addEventListener("resize", resizeGame);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", resizeGame);
  }
  resizeGame();

  let paddle = { x: 350, y: 480, width: 100, height: 10, speed: 50 };
  let ball = { x: 400, y: 250, dx: 4, dy: -4, radius: 8 };
  let bricks = [];
  let score = 0;
  let gameOver = false;
  let bricksDestroyed = 0;

  function playPaddleHit() { window.AcelyaSounds?.hit(); }
  function playBrickBreak() { window.AcelyaSounds?.explode(); }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && paddle.x > 0) paddle.x -= paddle.speed;
    if (e.key === "ArrowRight" && paddle.x < GAME_W - paddle.width) paddle.x += paddle.speed;
  });

  function canvasCssToGameX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const t = (clientX - rect.left) / rect.width;
    return t * GAME_W;
  }

  canvas.addEventListener(
    "touchstart",
    (e) => {
      e.preventDefault();
      if (e.touches.length) {
        const x = canvasCssToGameX(e.touches[0].clientX);
        paddle.x = Math.max(0, Math.min(GAME_W - paddle.width, x - paddle.width / 2));
      }
    },
    { passive: false }
  );

  canvas.addEventListener(
    "touchmove",
    (e) => {
      e.preventDefault();
      if (e.touches.length) {
        const x = canvasCssToGameX(e.touches[0].clientX);
        paddle.x = Math.max(0, Math.min(GAME_W - paddle.width, x - paddle.width / 2));
      }
    },
    { passive: false }
  );

  function createBricks() {
    bricks = [];
    for (let c = 0; c < 8; c++) {
      for (let r = 0; r < 5; r++) {
        bricks.push({
          x: c * 100 + 10,
          y: r * 30 + 30,
          width: 80,
          height: 20,
          color: `hsl(${Math.random() * 360}, 100%, 50%)`,
          status: 1,
        });
      }
    }
  }

  function update() {
    if (gameOver) return;
    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.x < 0 || ball.x > GAME_W) ball.dx *= -1;
    if (ball.y < 0) ball.dy *= -1;
    if (ball.y > GAME_H) {
      gameOver = true;
      fx.shake(12);
      window.AcelyaHooks?.recordScore(score);
      alert("GAME OVER!");
      return;
    }

    if (
      ball.y > paddle.y - ball.radius &&
      ball.x > paddle.x &&
      ball.x < paddle.x + paddle.width
    ) {
      ball.dy *= -1;
      playPaddleHit();
    }

    bricks.forEach((b) => {
      if (
        b.status &&
        ball.x > b.x &&
        ball.x < b.x + b.width &&
        ball.y > b.y &&
        ball.y < b.y + b.height
      ) {
        ball.dy *= -1;
        b.status = 0;
        bricksDestroyed++;
        playBrickBreak();
        fx.burst(b.x + b.width / 2, b.y + b.height / 2, b.color, 18);
        fx.pop(b.x + b.width / 2, b.y, "+10");
        score += 10;
        document.getElementById("scoreValue").innerText = score;

        if (bricksDestroyed % 10 === 0) {
          ball.dx *= 1.1;
          ball.dy *= 1.1;
        }
      }
    });

    if (bricks.every((b) => !b.status)) {
      fx.flash(0.35);
      fx.shake(8);
      window.AcelyaHooks?.recordScore(score);
      alert("Tebrikler! Tüm tuğlaları kırdın! 🎉");
      gameOver = true;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    ctx.save();
    fx.get()?.applyTransform(ctx);
    ctx.fillStyle = "red";
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    bricks.forEach((b) => {
      if (b.status) {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.width, b.height);
      }
    });
    ctx.restore();
    fx.update();
    fx.draw(ctx, GAME_W, GAME_H);
  }

  function gameLoop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(gameLoop);
  }

  createBricks();
  gameLoop();
</script></body>
</html>
