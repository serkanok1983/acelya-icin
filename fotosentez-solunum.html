<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="shared/theme.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Fotosentez ve Hücresel Solunum | Açelya</title>
    <style>
      .photo-stage {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin: 10px 0;
      }
      .photo-stage canvas {
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: 0 0 0 1px var(--border);
        max-width: 100%;
      }
      .step-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin: 10px 0;
      }
      .step-btn {
        padding: 0.45rem 0.85rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 0.78rem;
        font-weight: 500;
        transition: all 0.2s;
      }
      .step-btn:hover { color: var(--text); border-color: var(--border-hover); }
      .step-btn.active {
        background: rgba(94,234,212,0.18);
        border-color: rgba(94,234,212,0.5);
        color: var(--accent);
      }
      .step-btn.alt.active {
        background: rgba(167,139,250,0.18);
        border-color: rgba(167,139,250,0.5);
        color: var(--accent-2);
      }
      #stepDesc {
        text-align: center;
        font-size: 0.82rem;
        color: var(--text-muted);
        max-width: 520px;
        margin: 4px auto 8px;
        min-height: 2.4rem;
        line-height: 1.45;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 6px 0;
        font-size: 0.7rem;
        color: var(--text-muted);
      }
      .legend span { display: inline-flex; align-items: center; gap: 4px; }
      .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
      .photo-note {
        text-align: center;
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 2px;
      }
      @media (max-width: 760px) {
        .photo-stage canvas { max-width: 100%; height: auto; }
      }
    </style>
    <script src="shared/app.js"></script>
  </head>
  <body class="app-page" data-page="fotosentez-solunum">
    <div class="app-content">
      <h1>🌿 Fotosentez ve Hücresel Solunum</h1>
      <p class="hint">
        Yaşamın iki temel enerji döngüsü: Kloroplastta ışık enerjisi kimyasal bağa dönüşür, mitokondride bu bağ enerjisi ATP'ye çevrilir.
      </p>

      <div class="legend">
        <span><i class="dot" style="background:#5eead4"></i> CO₂</span>
        <span><i class="dot" style="background:#58a6ff"></i> H₂O</span>
        <span><i class="dot" style="background:#fbbf24"></i> C₆H₁₂O₆</span>
        <span><i class="dot" style="background:#f778ba"></i> O₂</span>
        <span><i class="dot" style="background:#a78bfa"></i> ATP</span>
        <span><i class="dot" style="background:#ffa657"></i> Işık</span>
      </div>

      <div class="step-panel">
        <button class="step-btn active" data-step="0">☀️ Işık Reaksiyonları</button>
        <button class="step-btn" data-step="1">🔄 Calvin Döngüsü</button>
        <button class="step-btn alt" data-step="2">🧬 Glikoliz</button>
        <button class="step-btn alt" data-step="3">🔁 Krebs Döngüsü</button>
        <button class="step-btn alt" data-step="4">⚡ ETS</button>
      </div>

      <p id="stepDesc"></p>

      <div class="photo-stage">
        <canvas id="mainCanvas" width="760" height="460"></canvas>
      </div>

      <p class="photo-note">
        Fotosentez: 6CO₂ + 6H₂O + ışık → C₆H₁₂O₆ + 6O₂ &nbsp;|&nbsp;
        Solunum: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 38ATP
      </p>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("mainCanvas");
        const ctx = canvas.getContext("2d");

        const STEPS = [
          {
            title: "Işık Reaksiyonları — Grana (Tilakoit Zar)",
            desc: "Klorofil ışığı soğurur. Su (H₂O) fotoliz olur: O₂ açığa çıkar. NADP⁺ → NADPH indirgenir, ADP → ATP (fotofosforilasyon). Olay yeri: tilakoit zar.",
            side: "left",
            highlight: "light",
          },
          {
            title: "Calvin Döngüsü — Stroma",
            desc: "CO₂, RuBisCO enzimi ile RuBP'ye bağlanır (karbon fiksasyonu). NADPH ve ATP kullanılarak PGA → PGAL → glikoz sentezlenir. Işığa doğrudan ihtiyaç duymaz.",
            side: "left",
            highlight: "calvin",
          },
          {
            title: "Glikoliz — Sitoplazma",
            desc: "Glikoz (6C) → 2 Pirüvat (3C). 2 ATP harcanır, 4 ATP üretilir (net +2 ATP). 2 NADH oluşur. Oksijensiz ortamda da gerçekleşir.",
            side: "right",
            highlight: "glycolysis",
          },
          {
            title: "Krebs Döngüsü — Mitokondri Matriksi",
            desc: "Pirüvat → Asetil-CoA → Sitrik asit döngüsü. CO₂ açığa çıkar, NADH ve FADH₂ üretilir. Her glikoz için 2 tur döner.",
            side: "right",
            highlight: "krebs",
          },
          {
            title: "Elektron Taşıma Sistemi (ETS) — Krista",
            desc: "NADH ve FADH₂'den gelen elektronlar krista zarındaki taşıyıcılardan geçer. Proton gradyanı oluşur, ATP sentaz ile ~34 ATP üretilir (oksidatif fosforilasyon). Son elektron alıcısı: O₂ → H₂O.",
            side: "right",
            highlight: "ets",
          },
        ];

        let currentStep = 0;
        let animTime = 0;
        let particles = [];

        // Basit parçacık sistemi (molekül akışı animasyonu için)
        function spawnFlowParticles() {
          particles = [];
          const N = 18;
          for (let i = 0; i < N; i++) {
            particles.push({
              phase: Math.random(),
              speed: 0.15 + Math.random() * 0.35,
              lane: Math.floor(Math.random() * 4), // 0=CO₂, 1=H₂O, 2=glikoz, 3=O₂
              offset: (Math.random() - 0.5) * 30,
            });
          }
        }
        spawnFlowParticles();

        function updateParticles(dt) {
          animTime += dt;
          particles.forEach(p => {
            p.phase += p.speed * dt * 0.4;
            if (p.phase > 1.5) p.phase -= 1.5;
          });
        }

        const PARTICLE_COLORS = [
          "#5eead4", // CO₂
          "#58a6ff", // H₂O
          "#fbbf24", // glikoz
          "#f778ba", // O₂
        ];

        function drawParticles(W, H) {
          const cx = W / 2;
          const cy = H / 2;
          const leftCx = W * 0.22;
          const rightCx = W * 0.78;
          const topY = H * 0.28;
          const botY = H * 0.72;

          particles.forEach(p => {
            let x, y;
            // Sol taraf: fotosentez akışı
            if (p.lane <= 1) {
              // CO₂ ve H₂O soldan girer, glikoz ve O₂ çıkar
              const inflow = (p.lane === 0); // CO₂ → giriş, H₂O → giriş
              if (inflow) {
                x = leftCx - 95 + p.phase * 60;
                y = topY - 12 + p.lane * 14 + p.offset * 0.3;
              } else {
                x = leftCx + 40 - p.phase * 50;
                y = botY - 5 + (p.lane - 2) * 14 + p.offset * 0.3;
              }
            } else {
              // Sağ taraf: solunum akışı
              const inflow = (p.lane === 2); // glikoz → giriş, O₂ → giriş
              if (inflow) {
                x = rightCx - 20 + p.phase * 50;
                y = topY - 12 + (p.lane - 2) * 14 + p.offset * 0.3;
              } else {
                x = rightCx + 45 - p.phase * 50;
                y = botY - 5 + (p.lane - 2) * 14 + p.offset * 0.3;
              }
            }

            const alpha = 1 - Math.abs(p.phase - 0.5) * 1.4;
            if (alpha > 0.05) {
              ctx.fillStyle = PARTICLE_COLORS[p.lane];
              ctx.globalAlpha = Math.min(1, alpha * 0.8);
              ctx.beginPath();
              ctx.arc(x, y, 3.5, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
          });
        }

        function drawOrganelle(x, y, w, h, type, highlight) {
          // Organel dış zarı
          ctx.save();

          if (type === "chloroplast") {
            // Kloroplast: oval, içinde tilakoit (grana) ve stroma
            // Dış zar
            ctx.fillStyle = "rgba(34,197,94,0.1)";
            ctx.strokeStyle = highlight === "light" || highlight === "calvin"
              ? "rgba(94,234,212,0.8)"
              : "rgba(34,197,94,0.4)";
            ctx.lineWidth = highlight === "light" || highlight === "calvin" ? 2.5 : 1.5;
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // İç zar
            ctx.strokeStyle = "rgba(34,197,94,0.2)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2, w / 2 - 8, h / 2 - 8, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Tilakoit (grana) — üst üste diskler
            const gx = x + w * 0.3;
            const gy = y + h * 0.22;
            const gw = w * 0.4;
            const stackH = 36;
            const discCount = 5;

            for (let i = 0; i < discCount; i++) {
              const dy = i * (stackH / discCount);
              const bright = highlight === "light" ? 0.6 : 0.2;
              ctx.fillStyle = `rgba(34,197,94,${bright})`;
              ctx.beginPath();
              ctx.ellipse(gx + gw / 2, gy + dy + 6, gw / 2, 6, 0, 0, Math.PI * 2);
              ctx.fill();
            }

            // Işık vurgusu
            if (highlight === "light") {
              ctx.fillStyle = "rgba(251,191,36,0.3)";
              ctx.beginPath();
              ctx.arc(gx + gw / 2, gy - 8, 14, 0, Math.PI * 2);
              ctx.fill();
              // Işınlar
              ctx.strokeStyle = "rgba(251,191,36,0.3)";
              ctx.lineWidth = 1;
              for (let a = 0; a < 8; a++) {
                const ang = (a / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(gx + gw / 2 + Math.cos(ang) * 10, gy - 8 + Math.sin(ang) * 10);
                ctx.lineTo(gx + gw / 2 + Math.cos(ang) * 24, gy - 8 + Math.sin(ang) * 24);
                ctx.stroke();
              }
            }

            // Calvin döngüsü vurgusu (stroma)
            if (highlight === "calvin") {
              ctx.strokeStyle = "rgba(94,234,212,0.5)";
              ctx.lineWidth = 1.5;
              ctx.setLineDash([3, 3]);
              const scx = x + w * 0.6;
              const scy = y + h * 0.65;
              ctx.beginPath();
              ctx.arc(scx, scy, 20, 0, Math.PI * 2);
              ctx.stroke();
              ctx.setLineDash([]);
              // Döngü oku
              ctx.fillStyle = "rgba(94,234,212,0.6)";
              ctx.font = "9px Outfit, sans-serif";
              ctx.textAlign = "center";
              ctx.fillText("Calvin", scx, scy + 3);
            }

          } else if (type === "mitochondria") {
            // Mitokondri: oval, içinde krista
            ctx.fillStyle = "rgba(248,113,113,0.1)";
            ctx.strokeStyle = highlight === "krebs" || highlight === "ets" || highlight === "glycolysis"
              ? "rgba(248,113,113,0.8)"
              : "rgba(248,113,113,0.4)";
            ctx.lineWidth = highlight === "krebs" || highlight === "ets" || highlight === "glycolysis" ? 2.5 : 1.5;
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // İç zar (krista)
            ctx.strokeStyle = "rgba(248,113,113,0.2)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h / 2, w / 2 - 8, h / 2 - 8, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Krista (zarlı kıvrımlar)
            const kx = x + w * 0.25;
            const ky = y + h * 0.35;
            const kw = w * 0.5;
            const kh = h * 0.35;
            ctx.strokeStyle = highlight === "ets" ? "rgba(248,113,113,0.7)" : "rgba(248,113,113,0.25)";
            ctx.lineWidth = highlight === "ets" ? 2 : 1;
            for (let i = 0; i < 7; i++) {
              const sx = kx + i * (kw / 7);
              ctx.beginPath();
              ctx.moveTo(sx, ky);
              ctx.quadraticCurveTo(sx + 3, ky + kh * 0.5, sx, ky + kh);
              ctx.stroke();
            }

            // Krebs döngüsü vurgusu (matriks)
            if (highlight === "krebs") {
              ctx.strokeStyle = "rgba(167,139,250,0.6)";
              ctx.lineWidth = 1.5;
              ctx.setLineDash([3, 3]);
              const scx = x + w * 0.65;
              const scy = y + h * 0.6;
              ctx.beginPath();
              ctx.arc(scx, scy, 16, 0, Math.PI * 2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = "rgba(167,139,250,0.7)";
              ctx.font = "8px Outfit, sans-serif";
              ctx.textAlign = "center";
              ctx.fillText("Krebs", scx, scy + 2);
            }

            // ETS vurgusu
            if (highlight === "ets") {
              ctx.fillStyle = "rgba(167,139,250,0.7)";
              ctx.font = "9px Outfit, sans-serif";
              ctx.fillText("ETS", x + w * 0.5, y + h * 0.82);
            }

            // Glikoliz vurgusu (sitoplazma dışarıda)
          }

          ctx.restore();
        }

        function draw() {
          const W = canvas.width, H = canvas.height;
          ctx.clearRect(0, 0, W, H);

          // Arka plan
          ctx.fillStyle = "var(--bg-card)";
          ctx.fillRect(0, 0, W, H);

          const cx = W / 2;
          const cy = H / 2;

          updateParticles(0.016);

          const step = STEPS[currentStep];
          const leftHl = step.side === "left" ? step.highlight : null;
          const rightHl = step.side === "right" ? step.highlight : null;

          // ---------- SOL: KLOROPLAST ----------
          const leftX = 30, leftY = 50;
          const lw = 260, lh = 220;

          // Etiket
          ctx.fillStyle = "rgba(34,197,94,0.8)";
          ctx.font = "bold 13px Outfit, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("KLOROPLAST", leftX + lw / 2, leftY - 8);

          // Fotosentez denklemi
          ctx.fillStyle = "rgba(255,255,255,0.45)";
          ctx.font = "9px Outfit, sans-serif";
          ctx.fillText(
            "6CO₂ + 6H₂O + ışık → C₆H₁₂O₆ + 6O₂",
            leftX + lw / 2,
            leftY + lh + 26
          );

          // Giriş etiketleri (sol taraf)
          ctx.textAlign = "right";
          ctx.fillStyle = "rgba(94,234,212,0.6)";
          ctx.fillText("CO₂ →", leftX - 2, leftY + lh * 0.35);
          ctx.fillStyle = "rgba(88,166,255,0.6)";
          ctx.fillText("H₂O →", leftX - 2, leftY + lh * 0.50);
          ctx.fillStyle = "rgba(251,191,36,0.6)";
          ctx.fillText("ışık →", leftX - 2, leftY + lh * 0.65);
          ctx.textAlign = "start";

          // Çıkış etiketleri (sağ taraf)
          ctx.fillStyle = "rgba(251,191,36,0.6)";
          ctx.fillText("→ C₆H₁₂O₆", leftX + lw + 4, leftY + lh * 0.35);
          ctx.fillStyle = "rgba(247,120,186,0.6)";
          ctx.fillText("→ O₂", leftX + lw + 4, leftY + lh * 0.50);

          drawOrganelle(leftX, leftY, lw, lh, "chloroplast", leftHl);

          // ---------- ORTA: OK ----------
          const arrowX = cx;
          const arrowTopY = leftY + lh * 0.7;
          const arrowBotY = H - leftY - 30;

          // Çift yönlü ok
          ctx.strokeStyle = "rgba(255,255,255,0.25)";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]);

          // Sağa giden ok (fotosentez ürünleri → solunum)
          ctx.beginPath();
          ctx.moveTo(arrowX - 12, arrowTopY);
          ctx.lineTo(arrowX + 12, arrowTopY);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.25)";
          ctx.beginPath();
          ctx.moveTo(arrowX + 12, arrowTopY);
          ctx.lineTo(arrowX + 6, arrowTopY - 5);
          ctx.lineTo(arrowX + 6, arrowTopY + 5);
          ctx.closePath();
          ctx.fill();

          // Sola giden ok (solunum ürünleri → fotosentez)
          ctx.beginPath();
          ctx.moveTo(arrowX + 12, arrowBotY);
          ctx.lineTo(arrowX - 12, arrowBotY);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.25)";
          ctx.beginPath();
          ctx.moveTo(arrowX - 12, arrowBotY);
          ctx.lineTo(arrowX - 6, arrowBotY - 5);
          ctx.lineTo(arrowX - 6, arrowBotY + 5);
          ctx.closePath();
          ctx.fill();
          ctx.setLineDash([]);

          // Ok etiketi
          ctx.fillStyle = "rgba(255,255,255,0.3)";
          ctx.font = "8px Outfit, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("glikoz + O₂", arrowX, arrowTopY - 8);
          ctx.fillText("CO₂ + H₂O", arrowX, arrowBotY + 14);

          // ---------- SAĞ: MİTOKONDRİ ----------
          const rightX = W - leftX - lw, rightY = H - leftY - lh - 30;

          // Etiket
          ctx.fillStyle = "rgba(248,113,113,0.8)";
          ctx.font = "bold 13px Outfit, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("MİTOKONDRİ", rightX + lw / 2, rightY - 8);

          // Solunum denklemi
          ctx.fillStyle = "rgba(255,255,255,0.45)";
          ctx.font = "9px Outfit, sans-serif";
          ctx.fillText(
            "C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP",
            rightX + lw / 2,
            rightY + lh + 26
          );

          // Giriş etiketleri
          ctx.fillStyle = "rgba(251,191,36,0.6)";
          ctx.textAlign = "right";
          ctx.fillText("C₆H₁₂O₆ →", rightX - 2, rightY + lh * 0.35);
          ctx.fillStyle = "rgba(247,120,186,0.6)";
          ctx.fillText("O₂ →", rightX - 2, rightY + lh * 0.50);
          ctx.textAlign = "start";

          // Çıkış etiketleri
          ctx.fillStyle = "rgba(94,234,212,0.6)";
          ctx.fillText("→ CO₂", rightX + lw + 4, rightY + lh * 0.35);
          ctx.fillStyle = "rgba(88,166,255,0.6)";
          ctx.fillText("→ H₂O", rightX + lw + 4, rightY + lh * 0.50);
          ctx.fillStyle = "rgba(167,139,250,0.6)";
          ctx.fillText("→ ATP", rightX + lw + 4, rightY + lh * 0.65);

          drawOrganelle(rightX, rightY, lw, lh, "mitochondria", rightHl);

          // Glikoliz etiketi (iki organel arasında, sitoplazmayı temsilen)
          if (step.highlight === "glycolysis") {
            ctx.fillStyle = "rgba(167,139,250,0.7)";
            ctx.font = "bold 11px Outfit, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GLİKOLİZ (Sitoplazma)", cx, rightY - 18);
            ctx.strokeStyle = "rgba(167,139,250,0.4)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.arc(cx, rightY - 22, 36, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          // Parçacık akışı
          drawParticles(W, H);
        }

        function setStep(s) {
          currentStep = s;
          animTime = 0;
          spawnFlowParticles();

          document.querySelectorAll(".step-btn").forEach(b => {
            b.classList.toggle("active", +b.dataset.step === s);
          });

          const step = STEPS[s];
          document.getElementById("stepDesc").innerHTML =
            `<strong>${step.title}</strong><br>${step.desc}`;
        }

        document.querySelectorAll(".step-btn").forEach(b => {
          b.addEventListener("click", () => {
            setStep(+b.dataset.step);
          });
        });

        function loop() {
          draw();
          requestAnimationFrame(loop);
        }

        setStep(0);
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
